function btDateRange(from, to) {
  const dates = [], d = new Date(from + 'T00:00:00'), end = new Date(to + 'T00:00:00');
  while (d <= end) { dates.push(d.toISOString().slice(0,10).replace(/-/g,'')); d.setDate(d.getDate()+1); }
  return dates;
}

async function fetchESPNFinal(dateStr) {
  const r = await fetch(`${ESPN_URL}?groups=50&limit=300&dates=${dateStr}`, { cache: 'no-store' });
  const d = await r.json();
  return (d.events || []).map(ev => {
    const comp = ev.competitions?.[0];
    const cs = comp?.competitors || [];
    const home = cs.find(c => c.homeAway === 'home');
    const away = cs.find(c => c.homeAway === 'away');
    return {
      home: home?.team?.displayName || '', away: away?.team?.displayName || '',
      homeScore: parseInt(home?.score || '0'), awayScore: parseInt(away?.score || '0'),
      statusName: comp?.status?.type?.name || '', neutral: comp?.neutralSite || false,
    };
  }).filter(g => g.statusName === 'STATUS_FINAL');
}

const GIST_RAW = 'https://gist.githubusercontent.com/speiser11/44dd1f1464e3d7e2689b25ba758d4ea9/raw';

async function fetchStoredOdds(isoDate) {
  try {
    const r = await fetch(`${GIST_RAW}/ncaab-odds-${isoDate}.json`, { signal: AbortSignal.timeout(8000) });
    if (!r.ok) return [];
    return await r.json();
  } catch(e) { return []; }
}

// Convert full Odds API format → compact {home, away, spread, total} used by matchStoredOdds
function oddsApiToCompact(arr) {
  return arr.map(og => {
    const hKey = matchTeam(og.home_team);
    const sp   = getLine(og.bookmakers, 'spreads', hKey);
    const tot  = getLine(og.bookmakers, 'totals',  hKey);
    return { home: og.home_team, away: og.away_team, spread: sp?.point ?? null, total: tot?.point ?? null };
  });
}

// Try locked-odds Gist (centralized pregame lines) first; fall back to historical Gist
async function fetchOddsForDate(isoDate) {
  // Skip immediately if already known-404 or already in-flight (race condition guard)
  if (_odds404Dates.has(isoDate) || _oddsPendingDates.has(isoDate)) {
    return fetchStoredOdds(isoDate);
  }
  if (cfg.oddsGistId) {
    _oddsPendingDates.add(isoDate); // synchronous — must happen before any await
    try {
      const r = await fetch(
        `https://gist.githubusercontent.com/loganthein/${cfg.oddsGistId}/raw/locked-odds-${isoDate}.json`,
        { cache: 'no-store', signal: AbortSignal.timeout(6000) }
      );
      if (r.ok) {
        const data = await r.json();
        _oddsPendingDates.delete(isoDate);
        if (Array.isArray(data) && data.length) return oddsApiToCompact(data);
      } else if (r.status === 404) {
        _odds404Dates.add(isoDate);
      }
    } catch {}
    _oddsPendingDates.delete(isoDate);
  }
  return fetchStoredOdds(isoDate);
}

// Convert compact Gist format {home,away,spread,total} → minimal Odds API format
// so it works with getLine() and the rest of assembleGames()
function gistToOddsFormat(gistArr) {
  return gistArr.map(g => ({
    home_team: g.home,
    away_team: g.away,
    bookmakers: [{
      key: 'historical',
      markets: [
        ...(g.spread != null ? [{ key: 'spreads', outcomes: [
          { name: g.home, point: g.spread },
          { name: g.away, point: -g.spread },
        ]}] : []),
        ...(g.total != null ? [{ key: 'totals', outcomes: [
          { name: 'over',  point: g.total },
          { name: 'under', point: g.total },
        ]}] : []),
      ],
    }],
  }));
}

function matchStoredOdds(oddsArr, hKey, aKey) {
  return oddsArr.find(o => {
    const oh = matchTeam(o.home), oa = matchTeam(o.away);
    return (oh === hKey && oa === aKey) || (oh === aKey && oa === hKey);
  }) || null;
}

async function runBacktest() {
  const from = document.getElementById('bt-from').value;
  const to   = document.getElementById('bt-to').value;
  if (!from || !to || from > to) { document.getElementById('bt-results').innerHTML = '<div class="loading">Pick a valid date range.</div>'; return; }
  const dates = btDateRange(from, to);
  if (dates.length > 14) { document.getElementById('bt-results').innerHTML = '<div class="loading">Max 14 days at a time.</div>'; return; }
  if (!Object.keys(ratings).length) { document.getElementById('bt-results').innerHTML = '<div class="loading">Ratings not loaded yet — refresh the main view first.</div>'; return; }

  document.getElementById('bt-results').innerHTML = '<div class="loading">Fetching results…</div>';
  const all = [];
  for (const dateStr of dates) {
    const isoDate = `${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`;
    try {
      const [games, storedOdds] = await Promise.all([fetchESPNFinal(dateStr), fetchStoredOdds(isoDate)]);
      for (const g of games) {
        const hKey = matchTeam(g.home), aKey = matchTeam(g.away);
        const pred = predict(hKey, aKey, g.neutral);
        if (!pred) continue;
        const actual     = g.homeScore - g.awayScore;
        const actualTot  = g.homeScore + g.awayScore;
        const error      = Math.abs(actual - pred.margin);
        const odds       = matchStoredOdds(storedOdds, hKey, aKey);

        // ATS: did model's favored side cover the Vegas spread?
        let atsResult = null;
        if (odds?.spread != null) {
          const coverMargin = actual + odds.spread; // >0 = home covered
          if (coverMargin === 0) { atsResult = 'push'; }
          else { atsResult = (pred.margin >= 0) === (coverMargin > 0); } // model bet home ↔ home covered
        }

        // O/U: model total vs Vegas total
        let ouResult = null;
        if (odds?.total != null) {
          if (actualTot === odds.total) { ouResult = 'push'; }
          else { ouResult = (pred.total > odds.total) === (actualTot > odds.total); }
        }

        all.push({ dateStr, away: g.away, home: g.home, aKey, hKey,
          awayScore: g.awayScore, homeScore: g.homeScore, actualTot,
          actual, predicted: pred.margin, predTotal: pred.total,
          vegasSpread: odds?.spread, vegasTotal: odds?.total,
          error, correctSide: (actual > 0) === (pred.margin > 0),
          atsResult, ouResult });
      }
    } catch(e) { /* skip failed date */ }
  }

  if (!all.length) { document.getElementById('bt-results').innerHTML = '<div class="loading">No games with predictions found in that range.</div>'; return; }

  const oddsGames  = all.filter(g => g.vegasSpread != null || g.vegasTotal != null).length;
  const oddsNote   = oddsGames < all.length
    ? `${oddsGames}/${all.length} games have stored odds — ATS/O·U columns are blank for the rest.`
    : `All ${all.length} games have stored odds.`;

  const warning = `<div style="background:var(--warn-bg,#fff8e1);border:1px solid var(--warn-border,#f9a825);border-radius:6px;padding:.5rem .75rem;font-size:.72rem;color:var(--warn-text,#6d4c00);margin-bottom:.75rem;line-height:1.5">
    ⚠️ <strong>Lookahead bias:</strong> backtest uses <em>today's</em> Torvik ratings, not the ratings that existed on each game date — results are optimistic.
    Historical odds are stored daily to the Gist; ${oddsNote}
  </div>`;

  const mae       = all.reduce((s,g) => s + g.error, 0) / all.length;
  const within35  = all.filter(g => g.error <= 3.5).length / all.length * 100;
  const within7   = all.filter(g => g.error <= 7).length   / all.length * 100;
  const correct   = all.filter(g => g.correctSide).length  / all.length * 100;
  const atsGames  = all.filter(g => g.atsResult != null && g.atsResult !== 'push');
  const ouGames   = all.filter(g => g.ouResult  != null && g.ouResult  !== 'push');
  const atsWins   = atsGames.filter(g => g.atsResult === true).length;
  const ouWins    = ouGames.filter(g => g.ouResult  === true).length;

  const stats = `<div class="bt-stats">
    <div class="bt-stat"><div class="bt-stat-val">${all.length}</div><div class="bt-stat-lbl">Games</div></div>
    <div class="bt-stat"><div class="bt-stat-val">${mae.toFixed(1)}</div><div class="bt-stat-lbl">MAE (pts)</div></div>
    <div class="bt-stat"><div class="bt-stat-val">${within35.toFixed(0)}%</div><div class="bt-stat-lbl">Within 3.5</div></div>
    <div class="bt-stat"><div class="bt-stat-val">${within7.toFixed(0)}%</div><div class="bt-stat-lbl">Within 7</div></div>
    <div class="bt-stat"><div class="bt-stat-val">${correct.toFixed(0)}%</div><div class="bt-stat-lbl">Correct Side</div></div>
    ${atsGames.length ? `<div class="bt-stat"><div class="bt-stat-val">${atsWins}-${atsGames.length-atsWins}</div><div class="bt-stat-lbl">ATS</div></div>` : ''}
    ${ouGames.length  ? `<div class="bt-stat"><div class="bt-stat-val">${ouWins}-${ouGames.length-ouWins}</div><div class="bt-stat-lbl">O/U</div></div>` : ''}
  </div>`;

  // ATS breakdown by model edge size
  function gameEdge(g) {
    const sE = g.vegasSpread != null ? Math.abs(g.predicted + g.vegasSpread) : 0;
    const tE = g.vegasTotal  != null ? Math.abs(g.predTotal - g.vegasTotal)  : 0;
    return Math.max(sE, tE);
  }
  const buckets = [
    { label: '≥ 7 pt (Bet)',    min: 7        },
    { label: '4–7 pt (Lean)',   min: 4, max: 7 },
    { label: '< 4 pt',          min: 0, max: 4 },
  ];
  const edgeRows = buckets.map(b => {
    const bGames = all.filter(g => { const e = gameEdge(g); return e >= b.min && (b.max == null || e < b.max); });
    const bAts   = bGames.filter(g => g.atsResult != null && g.atsResult !== 'push');
    const bOu    = bGames.filter(g => g.ouResult  != null && g.ouResult  !== 'push');
    const bAtsW  = bAts.filter(g => g.atsResult === true).length;
    const bOuW   = bOu.filter(g => g.ouResult   === true).length;
    const atsPct = bAts.length ? (bAtsW / bAts.length * 100).toFixed(0) : '—';
    const ouPct  = bOu.length  ? (bOuW  / bOu.length  * 100).toFixed(0) : '—';
    const atsCls = bAts.length && bAtsW/bAts.length > 0.524 ? 'pos' : bAts.length ? 'neg' : 'neu';
    const ouCls  = bOu.length  && bOuW /bOu.length  > 0.524 ? 'pos' : bOu.length  ? 'neg' : 'neu';
    return `<tr>
      <td>${b.label}</td><td>${bGames.length}</td>
      <td class="fm-val ${atsCls}">${bAts.length ? `${bAtsW}-${bAts.length-bAtsW} (${atsPct}%)` : '—'}</td>
      <td class="fm-val ${ouCls}">${bOu.length  ? `${bOuW}-${bOu.length-bOuW} (${ouPct}%)` : '—'}</td>
    </tr>`;
  }).join('');
  const edgeBreakdown = `<div style="margin:.8rem 0 .4rem;font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.05em;">ATS BY EDGE SIZE (52.4% = breakeven at -110)</div>
  <table class="bt-table"><thead><tr><th>Edge Bucket</th><th>Games</th><th>ATS</th><th>O/U</th></tr></thead>
  <tbody>${edgeRows}</tbody></table>`;

  const rows = [...all].sort((a,b) => b.error - a.error).map(g => {
    const predFav = g.predicted >= 0 ? displayName(g.hKey,g.home) : displayName(g.aKey,g.away);
    const predPt  = Math.abs(g.predicted).toFixed(1);
    const errCls  = g.error <= 3.5 ? 'pos' : g.error <= 7 ? 'neu' : 'neg';
    const atsTd   = g.atsResult == null ? '<td class="fm-val neu">—</td>'
                  : g.atsResult === 'push' ? '<td class="fm-val neu">P</td>'
                  : `<td class="fm-val ${g.atsResult ? 'pos' : 'neg'}">${g.atsResult ? '✓' : '✗'}</td>`;
    const ouTd    = g.ouResult == null ? '<td class="fm-val neu">—</td>'
                  : g.ouResult === 'push' ? '<td class="fm-val neu">P</td>'
                  : `<td class="fm-val ${g.ouResult ? 'pos' : 'neg'}">${g.ouResult ? '✓' : '✗'}</td>`;
    const spreadStr = g.vegasSpread != null ? `${g.vegasSpread > 0 ? '+' : ''}${g.vegasSpread}` : '—';
    const totalStr  = g.vegasTotal  != null ? g.vegasTotal : '—';
    return `<tr>
      <td class="bt-date">${g.dateStr.slice(4,6)}/${g.dateStr.slice(6,8)}</td>
      <td>${esc(displayName(g.aKey,g.away))} @ ${esc(displayName(g.hKey,g.home))}</td>
      <td>${g.awayScore}–${g.homeScore} (${g.actualTot})</td>
      <td>${esc(predFav)} -${predPt} · ${g.predTotal.toFixed(0)}</td>
      <td>${spreadStr} / ${totalStr}</td>
      <td class="fm-val ${errCls}">${g.error.toFixed(1)}</td>
      ${atsTd}${ouTd}
    </tr>`;
  }).join('');

  document.getElementById('bt-results').innerHTML = warning + stats + edgeBreakdown + `
    <div style="margin:.8rem 0 .4rem;font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.05em;">GAME LOG</div>
    <table class="bt-table">
      <thead><tr><th>Date</th><th>Matchup</th><th>Result (Tot)</th><th>Model</th><th>Line / O·U</th><th>Err</th><th>ATS</th><th>O/U</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function getDateStr() {
  const v = document.getElementById('date-pick').value;
  return v ? v.replace(/-/g, '') : todayStr();
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function toISODate(dateStr) {
  return `${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`;
}


async function refresh() {
  document.getElementById('err-area').innerHTML = '';
  document.getElementById('game-list').innerHTML = '<div class="loading">Loading…</div>';

  const dateStr = getDateStr();
  const isoDate = toISODate(dateStr);

  try {
    await loadModelConfig();
    await Promise.all([
      loadConferences(),
      loadTorvik(),
      loadESPN(dateStr),
      loadRestData(dateStr),
      loadOdds(isoDate),
    ]);
    currentIsoDate = isoDate;
    render(assembleGames());
    // Secondary data loads in background — each re-renders when done
    loadRecentTorvik().then(() => render(assembleGames())).catch(() => {});
    loadInjuries().then(() => render(assembleGames())).catch(() => {});
    loadRefData().catch(() => {});  // no re-render needed — refs shown in modal on demand
    loadKenpomTeams().then(() => render(assembleGames())).catch(() => {});
    loadBettingData(isoDate).then(() => render(assembleGames())).catch(() => {});
  } catch(e) {
    document.getElementById('game-list').innerHTML = '<div class="loading">Error loading data.</div>';
    showErr(e.message || 'Unknown error');
    console.error(e);
  }
}

let mlbGameList = [];

function mlbGetDateStr() {

async function mlbRefresh() {

  try {

  } catch(e) {
    setSt('st-mlb-games', 'Games: error', 'err');
  }
  renderMLB();

async function loadMLBESPN(dateStr) {
  try {
    // seasontype=3 is Spring Training; switch to 2 for Regular Season
    const r = await fetch(
      `${MLB_ESPN_URL}?seasontype=2&dates=${dateStr}`,
      { signal: AbortSignal.timeout(10000) }
    );
    if (!r.ok) throw new Error(`ESPN MLB ${r.status}`);
    const d = await r.json();
    mlbGameList = (d.events || []).map(ev => {
      const comp = ev.competitions?.[0];
      const cs   = comp?.competitors || [];
      const home = cs.find(c => c.homeAway === 'home');
      const away = cs.find(c => c.homeAway === 'away');
      return {
        id:          ev.id,
        home:        home?.team?.displayName || '',
        away:        away?.team?.displayName || '',
        homeAbbr:    home?.team?.abbreviation || '',
        awayAbbr:    away?.team?.abbreviation || '',
        homeScore:   home?.score ?? '',
        awayScore:   away?.score ?? '',
        time:        ev.date,
        statusName:  comp?.status?.type?.name || '',
        shortDetail: comp?.status?.type?.shortDetail || '',
        inning:      comp?.status?.period || 0,
        venue:       comp?.venue?.fullName || '',
      };
    });
    setSt('st-mlb-games', `Games: ${mlbGameList.length}`, mlbGameList.length ? 'ok' : 'warn');
  } catch(e) {
    setSt('st-mlb-games', 'Games: fetch error', 'err');
    console.warn('loadMLBESPN failed:', e.message);
  }
}

// Implied probability from American odds (rounded to 1 dp)
function mlImp(ml) {
  const n = parseInt(ml) || 0;
  return n < 0
    ? (Math.abs(n) / (Math.abs(n) + 100) * 100).toFixed(1)
    : (100 / (n + 100) * 100).toFixed(1);
}

// ── Juice-scaled tier helper (shared by renderMLB and renderMLBTopPicks) ──────
// vegasJuice = the Vegas ML for the model-favored side (negative = favourite).
// Returns 'take', 'lean', or null.
function _juiceTier(diff, vegasJuice) {
  if (vegasJuice == null) return null;
  const abs = Math.abs(vegasJuice);
  if (abs >= 300) return null;
  if (abs >= 250) return diff >= 100 ? 'take' : diff >= 80  ? 'lean' : null;
  if (abs >= 200) return diff >= 80  ? 'take' : diff >= 55  ? 'lean' : null;
  if (abs >= 150) return diff >= 55  ? 'take' : diff >= 35  ? 'lean' : null;
  return              diff >= 35  ? 'take' : diff >= 20  ? 'lean' : null;
}

function renderMLB() {
  const el = document.getElementById('mlb-game-list');
  if (!el) return;
  if (!mlbGameList.length) {
    const _pb = document.getElementById('mlb-top-picks');
    if (_pb) { _pb.style.display = 'none'; _pb.innerHTML = ''; }
    el.innerHTML = '<div class="loading">No games found for this date.</div>';
    return;
  }
  el.innerHTML = mlbGameList.map(g => {
    g.parkFactor = getParkFactor(g.home);
    const pitchKey = `${normMLBTeam(g.away)}|${normMLBTeam(g.home)}`;
    const pitchers = mlbPitcherMap.get(pitchKey) || {};
    g.proj = calcMLBTotal(g, pitchers);
    const wp = predictMLBWinProb(g, pitchers);
    g.homeWinProb  = wp.homeWinProb;
    g.awayWinProb  = wp.awayWinProb;
    g.runDiff      = wp.runDiff;
    g.homeRuns     = wp.homeRuns;
    g.awayRuns     = wp.awayRuns;
    g.homeModelML  = probToML(wp.homeWinProb / 100);
    g.awayModelML  = probToML(wp.awayWinProb / 100);
    const oddsKey = `${normMLBTeam(g.home)}|${normMLBTeam(g.away)}`;
    g.mlbOdds = mlbOddsMap.get(oddsKey) || null;
    g.homeEdge = g.mlbOdds?.homeML != null
      ? Math.round((g.homeWinProb / 100 - mlAmericanToProb(g.mlbOdds.homeML)) * 100)
      : null;
    // Run line edge — use model's favored team's actual run line odds
    const homeFavored   = g.homeWinProb >= g.awayWinProb;
    const modelCover    = calcRunLineCoverProb(g.runDiff, homeFavored);
    g.rlFavTeam         = homeFavored ? g.home : g.away;
    g.rlModelCoverPct   = Math.round(modelCover * 100);
    // Find the model's favored team's -1.5 odds (only exists if they have point=-1.5)
    const modelFavRL    = homeFavored ? g.mlbOdds?.rlHomeML : g.mlbOdds?.rlAwayML;
    const modelFavPoint = homeFavored ? g.mlbOdds?.rlHomePoint : g.mlbOdds?.rlAwayPoint;
    g.rlModelFavML      = modelFavPoint === -1.5 ? modelFavRL : null;
    g.runLineEdge       = g.rlModelFavML != null
      ? Math.round((modelCover - mlAmericanToProb(g.rlModelFavML)) * 100)
      : null;
    // F5 model
    g.f5 = calcMLBF5(g, pitchers);
    g.f5HomeEdge = g.mlbOdds?.f5HomeML != null
      ? Math.round((g.f5.homeWinProb / 100 - mlAmericanToProb(g.mlbOdds.f5HomeML)) * 100)
      : null;
    g.f5TotalEdge = g.mlbOdds?.f5TotalLine != null
      ? Math.round((g.f5.total - g.mlbOdds.f5TotalLine) * 10) / 10
      : null;
    const live  = g.statusName === 'STATUS_IN_PROGRESS';
    const final = g.statusName === 'STATUS_FINAL';
    const gameTime = g.time
      ? new Date(g.time).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
      : '';

    let statusBadge;
    if (live) {
      statusBadge = `<span class="status-badge badge-live">● LIVE · ${g.shortDetail}</span>`;
    } else if (final) {
      statusBadge = `<span class="status-badge badge-final">Final · ${g.awayScore}–${g.homeScore}</span>`;
    } else {
      statusBadge = `<span class="status-badge badge-upcoming">${gameTime}</span>`;
    }

    let scoreHtml = '';
    if (live || final) {
      const hs = parseInt(g.homeScore) || 0;
      const as = parseInt(g.awayScore) || 0;
      const homeUp = hs > as, awayUp = as > hs;
      scoreHtml = `
        <div class="live-score-widget">
          <div class="live-score-row">
            <div class="live-score-team">
              <span class="live-score-name">${esc(g.away)}</span>
              <span class="live-score-pts${awayUp ? ' winning' : homeUp ? ' losing' : ''}">${as}</span>
            </div>
            <span class="live-score-sep">—</span>
            <div class="live-score-team live-score-team-home">
              <span class="live-score-name">${esc(g.home)}</span>
              <span class="live-score-pts${homeUp ? ' winning' : awayUp ? ' losing' : ''}">${hs}</span>
            </div>
          </div>
          ${live ? `<div class="live-score-clock">${g.shortDetail}</div>` : ''}
        </div>`;
    }

    const pitcherSlot = (side, p, oppTeam) => {
      const sv = (v) => v != null ? v : '—';
      const ph = (v) => v != null ? '' : ' ph';
      const score = ratePitcher(p);
      const scoreBadge = score == null ? '' : (() => {
        const cls = score > 0.1 ? 'mlb-quality-pos' : score < -0.1 ? 'mlb-quality-neg' : 'mlb-quality-neu';
        return `<span class="mlb-quality ${cls}">${score > 0 ? '+' : ''}${score.toFixed(2)}</span>`;
      })();
      const handBadge = p?.hand ? `<span class="mlb-hand">(${p.hand})</span>` : '';
      // Opposing offense vs this pitcher's hand
      const off = rateOffense(oppTeam, p?.hand);
      const oppCls = off ? (off.wrc > 105 ? ' mlb-opp-pos' : off.wrc < 95 ? ' mlb-opp-neg' : '') : '';
      return `
      <div class="mlb-pitcher">
        <div class="mlb-pitcher-side">${side} SP${p?.isFallback ? ' <span style="font-size:.5rem;color:var(--yellow);opacity:.7">2025</span>' : ''}</div>
        <div class="mlb-pitcher-name${p ? '' : ' mnum-placeholder'}">${esc(p?.name ?? 'TBD')}${handBadge}${scoreBadge}</div>
        <div class="mlb-pitcher-stats">
          <div class="mlb-pitcher-stat"><span class="mlb-pitcher-stat-lbl">ERA</span><span class="mlb-pitcher-stat-val${ph(p?.era)}">${sv(p?.era)}</span></div>
          <div class="mlb-pitcher-stat"><span class="mlb-pitcher-stat-lbl">FIP</span><span class="mlb-pitcher-stat-val${ph(p?.fip)}">${sv(p?.fip)}</span></div>
          <div class="mlb-pitcher-stat"><span class="mlb-pitcher-stat-lbl">WHIP</span><span class="mlb-pitcher-stat-val${ph(p?.whip)}">${sv(p?.whip)}</span></div>
          <div class="mlb-pitcher-stat"><span class="mlb-pitcher-stat-lbl">K/9</span><span class="mlb-pitcher-stat-val${ph(p?.k9)}">${sv(p?.k9)}</span></div>
          <div class="mlb-pitcher-stat"><span class="mlb-pitcher-stat-lbl">BB/9</span><span class="mlb-pitcher-stat-val${ph(p?.bb9)}">${sv(p?.bb9)}</span></div>
          <div class="mlb-pitcher-stat"><span class="mlb-pitcher-stat-lbl">IP</span><span class="mlb-pitcher-stat-val${ph(p?.ip)}">${sv(p?.ip)}</span></div>
          <div class="mlb-pitcher-stat"><span class="mlb-pitcher-stat-lbl">OPP</span><span class="mlb-pitcher-stat-val${off ? oppCls : ' ph'}">${off ? `${off.wrc} wRC+` : '—'}</span></div>
        </div>
      </div>`;
    };

    // ── Diff + bet signal pre-computation ──────────────────────────────────
    const homeModelMLNum  = parseInt(String(g.homeModelML)) || 0;
    const awayModelMLNum  = parseInt(String(g.awayModelML)) || 0;
    const vegasFavIsHome  = g.mlbOdds?.homeML != null && g.mlbOdds?.awayML != null && g.mlbOdds.homeML <= g.mlbOdds.awayML;
    const vegasFavVegasML = g.mlbOdds?.homeML != null && g.mlbOdds?.awayML != null
      ? (vegasFavIsHome ? g.mlbOdds.homeML : g.mlbOdds.awayML) : null;
    const vegasFavModelML = vegasFavIsHome ? homeModelMLNum : awayModelMLNum;
    const mlDiffSignedFav = vegasFavVegasML != null ? vegasFavModelML - vegasFavVegasML : null;
    const mlDiff          = mlDiffSignedFav != null ? Math.abs(mlDiffSignedFav) : null;
    const mlTier          = mlDiff != null ? _juiceTier(mlDiff, vegasFavVegasML) : null;
    const mlDiffCls       = mlTier === 'take' ? 'diff-green' : mlTier === 'lean' ? 'diff-yellow' : 'diff-gray';

    const totalDiff    = g.mlbOdds?.totalLine != null ? Math.round((g.proj.total - g.mlbOdds.totalLine) * 10) / 10 : null;
    const totalDiffAbs = totalDiff != null ? Math.abs(totalDiff) : null;
    const totalTier    = totalDiffAbs == null ? null : totalDiffAbs >= 1.5 ? 'take' : totalDiffAbs >= 1.0 ? 'lean' : null;
    const totalDiffCls = totalTier === 'take' ? 'diff-green' : totalTier === 'lean' ? 'diff-yellow' : 'diff-gray';

    // Run line: use model run diff vs Vegas -1.5; juice reference = Vegas ML for model-favored RL team
    const rlMargin       = Math.abs(g.runDiff);
    const _rlFavVegasML  = g.rlFavTeam === g.home ? g.mlbOdds?.homeML : g.mlbOdds?.awayML;
    const rlTier         = _juiceTier(rlMargin * 40, _rlFavVegasML); // scale margin to ~ML-point units
    const rlDiffCls      = rlTier === 'take' ? 'diff-green' : rlTier === 'lean' ? 'diff-yellow' : 'diff-gray';

    const f5Diff    = g.f5TotalEdge;
    const f5DiffAbs = f5Diff != null ? Math.abs(f5Diff) : null;
    const f5Tier    = f5DiffAbs == null ? null : f5DiffAbs >= 1.5 ? 'take' : f5DiffAbs >= 1.0 ? 'lean' : null;
    const f5DiffCls = f5Tier === 'take' ? 'diff-green' : f5Tier === 'lean' ? 'diff-yellow' : 'diff-gray';

    const _signals = [];
    if (mlTier && g.mlbOdds?.homeML != null && g.mlbOdds?.awayML != null) {
      // mlDiffSignedFav > 0 → Vegas fav overpriced → value on underdog
      // mlDiffSignedFav < 0 → Vegas fav underpriced → value on fav
      const _mlValHome    = mlDiffSignedFav != null && (mlDiffSignedFav <= 0) === vegasFavIsHome;
      const _mlValShort   = (_mlValHome ? g.home : g.away).split(' ').pop();
      const _mlValVegasML = _mlValHome ? g.mlbOdds.homeML : g.mlbOdds.awayML;
      const _mlValFmt     = `${_mlValVegasML > 0 ? '+' : ''}${_mlValVegasML}`;
      _signals.push({ tier: mlTier, diffSize: mlDiff,
        text: mlTier === 'take' ? `Bet ${_mlValShort} ML — take ${_mlValFmt} or better` : `Lean ${_mlValShort} ML` });
    }
    if (totalTier && totalDiff != null) {
      const _dir = totalDiff < 0 ? 'Under' : 'Over';
      const _ln  = g.mlbOdds.totalLine;
      _signals.push({ tier: totalTier, diffSize: totalDiffAbs,
        text: totalTier === 'take'
          ? `Bet ${_dir} — take ${_ln}${totalDiff < 0 ? ' or higher' : ' or lower'}`
          : `Lean ${_dir} — take if you can get ${_ln}${totalDiff < 0 ? ' or higher' : ' or lower'}` });
    }
    if (rlTier) {
      const _rfShort = g.rlFavTeam.split(' ').pop();
      const _rdShort = (g.rlFavTeam === g.home ? g.away : g.home).split(' ').pop();
      _signals.push({ tier: rlTier, diffSize: rlMargin * 40,
        text: rlTier === 'take'
          ? (rlMargin >= 2.0 ? `Bet ${_rfShort} -1.5` : `Bet ${_rdShort} +1.5`)
          : `Lean ${_rfShort} -1.5` });
    }
    if (f5Tier && f5Diff != null) {
      const _dir = f5Diff < 0 ? 'Under' : 'Over';
      const _ln  = g.mlbOdds?.f5TotalLine;
      _signals.push({ tier: f5Tier, diffSize: f5DiffAbs,
        text: f5Tier === 'take'
          ? `Bet F5 ${_dir} — take ${_ln}${f5Diff < 0 ? ' or higher' : ' or lower'}`
          : `Lean F5 ${_dir}` });
    }
    _signals.sort((a, b) => (a.tier === 'take' ? 0 : 1) - (b.tier === 'take' ? 0 : 1) || b.diffSize - a.diffSize);
    const _best = _signals[0] || null;
    const betSignalHtml = _best
      ? `<div class="mlb-bet-signal ${_best.tier}"><span class="mlb-bet-icon">${_best.tier === 'take' ? '🔥' : '📊'}</span><span class="mlb-bet-text">${esc(_best.text)}</span></div>`
      : '';

    return `
      <div class="card" id="mlb-game-${g.id}">
        <div class="card-hd">
          <div class="card-hd-teams">
            <span class="team-away">${esc(g.away)}</span>
            <span class="card-vs">@</span>
            <span class="team-home">${esc(g.home)}</span>
          </div>
          <div>${statusBadge}</div>
        </div>
        ${scoreHtml}
        <div class="mlb-proj-score">
          <div class="mlb-proj-line">
            <span>${esc(g.away.split(' ').pop())}</span>
            <span class="mlb-proj-team-score">${g.awayRuns.toFixed(1)}</span>
            <span class="mlb-proj-sep">—</span>
            <span class="mlb-proj-team-score">${g.homeRuns.toFixed(1)}</span>
            <span>${esc(g.home.split(' ').pop())}</span>
          </div>
        </div>
        <table class="mlb-diff-table">
          <tr>
            <th></th>
            <th>ML</th>
            <th>Total</th>
            <th>Run Line</th>
            <th>F5</th>
          </tr>
          <tr>
            <td>Vegas</td>
            <td>${vegasFavVegasML != null ? `${vegasFavVegasML > 0 ? '+' : ''}${vegasFavVegasML} <span class="mlb-impl">(${mlImp(vegasFavVegasML)}%)</span><span style="font-size:.5rem;color:var(--muted)"> ${vegasFavIsHome ? '(home)' : '(away)'}</span>` : '—'}</td>
            <td>${g.mlbOdds?.totalLine != null ? `o${g.mlbOdds.totalLine}` : '—'}</td>
            <td>${g.mlbOdds?.rlFavTeam ? `${esc(g.mlbOdds.rlFavTeam.split(' ').pop())} -1.5` : '—'}</td>
            <td>${g.mlbOdds?.f5TotalLine != null ? `o${g.mlbOdds.f5TotalLine}` : '—'}</td>
          </tr>
          <tr>
            <td>Model</td>
            <td>${vegasFavVegasML != null ? `${vegasFavModelML > 0 ? '+' : ''}${vegasFavModelML} <span class="mlb-impl">(${mlImp(vegasFavModelML)}%)</span>` : '—'}</td>
            <td>${g.proj.total.toFixed(1)}</td>
            <td>${g.runDiff >= 0 ? '+' : ''}${g.runDiff.toFixed(1)}</td>
            <td>${g.f5.total.toFixed(1)}</td>
          </tr>
          <tr class="mlb-dt-diff">
            <td>Diff</td>
            <td class="${mlDiffCls}">${mlDiffSignedFav != null ? `${mlDiffSignedFav > 0 ? '+' : ''}${mlDiffSignedFav}` : '—'}</td>
            <td class="${totalDiffCls}">${totalDiff != null ? `${totalDiff > 0 ? '+' : ''}${totalDiff.toFixed(1)}` : '—'}</td>
            <td class="${rlDiffCls}">${`${g.runDiff >= 0 ? '+' : ''}${g.runDiff.toFixed(1)}`}</td>
            <td class="${f5DiffCls}">${f5Diff != null ? `${f5Diff > 0 ? '+' : ''}${f5Diff.toFixed(1)}` : '—'}</td>
          </tr>
        </table>
        ${betSignalHtml}
        <div class="mlb-pitchers">
          ${pitcherSlot('Away', pitchers.away, g.home)}
          <div class="mlb-pitcher-div"></div>
          ${pitcherSlot('Home', pitchers.home, g.away)}
        </div>
        <div class="card-ft" style="justify-content:flex-end;">
          <button class="gd-btn" onclick="event.stopPropagation();showMLBGameModal('${g.id}')">Details</button>
        </div>
      </div>`;
  }).join('');
  renderMLBTopPicks(mlbGameList);
}

// ── MLB Top Picks bar ─────────────────────────────────────────────────────────
function renderMLBTopPicks(games) {
  const bar = document.getElementById('mlb-top-picks');
  if (!bar) return;

  const takes = [], leans = [];

  for (const g of games) {
    if (g.homeWinProb == null) continue; // projections not computed yet

    // ML
    const homeModelMLNum  = parseInt(String(g.homeModelML)) || 0;
    const awayModelMLNum  = parseInt(String(g.awayModelML)) || 0;
    const vegasFavIsHome  = g.mlbOdds?.homeML != null && g.mlbOdds?.awayML != null && g.mlbOdds.homeML <= g.mlbOdds.awayML;
    const vegasFavVegasML = g.mlbOdds?.homeML != null && g.mlbOdds?.awayML != null
      ? (vegasFavIsHome ? g.mlbOdds.homeML : g.mlbOdds.awayML) : null;
    const vegasFavModelML = vegasFavIsHome ? homeModelMLNum : awayModelMLNum;
    const mlDiffSignedFav = vegasFavVegasML != null ? vegasFavModelML - vegasFavVegasML : null;
    const mlDiff          = mlDiffSignedFav != null ? Math.abs(mlDiffSignedFav) : null;
    const mlTier          = mlDiff != null ? _juiceTier(mlDiff, vegasFavVegasML) : null;

    // Total
    const totalDiff    = g.mlbOdds?.totalLine != null ? Math.round((g.proj.total - g.mlbOdds.totalLine) * 10) / 10 : null;
    const totalDiffAbs = totalDiff != null ? Math.abs(totalDiff) : null;
    const totalTier    = totalDiffAbs == null ? null : totalDiffAbs >= 1.5 ? 'take' : totalDiffAbs >= 1.0 ? 'lean' : null;

    // Run line
    const rlMargin     = Math.abs(g.runDiff || 0);
    const rlFavVegasML = g.rlFavTeam === g.home ? g.mlbOdds?.homeML : g.mlbOdds?.awayML;
    const rlTier       = _juiceTier(rlMargin * 40, rlFavVegasML);

    // F5 total
    const f5DiffAbs = g.f5TotalEdge != null ? Math.abs(g.f5TotalEdge) : null;
    const f5Tier    = f5DiffAbs == null ? null : f5DiffAbs >= 1.5 ? 'take' : f5DiffAbs >= 1.0 ? 'lean' : null;

    if (mlTier && g.mlbOdds?.homeML != null && g.mlbOdds?.awayML != null) {
      const mlValHome    = mlDiffSignedFav != null && (mlDiffSignedFav <= 0) === vegasFavIsHome;
      const mlValShort   = (mlValHome ? g.home : g.away).split(' ').pop();
      const mlValVegasML = mlValHome ? g.mlbOdds.homeML : g.mlbOdds.awayML;
      const mlValFmt     = `${mlValVegasML > 0 ? '+' : ''}${mlValVegasML}`;
      const text = mlTier === 'take' ? `Bet ${mlValShort} ML — take ${mlValFmt} or better` : `Lean ${mlValShort} ML`;
      (mlTier === 'take' ? takes : leans).push({ g, betType: 'ML', tier: mlTier, text, diffSize: mlDiff, mlValHome });
    }

    if (totalTier && totalDiff != null) {
      const dir  = totalDiff < 0 ? 'Under' : 'Over';
      const ln   = g.mlbOdds.totalLine;
      const text = totalTier === 'take'
        ? `Bet ${dir} — take ${ln}${totalDiff < 0 ? ' or higher' : ' or lower'}`
        : `Lean ${dir} — take if you can get ${ln}${totalDiff < 0 ? ' or higher' : ' or lower'}`;
      (totalTier === 'take' ? takes : leans).push({ g, betType: 'Total', tier: totalTier, text, diffSize: totalDiffAbs });
    }

    if (rlTier) {
      const rfShort = g.rlFavTeam.split(' ').pop();
      const rdShort = (g.rlFavTeam === g.home ? g.away : g.home).split(' ').pop();
      const text    = rlTier === 'take'
        ? (rlMargin >= 2.0 ? `Bet ${rfShort} -1.5` : `Bet ${rdShort} +1.5`)
        : `Lean ${rfShort} -1.5`;
      (rlTier === 'take' ? takes : leans).push({ g, betType: 'Run Line', tier: rlTier, text, diffSize: rlMargin * 40 });
    }

    if (f5Tier && g.f5TotalEdge != null) {
      const dir  = g.f5TotalEdge < 0 ? 'Under' : 'Over';
      const ln   = g.mlbOdds?.f5TotalLine;
      const text = f5Tier === 'take'
        ? `Bet F5 ${dir} — take ${ln}${g.f5TotalEdge < 0 ? ' or higher' : ' or lower'}`
        : `Lean F5 ${dir}`;
      (f5Tier === 'take' ? takes : leans).push({ g, betType: 'F5', tier: f5Tier, text, diffSize: f5DiffAbs });
    }
  }

  takes.sort((a, b) => b.diffSize - a.diffSize);
  leans.sort((a, b) => b.diffSize - a.diffSize);

  if (!takes.length && !leans.length) {
    bar.style.display = 'none';
    bar.innerHTML = '';
    return;
  }

  // Top 5 combined: Takes first (already strongest), fill remainder with Leans
  const topTakes = takes.slice(0, 5);
  const topLeans = leans.slice(0, Math.max(0, 5 - topTakes.length));

  const pickCard = p => {
    const aShort = p.g.away.split(' ').pop();
    const hShort = p.g.home.split(' ').pop();
    // main = short action label; why = full signal text
    const mainText = (() => {
      if (p.betType === 'ML')       return `${(p.mlValHome ? p.g.home : p.g.away).split(' ').pop()} ML`;
      if (p.betType === 'Total')    return `${p.g.proj.total > (p.g.mlbOdds?.totalLine ?? 0) ? 'Over' : 'Under'} ${p.g.mlbOdds?.totalLine}`;
      if (p.betType === 'Run Line') {
        const _showFav = Math.abs(p.g.runDiff) >= 2.0;
        const _rlTeam  = _showFav ? p.g.rlFavTeam : (p.g.rlFavTeam === p.g.home ? p.g.away : p.g.home);
        return `${_rlTeam.split(' ').pop()} ${_showFav ? '-1.5' : '+1.5'}`;
      }
      if (p.betType === 'F5')       return `F5 ${(p.g.f5TotalEdge ?? 0) > 0 ? 'Over' : 'Under'} ${p.g.mlbOdds?.f5TotalLine}`;
      return p.betType;
    })();
    const tierIcon = p.tier === 'take' ? '🔥' : '📊';
    return `<div class="pick-card ${p.tier === 'take' ? 'hot' : 'warm'}" onclick="document.getElementById('mlb-game-${p.g.id}')?.scrollIntoView({behavior:'smooth',block:'center'})">
      <div class="pick-matchup">${esc(aShort)} @ ${esc(hShort)}</div>
      <div class="pick-main">${esc(mainText)}</div>
      <div class="pick-meta">
        <span class="pick-edge" style="font-size:.85rem;line-height:1.2">${tierIcon}</span>
        <span class="pick-type-tag">${esc(p.betType)}</span>
      </div>
      <div class="pick-why">${esc(p.text)}</div>
    </div>`;
  };

  const divider = topTakes.length && topLeans.length ? '<div class="picks-divider"></div>' : '';
  const cards   = [...topTakes.map(pickCard), divider, ...topLeans.map(pickCard)].join('');

  bar.style.display = '';
  bar.innerHTML = `
    <div class="picks-header">
      <span class="top-picks-title">Today's MLB Picks</span>
      <div class="picks-accuracy" id="mlb-picks-accuracy-row">
        <span class="acc-badge" style="opacity:.5">Loading record…</span>
      </div>
    </div>
    <div class="picks-row">${cards}</div>`;

  loadMLBRecord();
}

// ── MLB historical record (Takes only, from mlb-log Gist files) ───────────────
const MLB_ACC_START_DATE = '2026-03-27';
let _mlbAccCache = null, _mlbAccCacheTs = 0;

function _mlbLogSignal(entry) {
  const m = entry.model, v = entry.vegas;
  if (!m || !v) return null;
  const homeModelMLNum = parseInt(String(m.homeModelML)) || 0;
  const mlDiff         = v.homeML != null ? Math.abs(homeModelMLNum - v.homeML) : null;
  const mlFavVegasML   = m.homeWinProb >= m.awayWinProb ? v.homeML : v.awayML;
  const mlTier         = mlDiff != null ? _juiceTier(mlDiff, mlFavVegasML) : null;

  const totalDiffAbs = v.totalLine != null && m.total != null
    ? Math.abs(Math.round((m.total - v.totalLine) * 10) / 10) : null;
  const totalTier    = totalDiffAbs == null ? null : totalDiffAbs >= 1.5 ? 'take' : null;

  const rlMargin     = Math.abs(m.runDiff || 0);
  const rlFavVegasML = (m.rlFavTeam === entry.home) ? v.homeML : v.awayML;
  const rlTier       = _juiceTier(rlMargin * 40, rlFavVegasML);

  const f5DiffAbs = m.f5Total != null && v.f5TotalLine != null
    ? Math.abs(Math.round((m.f5Total - v.f5TotalLine) * 10) / 10) : null;
  const f5Tier    = f5DiffAbs == null ? null : f5DiffAbs >= 1.5 ? 'take' : null;

  const candidates = [];
  if (mlTier    === 'take') candidates.push({ type: 'ml',    diffSize: mlDiff });
  if (totalTier === 'take') candidates.push({ type: 'total', diffSize: totalDiffAbs, modelDir: m.total > v.totalLine ? 'over' : 'under' });
  if (rlTier    === 'take') candidates.push({ type: 'rl',    diffSize: rlMargin * 40 });
  if (f5Tier    === 'take') candidates.push({ type: 'f5',    diffSize: f5DiffAbs, modelDir: m.f5Total > v.f5TotalLine ? 'over' : 'under' });
  candidates.sort((a, b) => b.diffSize - a.diffSize);
  return candidates[0] ?? null;
}

function _scoreMLBTake(entry, take) {
  const r = entry.result;
  if (!r) return null;
  if (take.type === 'ml')    return r.mlCorrect === true ? 'W' : r.mlCorrect === false ? 'L' : null;
  if (take.type === 'rl')    return r.rlResult === 'cover' ? 'W' : r.rlResult === 'no_cover' ? 'L' : null;
  if (take.type === 'total') return r.ouResult === 'push' || r.ouResult == null ? null : (take.modelDir === r.ouResult ? 'W' : 'L');
  if (take.type === 'f5')    return r.f5OuResult === 'push' || r.f5OuResult == null ? null : (take.modelDir === r.f5OuResult ? 'W' : 'L');
  return null;
}

async function loadMLBRecord() {
  if (!cfg.oddsGistId) return;
  const now = Date.now();
  if (_mlbAccCache && (now - _mlbAccCacheTs) < 30 * 60 * 1000) {
    _renderMLBRecordBadge(_mlbAccCache);
    return;
  }
  const pad = n => String(n).padStart(2, '0');
  const toISO = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const today    = new Date();
  const weekAgo  = toISO(new Date(today.getTime() - 7  * 86400000));
  const monthAgo = toISO(new Date(today.getTime() - 30 * 86400000));
  const dates = [];
  for (let i = 30; i >= 1; i--) {
    const d = new Date(today.getTime() - i * 86400000);
    const s = toISO(d);
    if (s >= MLB_ACC_START_DATE) dates.push(s);
  }
  const wk = { w: 0, l: 0 }, mo = { w: 0, l: 0 };
  await Promise.all(dates.map(async dateStr => {
    try {
      const r = await fetch(
        `https://gist.githubusercontent.com/loganthein/${cfg.oddsGistId}/raw/mlb-log-${dateStr}.json`,
        { cache: 'no-store', signal: AbortSignal.timeout(5000) }
      );
      if (!r.ok) return;
      const log = await r.json();
      for (const entry of (Array.isArray(log) ? log : [])) {
        if (!entry.result) continue;
        const take = _mlbLogSignal(entry);
        if (!take) continue;
        const score = _scoreMLBTake(entry, take);
        if (!score) continue;
        mo[score === 'W' ? 'w' : 'l']++;
        if (dateStr >= weekAgo) wk[score === 'W' ? 'w' : 'l']++;
      }
    } catch(e) { /* skip */ }
  }));
  _mlbAccCache = { wk, mo };
  _mlbAccCacheTs = now;
  _renderMLBRecordBadge(_mlbAccCache);
}

function _renderMLBRecordBadge({ wk, mo }) {
  const row = document.getElementById('mlb-picks-accuracy-row');
  if (!row) return;
  const badge = (lbl, { w, l }) => {
    const tot = w + l;
    if (!tot) return `<span class="acc-badge">${lbl}: <span class="acc-pct">—</span></span>`;
    const pct = Math.round(w / tot * 100);
    const cls = pct >= 60 ? 'acc-good' : pct < 50 ? 'acc-bad' : '';
    return `<span class="acc-badge ${cls}" title="Takes only">${lbl} <span class="acc-pct">${w}-${l}</span> <span style="opacity:.55">${pct}%</span></span>`;
  };
  row.innerHTML = badge('Week', wk) + badge('Month', mo);
}

// ── MLB probable pitchers (MLB Stats API — free, no auth) ────────────────────
let mlbPitcherMap = new Map(); // normalized "away|home" → { away, home }

function normMLBTeam(name) {
  return name.toLowerCase().replace(/[^a-z]/g, '');
}

function parsePitcher(p) {
  if (!p) return null;
  const full   = p.fullName || '';
  const parts  = full.trim().split(' ');
  const short  = parts.length >= 2 ? `${parts[0][0]}. ${parts.slice(1).join(' ')}` : full;
  const seasonEntry = (p.stats || []).find(s =>
    s.group?.displayName === 'pitching' && s.type?.displayName === 'season'
  );
  const season = seasonEntry?.splits?.[0]?.stat || seasonEntry?.stats || {};
  const ip     = parseFloat(season.inningsPitched) || 0;
  const eraRaw = season.era  != null ? parseFloat(season.era)  : null;
  const fipRaw = season.fip  != null ? parseFloat(season.fip)  : null;
  return {
    name: short || 'TBD',
    hand: p.pitchHand?.code || null,
    era:  eraRaw != null ? eraRaw.toFixed(2) : null,
    fip:  fipRaw != null ? fipRaw.toFixed(2) : null,
    fipRaw,
    eraRaw,
    whip: season.whip != null ? parseFloat(season.whip).toFixed(2) : null,
    k9:   ip > 0 && season.strikeOuts  != null ? (season.strikeOuts  / ip * 9).toFixed(1) : null,
    bb9:  ip > 0 && season.baseOnBalls != null ? (season.baseOnBalls / ip * 9).toFixed(1) : null,
    ip:   season.inningsPitched ?? null,
    isFallback: true,
  };
}

// Pitcher quality score: positive = better than average, negative = worse
// Uses FIP as primary signal; falls back to ERA if FIP unavailable
// Baseline 4.50 ≈ league-average FIP over recent MLB seasons
function ratePitcher(p) {
  if (!p) return null;
  const base = p.fipRaw ?? p.eraRaw;
  if (base == null) return null;
  return Math.round((4.50 - base) * 100) / 100;
}

async function loadMLBPitchers(dateStr) {
  const isoDate = `${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`;
  try {
    // Step 1: get schedule + probable pitcher IDs
    const r = await fetch(
      `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${isoDate}&gameType=R&hydrate=probablePitcher`,
      { signal: AbortSignal.timeout(10000) }
    );
    if (!r.ok) throw new Error(`MLB Stats API ${r.status}`);
    const d = await r.json();

    // Collect pitcher IDs, team IDs, and build game stubs
    const pitcherIds = new Set();
    const teamIdMap  = new Map(); // normTeamName → { teamId, teamName }
    const gameStubs  = [];
    for (const dateEntry of (d.dates || [])) {
      for (const game of (dateEntry.games || [])) {
        const awayP = game.teams?.away?.probablePitcher || null;
        const homeP = game.teams?.home?.probablePitcher || null;
        if (awayP?.id) pitcherIds.add(awayP.id);
        if (homeP?.id) pitcherIds.add(homeP.id);

        const awayName = game.teams?.away?.team?.name || '';
        const homeName = game.teams?.home?.team?.name || '';
        const awayId   = game.teams?.away?.team?.id;
        const homeId   = game.teams?.home?.team?.id;
        if (awayId) teamIdMap.set(normMLBTeam(awayName), { teamId: awayId, teamName: awayName });
        if (homeId) teamIdMap.set(normMLBTeam(homeName), { teamId: homeId, teamName: homeName });

        gameStubs.push({ awayName, homeName, awayP, homeP });
      }
    }

    // Step 2: batch fetch 2025 pitching stats for all pitchers in one request
    const statsById = {};
    if (pitcherIds.size > 0) {
      const ids = [...pitcherIds].join(',');
      const sr = await fetch(
        `https://statsapi.mlb.com/api/v1/people?personIds=${ids}` +
        `&hydrate=stats(group=pitching,type=season,season=2025)`,
        { signal: AbortSignal.timeout(10000) }
      );
      if (sr.ok) {
        const sd = await sr.json();
        for (const person of (sd.people || [])) {
          statsById[person.id] = { stats: person.stats || [], pitchHand: person.pitchHand };
        }
      }
    }

    // Step 3: merge stats into pitcher objects and build map
    mlbPitcherMap = new Map();
    for (const { awayName, homeName, awayP, homeP } of gameStubs) {
      if (awayP?.id) { awayP.stats = statsById[awayP.id]?.stats || []; awayP.pitchHand = awayP.pitchHand || statsById[awayP.id]?.pitchHand; }
      if (homeP?.id) { homeP.stats = statsById[homeP.id]?.stats || []; homeP.pitchHand = homeP.pitchHand || statsById[homeP.id]?.pitchHand; }
      const key = `${normMLBTeam(awayName)}|${normMLBTeam(homeName)}`;
      mlbPitcherMap.set(key, {
        away: parsePitcher(awayP),
        home: parsePitcher(homeP),
      });
    }

    // Step 4: expose teamIdMap for bullpen fetch (awaited in mlbRefresh)
    _lastTeamIdMap = teamIdMap;
  } catch(e) {
    console.warn('loadMLBPitchers failed:', e.message);
  }
}

// ── MLB bullpen quality map ───────────────────────────────────────────────────
// normTeamName → { score, era, seasonIp, recentIp }
// score: positive = better than avg bullpen (same scale as ratePitcher)
let mlbBullpenMap = new Map();
let _lastTeamIdMap = new Map();

// Baseline league-average bullpen ERA (relievers run ~4.20 vs ~4.50 for starters)
const BP_BASELINE_ERA = 4.20;
const BP_MIN_RECENT_IP = 10; // minimum IP in last-15 window to use blended weight

// MLB Stats API team name → normalized ESPN display name (when they differ)
const BULLPEN_ALIASES = { athletics: 'oaklandathletics' };

async function loadMLBBullpens(isoDate, teamIdMap) {
  if (!teamIdMap.size) return;

  const d15 = new Date(isoDate);
  d15.setDate(d15.getDate() - 15);
  const startDate = d15.toISOString().slice(0, 10);

  // Helper: extract relief pitcher ERA weighted by IP from a stats API response
  function extractBullpen(data) {
    const splits = data?.stats?.[0]?.splits ?? [];
    let totalIp = 0, eraTotalWt = 0;
    for (const s of splits) {
      const gs  = s.stat?.gamesStarted ?? 0;
      const gp  = s.stat?.gamesPlayed  ?? s.stat?.gamesPitched ?? 1;
      // Classify as reliever: zero starts, or starts < 30% of appearances
      if (gs > 0 && gs / gp >= 0.30) continue;
      const ip  = parseFloat(s.stat?.inningsPitched) || 0;
      if (ip <= 0) continue;
      const era = parseFloat(s.stat?.era);
      if (isNaN(era)) continue;
      totalIp   += ip;
      eraTotalWt += era * ip;
    }
    if (totalIp === 0) return null;
    return { era: eraTotalWt / totalIp, ip: totalIp };
  }

  await Promise.all([...teamIdMap.entries()].map(async ([normName, { teamId }]) => {
    try {
      const base = `https://statsapi.mlb.com/api/v1/stats?group=pitching&sportId=1&season=2025&teamId=${teamId}&playerPool=All&limit=60`;
      const [seasonData, recentData] = await Promise.all([
        fetch(`${base}&stats=season`,          { signal: AbortSignal.timeout(8000) }).then(r => r.ok ? r.json() : null),
        fetch(`${base}&stats=byDateRange&startDate=${startDate}&endDate=${isoDate}`,
              { signal: AbortSignal.timeout(8000) }).then(r => r.ok ? r.json() : null),
      ]);

      const season = extractBullpen(seasonData);
      if (!season) return;

      const recent = extractBullpen(recentData);
      const blendedEra = (recent && recent.ip >= BP_MIN_RECENT_IP)
        ? season.era * (2/3) + recent.era * (1/3)
        : season.era;

      const storeKey = BULLPEN_ALIASES[normName] ?? normName;
      mlbBullpenMap.set(storeKey, {
        score:    Math.round((BP_BASELINE_ERA - blendedEra) * 100) / 100,
        era:      Math.round(blendedEra * 100) / 100,
        seasonIp: season.ip,
        recentIp: recent?.ip ?? 0,
      });
    } catch(e) {
      console.warn(`loadMLBBullpens: ${normName} failed`, e.message);
    }
  }));
}

function getParkFactor(homeTeam) {
  return (homeTeam && MLB_PARK_FACTORS[normMLBTeam(homeTeam)]) || { name: 'Unknown', factor: 1.00, handAdj: 0 };
}

// ── MLB team offense splits vs pitcher handedness (static 2024-season wRC+) ──
// FanGraphs blocks cross-origin requests; static table avoids CORS entirely.
// wRC+ 100 = league average. vsL = vs LHP, vsR = vs RHP. Update each spring.
// Source: FanGraphs 2025 final season team wRC+ splits by pitcher handedness
// Best available proxy for 2026 — no public source publishes preseason team-level vsL/vsR splits

let mlbOffenseMap = new Map(); // normalized team name → { wrcVsL, wrcVsR }

async function loadMLBOffense() {
  mlbOffenseMap = new Map(
    Object.entries(MLB_WRC_STATIC).map(([k, v]) => [k, { wrcVsL: v.vsL, wrcVsR: v.vsR }])
  );
}

// Offensive rating vs pitcher handedness
// Returns (wRC+ − 100) / 20: avg = 0, +20 pts above avg = +1.0, −20 pts = −1.0
// Also returns raw wRC+ for display
function rateOffense(teamName, pitcherHand) {
  if (!teamName) return null;
  const entry = mlbOffenseMap.get(normMLBTeam(teamName));
  if (!entry) return null;
  let wrc;
  if (pitcherHand === 'L') {
    wrc = entry.wrcVsL;
  } else if (pitcherHand === 'R') {
    wrc = entry.wrcVsR;
  } else {
    // Hand unknown (common in Spring Training) — use average of splits
    wrc = (entry.wrcVsL + entry.wrcVsR) / 2;
  }
  if (wrc == null) return null;
  return { wrc: Math.round(wrc), score: Math.round((wrc - 100) / 20 * 100) / 100 };
}

// ── MLB run total projection (Sprint 4) ──────────────────────────────────────
// Returns { total, hp, ap, ho, ao, pf } — stored on g for card display + modal breakdown.
// Missing data (no pitcher stats in Spring Training) defaults to 0 (league average).
function calcMLBTotal(g, pitchers) {
  const hp = ratePitcher(pitchers.home) ?? 0; // home starter quality (null → avg)
  const ap = ratePitcher(pitchers.away) ?? 0; // away starter quality
  const ho = rateOffense(g.home, pitchers.away?.hand)?.score ?? 0;
  const ao = rateOffense(g.away, pitchers.home?.hand)?.score ?? 0;
  const pf = (g.parkFactor || getParkFactor(g.home)).factor;

  // Bullpen quality for each team (0 = league average when no data)
  const homeBp = mlbBullpenMap.get(normMLBTeam(g.home))?.score ?? 0;
  const awayBp = mlbBullpenMap.get(normMLBTeam(g.away))?.score ?? 0;

  // Effective pitching quality: starter × 5/9 + bullpen × 4/9
  const homeEffP = hp * (5/9) + homeBp * (4/9);
  const awayEffP = ap * (5/9) + awayBp * (4/9);

  let total = 9.0;
  total -= homeEffP + awayEffP;
  total += (ho + ao) * 2.0;
  total *= pf;
  total = Math.max(5.5, Math.min(14.0, total));
  return { total: Math.round(total * 10) / 10, hp, ap, ho, ao, pf, homeBp, awayBp };
}

// ── MLB moneyline win probability (Sprint 5) ─────────────────────────────────
function predictMLBWinProb(g, pitchers) {
  const hp = ratePitcher(pitchers.home) ?? 0;
  const ap = ratePitcher(pitchers.away) ?? 0;
  const ho = rateOffense(g.home, pitchers.away?.hand)?.score ?? 0;
  const ao = rateOffense(g.away, pitchers.home?.hand)?.score ?? 0;
  const pf = (g.parkFactor || getParkFactor(g.home)).factor;

  const homeBp = mlbBullpenMap.get(normMLBTeam(g.home))?.score ?? 0;
  const awayBp = mlbBullpenMap.get(normMLBTeam(g.away))?.score ?? 0;

  // Runs allowed by each team's PITCHING STAFF (opponent scores against it)
  // Away pitching (SP + BP) suppresses home runs; home pitching suppresses away runs
  const effAP = ap * (5/9) + awayBp * (4/9); // away staff effectiveness vs home bats
  const effHP = hp * (5/9) + homeBp * (4/9); // home staff effectiveness vs away bats

  let homeRuns = (9.0 / 2) - effAP + ho * 2.0;
  let awayRuns = (9.0 / 2) - effHP + ao * 2.0;
  homeRuns *= pf;
  awayRuns *= pf * 0.95; // road penalty

  const runDiff = homeRuns - awayRuns;
  let homeWinProb = 1 / (1 + Math.exp(-runDiff * 0.35));
  homeWinProb += 0.025; // home field advantage
  homeWinProb = Math.max(0.30, Math.min(0.75, homeWinProb));
  return {
    homeWinProb: Math.round(homeWinProb * 100),
    awayWinProb: Math.round((1 - homeWinProb) * 100),
    runDiff,
    homeRuns: Math.round(homeRuns * 10) / 10,
    awayRuns: Math.round(awayRuns * 10) / 10,
  };
}

// Probability the favored team covers -1.5 run line
// homeFavored=true  → P(home wins by 2+) using home runDiff
// homeFavored=false → P(away wins by 2+) using away runDiff
function calcRunLineCoverProb(runDiff, homeFavored) {
  const favoredDiff = homeFavored ? runDiff : -runDiff;
  return 1 / (1 + Math.exp(-(favoredDiff - 1.5) * 0.45));
}

// Convert American moneyline to implied probability (vig-inclusive)
function mlAmericanToProb(ml) {
  if (ml == null) return null;
  return ml > 0 ? 100 / (ml + 100) : (-ml) / (-ml + 100);
}

// Convert win probability to American moneyline
function probToML(prob) {
  if (prob == null) return null;
  if (prob >= 0.5) return Math.round(-(prob / (1 - prob)) * 100);
  return Math.round(((1 - prob) / prob) * 100); // positive number, fmtML adds '+'
}

// ── MLB odds (h2h moneylines from centralized Gist) ──────────────────────────
let mlbOddsMap = new Map(); // "normHome|normAway" → { homeML, awayML }

async function loadMLBOdds() {
  if (!cfg.oddsGistId) return;
  const dateStr = mlbGetDateStr();
  const isoDate = `${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`;
  try {
    const r = await fetch(
      `https://gist.githubusercontent.com/loganthein/${cfg.oddsGistId}/raw/mlb-odds-${isoDate}.json`,
      { cache: 'no-store', signal: AbortSignal.timeout(8000) }
    );
    if (!r.ok) return;
    const data = await r.json();
    mlbOddsMap = new Map();
    for (const game of (Array.isArray(data) ? data : [])) {
      const markets  = game.bookmakers?.[0]?.markets ?? [];
      const h2h      = markets.find(m => m.key === 'h2h');
      const spreads  = markets.find(m => m.key === 'spreads');
      const totals   = markets.find(m => m.key === 'totals');
      const f5h2h    = markets.find(m => m.key === 'h2h_1st_5_innings');
      const f5spreads= markets.find(m => m.key === 'spreads_1st_5_innings');
      const f5totals = markets.find(m => m.key === 'totals_1st_5_innings');
      if (!h2h) continue;
      const homeOut    = h2h.outcomes.find(o => o.name === game.home_team);
      const awayOut    = h2h.outcomes.find(o => o.name === game.away_team);
      // Run line: store per-team so we can look up model's favored team
      const rlHomeOut  = spreads?.outcomes?.find(o => o.name === game.home_team);
      const rlAwayOut  = spreads?.outcomes?.find(o => o.name === game.away_team);
      // Legacy -1.5 lookup (kept for modal display)
      const rlFavOut   = spreads?.outcomes?.find(o => o.point === -1.5);
      const rlDogOut   = spreads?.outcomes?.find(o => o.point ===  1.5);
      // Full game total (over)
      const totalOver = totals?.outcomes?.find(o => o.name === 'Over');
      // F5 markets
      const f5HomeOut = f5h2h?.outcomes?.find(o => o.name === game.home_team);
      const f5AwayOut = f5h2h?.outcomes?.find(o => o.name === game.away_team);
      const f5RlFav   = f5spreads?.outcomes?.find(o => o.point === -0.5);
      const f5Over    = f5totals?.outcomes?.find(o => o.name === 'Over');
      const key = `${normMLBTeam(game.home_team)}|${normMLBTeam(game.away_team)}`;
      mlbOddsMap.set(key, {
        homeML:      homeOut?.price   ?? null,
        awayML:      awayOut?.price   ?? null,
        rlHomePoint: rlHomeOut?.point ?? null,
        rlHomeML:    rlHomeOut?.price ?? null,
        rlAwayPoint: rlAwayOut?.point ?? null,
        rlAwayML:    rlAwayOut?.price ?? null,
        rlFavTeam:   rlFavOut?.name   ?? null, // team with -1.5 in odds
        rlFavML:     rlFavOut?.price  ?? null,
        rlDogML:     rlDogOut?.price  ?? null,
        totalLine:   totalOver?.point ?? null,
        totalOverML: totalOver?.price ?? null,
        f5HomeML:    f5HomeOut?.price ?? null,
        f5AwayML:    f5AwayOut?.price ?? null,
        f5RlFavTeam: f5RlFav?.name   ?? null,
        f5RlFavML:   f5RlFav?.price  ?? null,
        f5TotalLine: f5Over?.point   ?? null,
        f5TotalOverML: f5Over?.price ?? null,
      });
    }
    setSt('st-mlb-odds', `Odds: ${mlbOddsMap.size} games`, mlbOddsMap.size ? 'ok' : 'warn');
  } catch(e) {
    console.warn('loadMLBOdds failed:', e.message);
    setSt('st-mlb-odds', 'Odds: fetch error', 'err');
  }
}

// ── MLB First 5 innings model ─────────────────────────────────────────────────
// F5 = starter-only slice: same pitcher quality + offense signals, scaled 5/9.
// Bullpen excluded by design — that's the entire point of F5 betting.
const F5_SCALE = 5 / 9;

function calcMLBF5(g, pitchers) {
  const hp = ratePitcher(pitchers.home) ?? 0;
  const ap = ratePitcher(pitchers.away) ?? 0;
  const ho = rateOffense(g.home, pitchers.away?.hand)?.score ?? 0;
  const ao = rateOffense(g.away, pitchers.home?.hand)?.score ?? 0;
  const pf = (g.parkFactor || getParkFactor(g.home)).factor;

  let total = (9.0 - (hp + ap) + (ho + ao) * 2.0) * F5_SCALE * pf;
  total = Math.max(2.5, Math.min(7.5, Math.round(total * 10) / 10));

  // Win probability — starter differential only, smaller home bump
  let homeRuns = ((9.0 / 2) - ap + ho * 2.0) * F5_SCALE * pf;
  let awayRuns = ((9.0 / 2) - hp + ao * 2.0) * F5_SCALE * pf * 0.97;
  const runDiff = homeRuns - awayRuns;
  let homeWinProb = 1 / (1 + Math.exp(-runDiff * 0.45));
  homeWinProb += 0.015; // smaller home field bump in F5
  homeWinProb = Math.max(0.30, Math.min(0.72, homeWinProb));
  return {
    total,
    hp, ap, ho, ao, pf,
    homeWinProb: Math.round(homeWinProb * 100),
    awayWinProb: Math.round((1 - homeWinProb) * 100),
    homeModelML: probToML(homeWinProb),
    awayModelML: probToML(1 - homeWinProb),
  };
}

  // ── First 5 Innings ──
  const f5 = g.f5 || calcMLBF5(g, pitchers);
  const f5VegasHomeProb = g.mlbOdds?.f5HomeML != null ? mlAmericanToProb(g.mlbOdds.f5HomeML) : null;
  const f5VegasAwayProb = g.mlbOdds?.f5AwayML != null ? mlAmericanToProb(g.mlbOdds.f5AwayML) : null;
  html += `<div class="gd-section">
    <div class="gd-section-title">First 5 Innings</div>
    <table class="gd-table">
      <tr><th>Team</th><th>Model %</th><th>Model ML</th><th>Vegas ML</th><th>Edge</th></tr>
      <tr>
        <td>${esc(g.away)}</td>
        <td>${f5.awayWinProb}%</td>
        <td>${fmtML(f5.awayModelML)}</td>
        <td>${fmtML(g.mlbOdds?.f5AwayML ?? null)}</td>
        <td>${edgePct(f5.awayWinProb / 100, f5VegasAwayProb)}</td>
      </tr>
      <tr>
        <td>${esc(g.home)}</td>
        <td>${f5.homeWinProb}%</td>
        <td>${fmtML(f5.homeModelML)}</td>
        <td>${fmtML(g.mlbOdds?.f5HomeML ?? null)}</td>
        <td>${edgePct(f5.homeWinProb / 100, f5VegasHomeProb)}</td>
      </tr>
    </table>
    <div class="gd-summary-row" style="margin-top:.6rem;font-size:.85rem;border-top:1px solid var(--border);padding-top:.5rem">
      <span style="font-weight:600">F5 Projected Total</span>
      <span style="color:var(--blue);font-weight:700;font-size:1rem">${f5.total.toFixed(1)}</span>
    </div>
    ${g.mlbOdds?.f5TotalLine != null ? `
    <div class="gd-summary-row" style="margin-top:.35rem;font-size:.8rem">
      <span style="color:var(--muted)">Vegas F5 Total</span>
      <span style="color:var(--muted)">o/u ${g.mlbOdds.f5TotalLine}</span>
    </div>
    <div class="gd-summary-row" style="margin-top:.2rem;font-size:.8rem">
      <span style="color:var(--muted)">Total edge</span>
      <span class="${g.f5TotalEdge > 0.3 ? 'gd-edge-pos' : g.f5TotalEdge < -0.3 ? 'gd-edge-neg' : 'gd-edge-neu'}">${g.f5TotalEdge > 0 ? '+' : ''}${g.f5TotalEdge} runs vs line</span>
    </div>` : '<div style="color:var(--muted);font-size:.72rem;margin-top:.35rem">No Vegas F5 odds available.</div>'}
    ${g.mlbOdds?.f5RlFavTeam ? `<div style="color:var(--muted);font-size:.7rem;margin-top:.3rem">F5 run line: ${esc(g.mlbOdds.f5RlFavTeam.split(' ').pop())} -0.5 (${fmtML(g.mlbOdds.f5RlFavML)})</div>` : ''}
    <div style="color:var(--muted);font-size:.68rem;margin-top:.4rem">F5 model uses starter quality only — no bullpen. Scaled to 5 innings.</div>
  </div>`;

  // ── Bullpen ──
  html += `<div class="gd-section">
    <div class="gd-section-title">Bullpen</div>
    <div style="color:var(--muted);font-size:.82rem;padding:.25rem 0">Bullpen data planned for a future sprint.</div>
  </div>`;

  document.getElementById('gd-body').innerHTML = html;
  document.getElementById('gd-overlay').classList.add('open');
}

// Edge tooltip — fixed-position to escape overflow-clipped containers
(function() {
  const tip = document.createElement('div');
  tip.id = 'edge-tooltip';
  document.body.appendChild(tip);
  document.addEventListener('mouseover', e => {
    const el = e.target.closest('.edge-tip');
    if (!el) return;
    tip.textContent = el.dataset.tip;
    tip.style.display = 'block';
  });
  document.addEventListener('mousemove', e => {
    if (tip.style.display === 'none') return;
    tip.style.left = (e.clientX - tip.offsetWidth / 2) + 'px';
    tip.style.top  = (e.clientY + 14) + 'px';
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('.edge-tip')) tip.style.display = 'none';
  });
})();
</script>
