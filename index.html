      const aSprBets  = aSpread?.bet_info?.tickets?.percent  ?? 0;
      const hSprMny   = hSpread?.bet_info?.money?.percent    ?? 0;
      const aSprMny   = aSpread?.bet_info?.money?.percent    ?? 0;
      const overBets  = overTotal?.bet_info?.tickets?.percent ?? 0;
      const underBets = underTotal?.bet_info?.tickets?.percent ?? 0;
      const overMny   = overTotal?.bet_info?.money?.percent   ?? 0;
      const underMny  = underTotal?.bet_info?.money?.percent  ?? 0;

      if (!hSprBets && !aSprBets && !overBets && !underBets) continue;

// ══════════════════════════════════════════════════════════
// MODEL
// ══════════════════════════════════════════════════════════

// Normal CDF approximation (Abramowitz & Stegun) — for win probability
function normalCDF(z) {
  const p = 0.2316419;
  const c = [0.319381530, -0.356563782, 1.781477937, -1.821255978, 1.330274429];
  const t = 1 / (1 + p * Math.abs(z));
  const poly = t * (c[0] + t * (c[1] + t * (c[2] + t * (c[3] + t * c[4]))));
  const phi = Math.exp(-z * z / 2) / Math.sqrt(2 * Math.PI);
  const result = 1 - phi * poly;
  return z >= 0 ? result : 1 - result;
}
// Empirical std dev of model errors (fitted from 16k games via optimize.py)
const NCAAB_SIGMA = 12.5;

// Estimate point impact of a team's injuries; cap at 4 pts
function injuryImpact(injuries) {
  const SEVERITY = { 'Out': 1.0, 'Injured Reserve': 1.0, 'Doubtful': 0.7, 'Day-To-Day': 0.4, 'injured': 0.9 };
  const BASE_PTS = 2.5; // pts a full-time (40 mpg) starter contributes when removed
  let total = 0;
  for (const inj of (injuries || [])) {
    const sev   = SEVERITY[inj.status] ?? 0.5;
    const usage = (inj.mpg || 18) / 40;
    total += sev * usage * BASE_PTS;
  }
  return Math.min(total, 4);
}

// Predict game: returns { margin, total, hScore, aScore, hRating, aRating, homeWinProb, awayWinProb }
// margin > 0 → home team wins by that many (after home court adj)
// hOverride/aOverride: optional pre-blended rating objects (for form adjustment)
function predict(homeKey, awayKey, neutral, hOverride = null, aOverride = null) {
  const h = hOverride || ratings[homeKey];
  const a = aOverride || ratings[awayKey];
  if (!h || !a) return null;

  // Geometric mean of tempos biases slightly toward the slower team — more realistic
  // than a simple average, which overestimates pace when tempos are mismatched
  const poss   = Math.sqrt(h.adjT * a.adjT);
  // Normalize adjD against D1 average (~104.82) so adjO is used as absolute pts/100poss
  // and adjD scales relative to average defense. scoreScale ≈ 1.0 with this formulation.
  const AVG_ADJ_D = 106.09;  // updated to 2024-25 D1 average (was 104.82 = 2022-23 era)
  const hScore = h.adjO * (a.adjD / AVG_ADJ_D) * poss / 100 * cfg.scoreScale;
  const aScore = a.adjO * (h.adjD / AVG_ADJ_D) * poss / 100 * cfg.scoreScale;

  const hc     = neutral ? 0 : cfg.homeCourt;
  const margin = (hScore - aScore) + hc;  // positive = home favored

  const homeWinProb = Math.round(normalCDF(margin / NCAAB_SIGMA) * 100);

  return {
    margin:  Math.round(margin  * 10) / 10,
    total:   Math.round(((hScore + aScore) * 0.847 + 18.7 + cfg.totalOffset) * 10) / 10,
    hScore:  Math.round((hScore + hc / 2) * 10) / 10,
    aScore:  Math.round((aScore - hc / 2) * 10) / 10,
    hRating: h,
    aRating: a,
    homeWinProb,
    awayWinProb: 100 - homeWinProb,
  };
}

// Form blending weight — empirically validated at 0 (Torvik already incorporates recency)
const FORM_WEIGHT = 0.0;
function blendRatings(key) {
  const base = ratings[key];
  if (!base) return null;
  const recent = Object.keys(recentRatings).length ? recentRatings[key] : null;
  if (!recent) return base;
  return {
    ...base,
    adjO: base.adjO * (1 - FORM_WEIGHT) + recent.adjO * FORM_WEIGHT,
    adjD: base.adjD * (1 - FORM_WEIGHT) + recent.adjD * FORM_WEIGHT,
  };
}

// Net form score: positive = trending up offensively, negative = struggling
// adjO up + adjD down = trending up (good). Units: effective pts/100poss
function getFormDelta(key) {
  if (!key || !Object.keys(recentRatings).length) return null;
  const base = ratings[key], recent = recentRatings[key];
  if (!base || !recent) return null;
  const dO = recent.adjO - base.adjO;  // positive = scoring better lately
  const dD = recent.adjD - base.adjD;  // negative = defending better lately
  const net = Math.round((dO - dD) * 10) / 10; // higher = better form overall
  return { dO: Math.round(dO * 10) / 10, dD: Math.round(dD * 10) / 10, net };
}

// Extract consensus (averaged) line from all bookmakers for a given market
function getLine(bookmakers, market, homeTeamKey) {
  const allPts = {};
  for (const bm of bookmakers) {
    const mkt = bm.markets?.find(m => m.key === market);
    if (!mkt) continue;
    for (const o of mkt.outcomes || []) {
      // totals outcomes are "Over"/"Under" — not team names, skip matchTeam
      const k = market === 'totals' ? normTeam(o.name) : (matchTeam(o.name) || normTeam(o.name));
      if (!allPts[k]) allPts[k] = [];
      allPts[k].push(o.point);
    }
  }
  if (!Object.keys(allPts).length) return null;

  if (market === 'spreads') {
    // Identify the favorite by spread value (most negative point), then convert
    // to home-team perspective. Using the spread value as the primary signal
    // avoids name-resolution collisions that can flip the sign.
    const pts = [];
    for (const bm of bookmakers) {
      const mkt = bm.markets?.find(m => m.key === 'spreads');
      if (!mkt) continue;
      const outcomes = (mkt.outcomes || []).filter(o => o.point != null);
      if (!outcomes.length) continue;
      // Favorite = outcome with the lowest (most negative) point
      const fav = outcomes.reduce((a, b) => a.point <= b.point ? a : b);
      const favKey = matchTeam(fav.name) || normTeam(fav.name);
      // Favorite is home → use their point directly (negative = home favored)
      // Favorite is away → negate to get home-underdog perspective (positive)
      pts.push(favKey === homeTeamKey ? fav.point : -fav.point);
    }
    if (!pts.length) return null;
    const avg = pts.reduce((s, p) => s + p, 0) / pts.length;
    return { point: Math.round(avg * 2) / 2 };
  }
  if (market === 'totals') {
    const overPts = (allPts['over'] || allPts[Object.keys(allPts).find(k => k.includes('over'))] || []);
    if (!overPts.length) return null;
    const avg = overPts.reduce((s, p) => s + p, 0) / overPts.length;
    return { point: Math.round(avg * 2) / 2 };
  }
  return null;
}

// ══════════════════════════════════════════════════════════
// ASSEMBLE: pair ESPN + Torvik + Odds
// ══════════════════════════════════════════════════════════
function assembleGames() {
  const openSnap = lockedOddsList.length ? lockedOddsList : null;

  return espnList.map(g => {
    const hKey = matchTeam(g.home);
    const aKey = matchTeam(g.away);

    // Conferences (needed for travel calc)
    const hConf = (hKey && ratings[hKey]?.conf) || teamIdToConf[g.homeTeamId] || confIdMap[g.homeConfId] || '';
    const aConf = (aKey && ratings[aKey]?.conf) || teamIdToConf[g.awayTeamId] || confIdMap[g.awayConfId] || '';

    // Form-blended ratings for predict()
    const pred = predict(hKey, aKey, g.neutral, blendRatings(hKey), blendRatings(aKey));

    // Match current odds
    const oddsGame = oddsList.find(og => {
      const oh = matchTeam(og.home_team), oa = matchTeam(og.away_team);
      return (oh === hKey && oa === aKey) || (oh === aKey && oa === hKey);
    });
    let vegasSpread = null, vegasTotal = null;
    if (oddsGame) {
      vegasSpread = getLine(oddsGame.bookmakers, 'spreads', hKey);
      vegasTotal  = getLine(oddsGame.bookmakers, 'totals',  hKey);
    }

    // Opening line movement
    const openGame = openSnap?.find(og => {
      const oh = matchTeam(og.home_team), oa = matchTeam(og.away_team);
      return (oh === hKey && oa === aKey) || (oh === aKey && oa === hKey);
    });
    const openSpread = openGame ? getLine(openGame.bookmakers, 'spreads', hKey) : null;
    const openTotal  = openGame ? getLine(openGame.bookmakers, 'totals',  hKey) : null;
    const spreadMove = (vegasSpread && openSpread && vegasSpread.point !== openSpread.point)
      ? Math.round((vegasSpread.point - openSpread.point) * 10) / 10 : null;
    const totalMove = (vegasTotal && openTotal && vegasTotal.point !== openTotal.point)
      ? Math.round((vegasTotal.point - openTotal.point) * 10) / 10 : null;

    // Rest: days since last game (1 = B2B, 2-3 = short rest, 4+ = normal)
    const hDaysRest = teamDaysRest[g.homeTeamId] ?? 7;
    const aDaysRest = teamDaysRest[g.awayTeamId] ?? 7;
    const hB2B = hDaysRest === 1;
    const aB2B = aDaysRest === 1;

    // Apply rest adjustments to prediction
    if (pred) {
      const B2B_PEN = 1.8; // calibrated from 16k game dataset
      let restAdj = 0;
      // B2B penalty (plays yesterday)
      if (hB2B) restAdj -= B2B_PEN;
      if (aB2B) restAdj += B2B_PEN;
      // Rest differential (0.15 pts/day) tested against 16k games — adds noise, no signal. Removed.
      if (restAdj !== 0) {
        pred.margin += restAdj;
        pred.total  -= Math.abs(restAdj) * 0.4; // fatigued team scores less overall
        pred.margin  = Math.round(pred.margin * 10) / 10;
        pred.total   = Math.round(pred.total  * 10) / 10;
        pred.homeWinProb = Math.round(normalCDF(pred.margin / NCAAB_SIGMA) * 100);
        pred.awayWinProb = 100 - pred.homeWinProb;
      }
    }

    // Travel adjustment: away team crossing 2+ time zones gets a small penalty
    const hTz = CONF_TZ[hConf] ?? 0;
    const aTz = CONF_TZ[aConf] ?? 0;
    const travelDiff = !g.neutral ? Math.abs(aTz - hTz) : 0;
    if (pred && travelDiff >= 2) {
      pred.margin += 0.75; // slight home team boost
      pred.margin = Math.round(pred.margin * 10) / 10;
      pred.homeWinProb = Math.round(normalCDF(pred.margin / NCAAB_SIGMA) * 100);
      pred.awayWinProb = 100 - pred.homeWinProb;
    }

    // Injury data: apply MPG-weighted impact to model predictions
    const hInjuries = injuryMap[g.homeTeamId] || [];
    const aInjuries = injuryMap[g.awayTeamId] || [];
    if (pred && (hInjuries.length || aInjuries.length)) {
      const hInj = injuryImpact(hInjuries);
      const aInj = injuryImpact(aInjuries);
      const injAdj = aInj - hInj; // +ve = away team more impacted → home favored more
      if (Math.abs(injAdj) >= 0.3) {
        pred.margin += injAdj;
        pred.margin  = Math.round(pred.margin * 10) / 10;
        pred.homeWinProb = Math.round(normalCDF(pred.margin / NCAAB_SIGMA) * 100);
        pred.awayWinProb = 100 - pred.homeWinProb;
      }
      if (hInj + aInj >= 0.5) {
        pred.total  -= (hInj + aInj) * 0.35; // both teams missing players → lower total
        pred.total   = Math.round(pred.total * 10) / 10;
      }
    }

    const hForm = getFormDelta(hKey);
    const aForm = getFormDelta(aKey);

    // Refs: officials from ESPN + KenPom tendency lookup
    const refs = g.officials || [];
    const refStats = refs.map(name => {
      const s = refData[name.toLowerCase()];
      return s ? { name, ...s } : { name };
    });

    // Public betting % from ActionNetwork
    const betting = bettingMap[`${hKey}|${aKey}`] || null;

    return {
      ...g, hKey, aKey, pred, vegasSpread, vegasTotal,
      hConf, aConf,
      spreadMove, totalMove,
      hB2B, aB2B, hDaysRest, aDaysRest,
      hInjuries, aInjuries,
      hForm, aForm,
      awayTravel: travelDiff >= 2,
      refs, refStats, betting,
      hLuck: kenpomTeams[hKey]?.luck,
      aLuck: kenpomTeams[aKey]?.luck,
    };
  });
}

// RENDER
// ══════════════════════════════════════════════════════════
function fmtSpread(n) {
  if (n == null) return '—';
  const v = parseFloat(n);
  return v > 0 ? `+${v}` : String(v);
}

function edgeCls(e) {
  const a = Math.abs(e);
  return a >= 7 ? 'strong' : a >= 4 ? 'mod' : 'neg';
}

// Projected final total based on current score and time elapsed
function calcLivePace(g) {
  if (!g.period || !g.clock) return null;
  const parts = g.clock.split(':');
  if (parts.length !== 2) return null;
  const secs = parseInt(parts[0]) * 60 + parseInt(parts[1]);
  if (isNaN(secs)) return null;
  const half = 20 * 60; // 1200 seconds per half
  let elapsed;
  if (g.period === 1)      elapsed = half - secs;
  else if (g.period === 2) elapsed = half + (half - secs);
  else return null; // OT: skip pace
  if (elapsed < 90) return null; // too early — projection unreliable
  const curr = (parseInt(g.homeScore) || 0) + (parseInt(g.awayScore) || 0);
  return Math.round(curr / (elapsed / (40 * 60)) * 10) / 10;
}

// ── Live auto-refresh ──────────────────────────────────────
let _liveTimer = null;
let _lastESPNRefresh = null;

function startLiveRefresh() {
  if (_liveTimer) return;
  _liveTimer = setInterval(async () => {
    try {
      await loadESPN(getDateStr());
      _lastESPNRefresh = new Date();
      render(assembleGames());
    } catch(e) { /* silent — will retry next interval */ }
  }, 45000);
}

function stopLiveRefresh() {
  if (_liveTimer) { clearInterval(_liveTimer); _liveTimer = null; }
}

function renderFactors(g) {
  const { pred } = g;
  if (!pred) return '';
  const a = pred.aRating, h = pred.hRating;
  if (!a.oEfg || !h.oEfg) return ''; // four factors not in data

  // For each factor: compute matchup delta = offense value vs what opponent's defense allows
  // Positive = offense exceeds what defense allows (good for offense), except TO% where negative is good
  const factors = [
    { name: 'eFG%',  aDelta: a.oEfg - h.dEfg, hDelta: h.oEfg - a.dEfg, invert: false, fmt: v => (v > 0 ? '+' : '') + v.toFixed(1) },
    { name: 'TO%',   aDelta: a.oTo  - h.dTo,  hDelta: h.oTo  - a.dTo,  invert: true,  fmt: v => (v > 0 ? '+' : '') + v.toFixed(1) },
    { name: 'OR%',   aDelta: a.oOr  - h.dOr,  hDelta: h.oOr  - a.dOr,  invert: false, fmt: v => (v > 0 ? '+' : '') + v.toFixed(1) },
    { name: 'FTR',   aDelta: a.oFtr - h.dFtr, hDelta: h.oFtr - a.dFtr, invert: false, fmt: v => (v > 0 ? '+' : '') + v.toFixed(2) },
  ];

  function edgeCls(delta, invert) {
    const v = invert ? -delta : delta;
    return v >= 1 ? 'pos' : v <= -1 ? 'neg' : 'neu';
  }

  const cells = factors.map(f => `
    <div class="factor-cell">
      <div class="factor-name">${f.name}</div>
      <div class="fm-row"><span class="fm-side">A</span><span class="fm-val ${edgeCls(f.aDelta, f.invert)}">${f.fmt(f.aDelta)}</span></div>
      <div class="fm-row"><span class="fm-side">H</span><span class="fm-val ${edgeCls(f.hDelta, f.invert)}">${f.fmt(f.hDelta)}</span></div>
    </div>`).join('');

  return `<div class="factors-wrap"><div class="factors-title">Four Factors Matchup</div><div class="factors-grid">${cells}</div></div>`;
}

function getAdvice(g) {
  const { pred, vegasSpread, vegasTotal } = g;
  if (!pred) return { text: 'No data', cls: 'cm-act-none' };

  const hShort = displayName(g.hKey, g.home);
  const aShort = displayName(g.aKey, g.away);

  const sEdge = vegasSpread ? pred.margin - (-vegasSpread.point) : null;
  const tEdge = vegasTotal  ? pred.total - vegasTotal.point      : null;

  const sAbs = sEdge !== null ? Math.abs(sEdge) : 0;
  const tAbs = tEdge !== null ? Math.abs(tEdge) : 0;

  const spreadTeam = sEdge !== null ? (sEdge > 0 ? hShort : aShort) : null;
  const totalDir   = tEdge !== null ? (tEdge > 0 ? 'Over'  : 'Under') : null;

  const sStrong = sAbs >= 6, sLean = sAbs >= 3;
  const tStrong = tAbs >= 8,  tLean = tAbs >= 5;

  if (!sLean && !tLean) return { text: 'No Action', cls: 'cm-act-none' };

  const parts = [];
  if (sLean) parts.push(`${sStrong ? 'Take' : 'Lean'} ${spreadTeam}`);
  if (tLean) parts.push(`${tStrong ? 'Take the' : 'Lean'} ${totalDir}`);

  const cls = (sStrong || tStrong) ? 'cm-act-strong' : 'cm-act-lean';
  return { text: parts.join(' · '), cls };
}

function renderMobileCard(g) {
  const { pred, vegasSpread, vegasTotal } = g;
  const live  = g.statusName === 'STATUS_IN_PROGRESS' || g.statusName === 'STATUS_HALFTIME';
  const final = g.statusName === 'STATUS_FINAL';

  // Status badge
  const gameTime = g.time ? new Date(g.time).toLocaleTimeString([], { hour:'numeric', minute:'2-digit' }) : '';
  const badge = live  ? `<span class="status-badge badge-live">● ${esc(g.shortDetail)}</span>`
              : final ? `<span class="status-badge badge-final">Final</span>`
              :         `<span class="status-badge badge-upcoming">${gameTime}</span>`;

  // Teams
  const aRank = g.awayRank <= 25 ? `<span class="cm-rank">#${g.awayRank}</span>` : '';
  const hRank = g.homeRank <= 25 ? `<span class="cm-rank">#${g.homeRank}</span>` : '';
  const aName = esc(displayName(g.aKey, g.away));
  const hName = esc(displayName(g.hKey, g.home));
  const be = bestEdge(g);
  const hotCls = be >= 7 ? ' cm-hot' : be >= 4 ? ' cm-warm' : '';

  // Spread row
  let spreadRow;
  if (!pred) {
    spreadRow = `<div class="cm-row"><span class="cm-lbl">Spread</span><span class="cm-val cm-muted">No data</span></div>`;
  } else {
    const modelSpreadPt = -pred.margin;
    const modelStr = fmtSpread(modelSpreadPt.toFixed(1));
    const mFav = esc(spreadFavName(modelSpreadPt, g.hKey, g.home, g.aKey, g.away));
    if (vegasSpread) {
      const vFav = esc(spreadFavName(vegasSpread.point, g.hKey, g.home, g.aKey, g.away));
      const edge = pred.margin - (-vegasSpread.point);
      const eCls = Math.abs(edge) >= 7 ? ' cm-good' : Math.abs(edge) >= 4 ? ' cm-mod' : '';
      const smv = g.spreadMove != null && Math.abs(g.spreadMove) >= 0.5 ? `<span class="line-move ${g.spreadMove > 0 ? 'lm-up' : 'lm-dn'}">${g.spreadMove > 0 ? '↑' : '↓'}${Math.abs(g.spreadMove).toFixed(1)}</span>` : '';
      spreadRow = `<div class="cm-row">
        <span class="cm-lbl">Spread</span>
        <span class="cm-val">${modelStr} <span class="cm-fav">${mFav}</span></span>
        <span class="cm-vs">vs</span>
        <span class="cm-vval">${fmtSpread(vegasSpread.point)} <span class="cm-fav">${vFav}</span></span>
        ${smv}
        <span class="cm-edge${eCls}">${edge > 0 ? '+' : ''}${edge.toFixed(1)}</span>
      </div>`;
    } else {
      spreadRow = `<div class="cm-row"><span class="cm-lbl">Spread</span><span class="cm-val">${modelStr} <span class="cm-fav">${mFav}</span></span><span class="cm-vval" style="color:var(--muted);margin-left:.4rem">no line</span></div>`;
    }
  }

  // O/U row
  let totalRow;
  if (!pred) {
    totalRow = `<div class="cm-row"><span class="cm-lbl">O/U</span><span class="cm-val cm-muted">No data</span></div>`;
  } else {
    const modelTot = pred.total.toFixed(1);
    if (vegasTotal) {
      const edge = pred.total - vegasTotal.point;
      const eCls = Math.abs(edge) >= 7 ? ' cm-good' : Math.abs(edge) >= 4 ? ' cm-mod' : '';
      const tmv = g.totalMove != null && Math.abs(g.totalMove) >= 0.5 ? `<span class="line-move ${g.totalMove > 0 ? 'lm-up' : 'lm-dn'}">${g.totalMove > 0 ? '↑' : '↓'}${Math.abs(g.totalMove).toFixed(1)}</span>` : '';
      totalRow = `<div class="cm-row">
        <span class="cm-lbl">O/U</span>
        <span class="cm-val">${modelTot}</span>
        <span class="cm-vs">vs</span>
        <span class="cm-vval">${vegasTotal.point}</span>
        ${tmv}
        <span class="cm-edge${eCls}">${edge > 0 ? '+' : ''}${edge.toFixed(1)}</span>
      </div>`;
    } else {
      totalRow = `<div class="cm-row"><span class="cm-lbl">O/U</span><span class="cm-val">${modelTot}</span><span class="cm-vval" style="color:var(--muted);margin-left:.4rem">no line</span></div>`;
    }
  }

  // Score row (live + final) — score and clock only
  let scoreHtml = '';
  if (live || final) {
    const hs = parseInt(g.homeScore) || 0;
    const as = parseInt(g.awayScore) || 0;
    const aLead = as > hs, hLead = hs > as;
    const clockStr = final ? 'Final' : (g.shortDetail || '');
    scoreHtml = `<div class="cm-score">
      <span class="cm-pts${aLead ? ' cm-lead' : ''}">${as}</span>
      <span class="cm-score-sep">—</span>
      <span class="cm-pts${hLead ? ' cm-lead' : ''}">${hs}</span>
      <span class="cm-clock">${esc(clockStr)}</span>
    </div>`;
  }

  const advice = getAdvice(g);
  const wpBadge = pred
    ? `<span class="cm-wp">${pred.homeWinProb > pred.awayWinProb
        ? `${esc(displayName(g.hKey, g.home).split(' ').pop())} ${pred.homeWinProb}%`
        : `${esc(displayName(g.aKey, g.away).split(' ').pop())} ${pred.awayWinProb}%`}</span>`
    : '';

  function cmCtx(b2b, daysRest, injuries, form) {
    let s = '';
    if (b2b) s += `<span class="ctx-badge b2b-tag">B2B</span>`;
    else if (daysRest === 2) s += `<span class="ctx-badge b2b-tag" style="opacity:.7">SR</span>`;
    if (injuries.length) s += `<span class="ctx-badge inj-flag">⚠</span>`;
    if (form && Math.abs(form.net) >= 1.5) s += `<span class="ctx-badge form-tag ${form.net > 0 ? 'form-up' : 'form-dn'}">${form.net > 0 ? '↑' : '↓'}</span>`;
    return s;
  }
  const aBadges = cmCtx(g.aB2B, g.aDaysRest, g.aInjuries||[], g.aForm);
  const hBadges = cmCtx(g.hB2B, g.hDaysRest, g.hInjuries||[], g.hForm);

  const linesAndAdvice = `
    <div class="cm-lines">
      <div class="cm-col-hdrs">
        <span class="cm-col-hdr ch-lbl"></span>
        <span class="cm-col-hdr">Model</span>
        <span class="cm-col-hdr">Vegas</span>
        <span class="cm-col-hdr ch-edge">Edge<span class="edge-tip" data-tip="Model spread/total minus Vegas line. Lean ≥ 3pts · Take ≥ 6pts">?</span></span>
      </div>
      ${spreadRow}${totalRow}
    </div>
    <div class="cm-advice ${advice.cls}">
      <span class="cm-advice-text">${advice.text}</span>
      ${wpBadge}
      ${(() => { if (!g.betting) return ''; const p = Math.max(g.betting.homeSpreadBetPct||0, g.betting.awaySpreadBetPct||0); return p >= 65 ? `<span class="ctx-badge public-tag" style="font-size:.5rem" title="${p}% public bets on spread">🎰 ${p}%</span>` : ''; })()}
      <button class="gd-btn" onclick="event.stopPropagation();showGameModal('${g.id}')">Details</button>
    </div>`;

  return `<div class="card-mobile${hotCls}" id="game-${g.id}">
    <div class="cm-hd">
      <div class="cm-teams">
        ${aRank}<span class="cm-tname" onclick="showTeamModal('${g.aKey}','${esc(g.away)}')">${aName}</span>${aBadges}
        <span class="cm-at">@</span>
        ${hRank}<span class="cm-tname" onclick="showTeamModal('${g.hKey}','${esc(g.home)}')">${hName}</span>${hBadges}
      </div>
      ${badge}
    </div>
    ${scoreHtml}
    ${linesAndAdvice}
  </div>`;
}

// Returns the favored team's display name given a home-team spread point
// spreadPt < 0 → home favored; spreadPt > 0 → away favored
function spreadFavName(spreadPt, hKey, home, aKey, away) {
  if (spreadPt == null) return '';
  return spreadPt <= 0
    ? displayName(hKey, home)
    : displayName(aKey, away);
}

function renderCard(g) {
  if (window.innerWidth <= 640) return renderMobileCard(g);
  const { pred, vegasSpread, vegasTotal } = g;
  const live  = g.statusName === 'STATUS_IN_PROGRESS' || g.statusName === 'STATUS_HALFTIME';
  const final = g.statusName === 'STATUS_FINAL';

  // ── Status badge ──
  const gameTime = g.time ? new Date(g.time).toLocaleTimeString([], { hour:'numeric', minute:'2-digit' }) : '';
  let statusBadge;
  if (live) {
    statusBadge = `<span class="status-badge badge-live">● LIVE · ${g.shortDetail}</span>`;
  } else if (final) {
    statusBadge = `<span class="status-badge badge-final">Final · ${g.awayScore}–${g.homeScore}</span>`;
  } else {
    statusBadge = `<span class="status-badge badge-upcoming">${gameTime}</span>`;
  }

  // ── Spread block ──
  let spreadHtml;
  if (!pred) {
    spreadHtml = `<div class="mnum-no-data">No ratings matched</div>`;
  } else {
    const modelHomeSpread = -pred.margin;
    const modelStr = fmtSpread(modelHomeSpread.toFixed(1));
    const modelFav = esc(spreadFavName(modelHomeSpread, g.hKey, g.home, g.aKey, g.away));
    if (vegasSpread) {
      const vegasPoint = vegasSpread.point;
      const vegasFav = esc(spreadFavName(vegasPoint, g.hKey, g.home, g.aKey, g.away));
      const edge = (-modelHomeSpread) - (-vegasPoint);
      const cls  = edgeCls(edge);
      const edgeDir = edge > 0
        ? displayName(g.hKey, g.home)
        : displayName(g.aKey, g.away);
      const edgeLabel = `${edge > 0 ? '+' : ''}${edge.toFixed(1)} · ${esc(edgeDir)}`;
      spreadHtml = `
        <div class="mnum-row">
          <span class="mnum-lbl">Model</span>
          <span class="mnum-val">${modelStr}</span>
          <span class="mnum-team">${modelFav}</span>
        </div>
        <div class="mnum-row">
          <span class="mnum-lbl">Vegas</span>
          <span class="mnum-val">${fmtSpread(vegasPoint)}</span>
          <span class="mnum-team">${vegasFav}</span>
          ${moveBadge(g.spreadMove)}
          ${Math.abs(edge) >= 4
            ? `<span class="edge-pill ${cls}">${edgeLabel}</span>`
            : `<span class="mnum-edge-sm ${cls}">${edge > 0 ? '+' : ''}${edge.toFixed(1)}</span>`}
        </div>
      `;
    } else {
      spreadHtml = `
        <div class="mnum-row">
          <span class="mnum-lbl">Model</span>
          <span class="mnum-val">${modelStr}</span>
          <span class="mnum-team">${modelFav}</span>
        </div>
        <div class="mnum-no-data">No Vegas line</div>
      `;
    }
  }

  // ── Total block ──
  let totalHtml;
  if (!pred) {
    totalHtml = `<div class="mnum-no-data">No ratings matched</div>`;
  } else {
    const modelTot = pred.total.toFixed(1);
    if (vegasTotal) {
      const edge = pred.total - vegasTotal.point;
      const cls  = edgeCls(edge);
      const dir  = edge > 0 ? 'OVER' : 'UNDER';
      totalHtml = `
        <div class="mnum-row">
          <span class="mnum-lbl">Model</span>
          <span class="mnum-val">${modelTot}</span>
        </div>
        <div class="mnum-row">
          <span class="mnum-lbl">Vegas</span>
          <span class="mnum-val">${vegasTotal.point}</span>
          ${moveBadge(g.totalMove)}
          ${Math.abs(edge) >= 4
            ? `<span class="edge-pill ${cls}">${edge > 0 ? '+' : ''}${edge.toFixed(1)} · ${dir}</span>`
            : `<span class="mnum-edge-sm ${cls}">${edge > 0 ? '+' : ''}${edge.toFixed(1)}</span>`}
        </div>
      `;
    } else {
      totalHtml = `
        <div class="mnum-row">
          <span class="mnum-lbl">Model</span>
          <span class="mnum-val">${modelTot}</span>
        </div>
        <div class="mnum-no-data">No Vegas line</div>
      `;
    }
  }

  // ── Live score widget ──
  let liveScoreHtml = '';
  if (live) {
    const hs = parseInt(g.homeScore) || 0;
    const as = parseInt(g.awayScore) || 0;
    const homeUp = hs > as, awayUp = as > hs;

    // Covering check vs pre-game spread
    let coverHtml = '';
    if (vegasSpread) {
      const gap = hs - as + vegasSpread.point; // >0 = home covering
      const hName = esc(displayName(g.hKey, g.home));
      const aName = esc(displayName(g.aKey, g.away));
      if (Math.abs(gap) < 0.5) {
        coverHtml = `<span class="trend-chip push">On the line</span>`;
      } else if (gap > 0) {
        coverHtml = `<span class="trend-chip covering">${hName} covering</span>`;
      } else {
        coverHtml = `<span class="trend-chip trailing">${aName} covering</span>`;
      }
    }

    // Pace vs O/U
    let paceHtml = '';
    const projected = calcLivePace(g);
    if (projected !== null && vegasTotal) {
      const diff = projected - vegasTotal.point;
      const dir  = diff > 2 ? 'over' : diff < -2 ? 'under' : '';
      const sign = diff > 0 ? '+' : '';
      paceHtml = `<span class="trend-pace ${dir}">Pace ${projected.toFixed(0)} (${sign}${diff.toFixed(0)} vs O/U ${vegasTotal.point})</span>`;
    } else if (vegasTotal) {
      const curr = hs + as;
      paceHtml = `<span class="trend-pace">Score total: ${curr} · O/U ${vegasTotal.point}</span>`;
    }

    liveScoreHtml = `
      <div class="live-score">
        <div class="live-score-row">
          <div class="live-score-team">
            <span class="live-score-name">${esc(displayName(g.aKey, g.away))}</span>
            <span class="live-score-pts${awayUp ? ' winning' : homeUp ? ' losing' : ''}">${as}</span>
          </div>
          <span class="live-score-sep">—</span>
          <div class="live-score-team live-score-team-home">
            <span class="live-score-name">${esc(displayName(g.hKey, g.home))}</span>
            <span class="live-score-pts${homeUp ? ' winning' : awayUp ? ' losing' : ''}">${hs}</span>
          </div>
        </div>
        <div class="live-score-clock">${g.shortDetail || ''}</div>
        ${(coverHtml || paceHtml) ? `<div class="live-score-trend">${coverHtml}${paceHtml}</div>` : ''}
      </div>`;
  }

  // ── Final score widget ──
  let finalScoreHtml = '';
  if (final) {
    const hs = parseInt(g.homeScore) || 0;
    const as = parseInt(g.awayScore) || 0;
    const homeWon = hs > as;
    const awayWon = as > hs;
    const actualMargin = hs - as;
    const actualTotal = hs + as;

    // Spread result row
    let spreadRow = '';
    if (pred) {
      const modelLine = fmtSpread((-pred.margin).toFixed(1));
      const actualStr = actualMargin > 0
        ? `${esc(displayName(g.hKey, g.home))} +${actualMargin}`
        : actualMargin < 0
          ? `${esc(displayName(g.aKey, g.away))} +${Math.abs(actualMargin)}`
          : 'Tie';
      let coverBadge = '';
      if (vegasSpread) {
        const gap = actualMargin + vegasSpread.point;
        const hShort = esc(displayName(g.hKey, g.home).split(' ')[0]);
        const aShort = esc(displayName(g.aKey, g.away).split(' ')[0]);
        if (Math.abs(gap) <= 0.5)  coverBadge = `<span class="fr-badge push">Push</span>`;
        else if (gap > 0)          coverBadge = `<span class="fr-badge cover">${hShort} Covered ✓</span>`;
        else                       coverBadge = `<span class="fr-badge no-cover">${aShort} Covered ✓</span>`;
      }
      spreadRow = `<div class="fr-row">
        <span class="fr-label">SPREAD</span>
        <span class="fr-val">Mdl ${modelLine}</span>
        ${vegasSpread ? `<span class="fr-sep">·</span><span class="fr-val">Vegas ${fmtSpread(vegasSpread.point)}</span>` : ''}
        <span class="fr-sep">·</span>
        <span class="fr-actual">${actualStr}</span>
        ${coverBadge}
      </div>`;
    }

    // Total result row
    let totalRow = '';
    if (pred) {
      let ouBadge = '';
      if (vegasTotal) {
        if (actualTotal > vegasTotal.point)       ouBadge = `<span class="fr-badge over">OVER ✓</span>`;
        else if (actualTotal < vegasTotal.point)  ouBadge = `<span class="fr-badge under">UNDER ✓</span>`;
        else                                      ouBadge = `<span class="fr-badge push">Push</span>`;
      }
      totalRow = `<div class="fr-row">
        <span class="fr-label">TOTAL</span>
        <span class="fr-val">Mdl ${pred.total.toFixed(1)}</span>
        ${vegasTotal ? `<span class="fr-sep">·</span><span class="fr-val">O/U ${vegasTotal.point}</span>` : ''}
        <span class="fr-sep">·</span>
        <span class="fr-actual">Actual ${actualTotal}</span>
        ${ouBadge}
      </div>`;
    }

    finalScoreHtml = `
      <div class="final-widget">
        <div class="final-score-row">
          <div class="live-score-team">
            <span class="live-score-name">${esc(displayName(g.aKey, g.away))}</span>
            <span class="live-score-pts${awayWon ? ' winning' : homeWon ? ' losing' : ''}">${as}</span>
          </div>
          <span class="live-score-sep">—</span>
          <div class="live-score-team live-score-team-home">
            <span class="live-score-name">${esc(displayName(g.hKey, g.home))}</span>
            <span class="live-score-pts${homeWon ? ' winning' : awayWon ? ' losing' : ''}">${hs}</span>
          </div>
        </div>
        <div class="final-results">${spreadRow}${totalRow}</div>
      </div>`;
  }

  // ── Footer ratings ──
  const aConfTag = g.aConf ? `<span class="conf-tag">${g.aConf}</span>` : '';
  const hConfTag = g.hConf ? `<span class="conf-tag">${g.hConf}</span>` : '';

  const footerHtml = pred
    ? `<div class="card-ft">
        <div class="ft-team">
          <span class="ft-tname">${esc(displayName(g.aKey, g.away))} ${aConfTag}</span>
          <span class="ft-stats">O ${pred.aRating.adjO.toFixed(1)} · D ${pred.aRating.adjD.toFixed(1)} · T ${pred.aRating.adjT.toFixed(1)}</span>
        </div>
        <div class="ft-div"></div>
        <div class="ft-team">
          <span class="ft-tname">${esc(displayName(g.hKey, g.home))} ${hConfTag}</span>
          <span class="ft-stats">O ${pred.hRating.adjO.toFixed(1)} · D ${pred.hRating.adjD.toFixed(1)} · T ${pred.hRating.adjT.toFixed(1)}</span>
        </div>
        <button class="gd-btn" style="margin-left:auto;flex-shrink:0;" onclick="showGameModal('${g.id}')">Details</button>
      </div>`
    : `<div class="card-ft card-ft-warn">⚠ No Torvik match — ${esc(g.away)} @ ${esc(g.home)}</div>`;

  const be = bestEdge(g);
  const edgeCardCls = be >= 7 ? ' edge-hot' : be >= 4 ? ' edge-warm' : '';
  const bothRanked  = g.awayRank <= 25 && g.homeRank <= 25;
  const rankedCls   = (g.awayRank <= 25 || g.homeRank <= 25) ? ' ranked-game' : '';

  const awayRankBadge = g.awayRank <= 25 ? `<span class="rank-badge">#${g.awayRank}</span>` : '';
  const homeRankBadge = g.homeRank <= 25 ? `<span class="rank-badge">#${g.homeRank}</span>` : '';
  const rankedMatchupBadge = bothRanked ? `<span class="ranked-badge">Ranked Matchup</span>` : '';

  // Contextual badges
  function teamBadges(b2b, daysRest, injuries, form) {
    let s = '';
    if (b2b) s += `<span class="ctx-badge b2b-tag" title="Back-to-back game (played yesterday)">B2B</span>`;
    else if (daysRest === 2) s += `<span class="ctx-badge b2b-tag" style="opacity:.7" title="Short rest — played 2 days ago">SR</span>`;
    if (injuries.length) s += `<span class="ctx-badge inj-flag" title="${esc(injuries.map(i=>i.name+' ('+i.status+(i.mpg?', ~'+i.mpg+' mpg':'')+')').join(', '))}">⚠ ${injuries.length > 1 ? injuries.length+' out' : injuries[0].name}</span>`;
    if (form && Math.abs(form.net) >= 1.5) s += `<span class="ctx-badge form-tag ${form.net > 0 ? 'form-up' : 'form-dn'}" title="Last-14-day trend: adjO ${form.dO > 0?'+':''}${form.dO} / adjD ${form.dD > 0?'+':''}${form.dD}">${form.net > 0 ? '↑' : '↓'} ${Math.abs(form.net).toFixed(1)}</span>`;
    return s;
  }
  // Confidence badge based on weeks into the season.
  // Torvik ratings are noisy early in the season — Nov/Dec MAE ~11 pts vs Jan+ ~8.5 pts.
  // Torvik's 'games' field carries over from the prior season so we use the calendar date.
  function confidenceBadge() {
    const now = new Date();
    const month = now.getMonth() + 1; // 1-12
    const day   = now.getDate();
    // Season starts Nov 1; full weight ~Dec 10 (week 6)
    if (month === 11 && day <= 14) return `<span class="ctx-badge early-tag" title="Season week 1-2 — Torvik ratings have very few games, predictions are less reliable">⚠ Early Season</span>`;
    if (month === 11 || (month === 12 && day <= 10)) return `<span class="ctx-badge early-tag" title="Early season — ratings still stabilizing, treat predictions with caution">Early</span>`;
    return '';
  }
  function moveBadge(move) {
    if (move == null || Math.abs(move) < 0.5) return '';
    return `<span class="line-move ${move > 0 ? 'lm-up' : 'lm-dn'}" title="Line moved ${move > 0 ? 'toward home' : 'toward away'} since open">${move > 0 ? '↑' : '↓'}${Math.abs(move).toFixed(1)}</span>`;
  }

  const aCtx = teamBadges(g.aB2B, g.aDaysRest, g.aInjuries||[], g.aForm);
  const hCtx = teamBadges(g.hB2B, g.hDaysRest, g.hInjuries||[], g.hForm);
  const travelBadge = g.awayTravel ? `<span class="ctx-badge travel-tag" title="Away team traveling 2+ time zones">✈ travel</span>` : '';
  const earlyBadge  = confidenceBadge();
  // Public lean badge — show when ≥65% of bets on one side
  function publicLeanBadge() {
    if (!g.betting) return '';
    const { homeSpreadBetPct: h, awaySpreadBetPct: a } = g.betting;
    if (!h && !a) return '';
    const pct = Math.max(h, a);
    if (pct < 65) return '';
    const side = h >= a ? displayName(g.hKey, g.home).split(' ').pop() : displayName(g.aKey, g.away).split(' ').pop();
    return `<span class="ctx-badge public-tag" title="${pct}% of public bets on ${esc(side)} spread">🎰 ${pct}% public</span>`;
  }
  const publicBadge = publicLeanBadge();

  return `
    <div class="card${edgeCardCls}${rankedCls}" id="game-${g.id}">
      <div class="card-hd">
        <div class="card-hd-teams">
          ${awayRankBadge}<span class="team-away team-link" onclick="showTeamModal('${g.aKey}','${esc(g.away)}')">${esc(displayName(g.aKey, g.away))}</span>${aCtx}
          <span class="card-vs">@</span>
          ${homeRankBadge}<span class="team-home team-link" onclick="showTeamModal('${g.hKey}','${esc(g.home)}')">${esc(displayName(g.hKey, g.home))}</span>${hCtx}
          ${g.neutral ? '<span class="neutral-tag">neutral</span>' : ''}${travelBadge}${earlyBadge}${publicBadge}
        </div>
        <div style="display:flex;align-items:center;gap:.4rem;">${rankedMatchupBadge}${statusBadge}</div>
      </div>
      ${liveScoreHtml}${finalScoreHtml}
      <div class="card-bd">
        <div class="mblock">
          <div class="mblock-label">Spread (Home)</div>
          ${spreadHtml}
        </div>
        <div class="mblock-div"></div>
        <div class="mblock">
          <div class="mblock-label">Total</div>
          ${totalHtml}
        </div>
      </div>
      ${footerHtml}
      ${renderFactors(g)}
    </div>
  `;
}

function scrollToGame(id) {
  const el = document.getElementById('game-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function renderTopPicks(games) {
  const bar = document.getElementById('top-picks-bar');
  if (!games.length) { bar.style.display = 'none'; return; }

  // Helper to build bar HTML from a snapshot array
  function buildPicksBar(snapshot, locked) {
    const cards = snapshot.map(p => {
      const cls = p.edge >= 7 ? 'hot' : 'warm';
      const typeLabel = p.type === 'spread' ? 'ATS' : 'O/U';
      return `<div class="pick-card ${cls}" onclick="scrollToGame('${p.gameId}')">
        <div class="pick-matchup">${esc(p.aShort)} @ ${esc(p.hShort)}</div>
        <div class="pick-main">${esc(p.main)}</div>
        <div class="pick-meta">
          <span class="pick-edge">+${p.edge.toFixed(1)}</span>
          <span class="pick-type-tag">${typeLabel}</span>
        </div>
        <div class="pick-why">${esc(p.why)}</div>
      </div>`;
    }).join('');
    const title = locked ? '🔒 Top Picks (Locked)' : "Today's Top Picks<span class='edge-tip' data-tip='Edge = model spread minus Vegas line. Higher edge = stronger disagreement with Vegas.'>?</span>";
    bar.style.display = '';
    bar.innerHTML = `
      <div class="picks-header">
        <span class="top-picks-title" id="picks-title">${title}</span>
        <div class="picks-accuracy" id="picks-accuracy-row">
          <span class="acc-badge" style="opacity:.5">Loading accuracy…</span>
        </div>
      </div>
      <div class="picks-row">${cards}</div>`;
    loadAccuracyStats();
  }

  // If we have a time-based lock for today, always render from it
  const lockedDate = localStorage.getItem('picks_lock_date');
  const lockedData = localStorage.getItem('picks_locked');
  if (lockedDate === currentIsoDate && lockedData) {
    buildPicksBar(JSON.parse(lockedData), true);
    return;
  }

  // Collect all spread + total picks with edge >= 4
  const picks = [];
  for (const g of games) {
    if (!g.pred) continue;
    if (g.vegasSpread) {
      const se = g.pred.margin + g.vegasSpread.point;
      const absE = Math.abs(se);
      if (absE >= 4) {
        const backHome = se > 0;
        const favKey   = backHome ? g.hKey : g.aKey;
        const favFull  = backHome ? g.home : g.away;
        const lineVal  = backHome ? g.vegasSpread.point : -g.vegasSpread.point;
        const modelVal = backHome ? -g.pred.margin : g.pred.margin;
        const lastName = displayName(favKey, favFull).split(' ').slice(-1)[0];
        picks.push({
          g, edge: absE, type: 'spread',
          main: `${lastName} ${fmtSpread(lineVal.toFixed(1))}`,
          why: `Model ${fmtSpread(modelVal.toFixed(1))} · Vegas ${fmtSpread(lineVal.toFixed(1))} · ${absE.toFixed(1)}pt edge`,
        });
      }
    }
    if (g.vegasTotal) {
      const te = g.pred.total - g.vegasTotal.point;
      const absE = Math.abs(te);
      if (absE >= 4) {
        picks.push({
          g, edge: absE, type: 'total',
          main: `${te > 0 ? 'OVER' : 'UNDER'} ${g.vegasTotal.point}`,
          why: `Model ${g.pred.total.toFixed(1)} · Line ${g.vegasTotal.point} · ${absE.toFixed(1)}pt edge`,
        });
      }
    }
  }
  picks.sort((a, b) => b.edge - a.edge);
  const top5 = picks.slice(0, 5);
  if (!top5.length) { bar.style.display = 'none'; return; }

  // Save snapshot once the daily lock hour has passed (never overwrite an existing lock)
  const isPastLockHour = new Date().getHours() >= cfg.lockHour;
  if (isPastLockHour && top5.length && lockedDate !== currentIsoDate) {
    const snapshot = top5.map(p => ({
      gameId: p.g.id,
      aShort: displayName(p.g.aKey, p.g.away).split(' ').slice(-1)[0],
      hShort: displayName(p.g.hKey, p.g.home).split(' ').slice(-1)[0],
      main: p.main,
      edge: p.edge,
      type: p.type,
      why: p.why,
    }));
    localStorage.setItem('picks_lock_date', currentIsoDate);
    localStorage.setItem('picks_locked', JSON.stringify(snapshot));
    buildPicksBar(snapshot, true);
    return;
  }

  // Pre-lock: render live (unlocked)
  const snapshot = top5.map(p => ({
    gameId: p.g.id,
    aShort: displayName(p.g.aKey, p.g.away).split(' ').slice(-1)[0],
    hShort: displayName(p.g.hKey, p.g.home).split(' ').slice(-1)[0],
    main: p.main,
    edge: p.edge,
    type: p.type,
    why: p.why,
  }));
  buildPicksBar(snapshot, false);
}

// ── Historical accuracy scorecard ─────────────────────────
// Season start: Nov 1 of current academic year
// (before July → prior year's Nov; July+ → current year's Nov)
const ACC_START_DATE = '20260309'; // Reset: count picks-record from this date forward

let _accCache = null, _accCacheTs = 0;

async function loadAccuracyStats() {
  const now = Date.now();

  if (_accCache && (now - _accCacheTs) < 30 * 60 * 1000) {
    renderAccuracyBadges(_accCache);
    return;
  }
  const toDateStr = d => {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dy = String(d.getDate()).padStart(2,'0');
    return `${y}${m}${dy}`;
  };
  const today = new Date();
  const shiftDay = n => { const d = new Date(today); d.setDate(today.getDate() + n); return d; };
  const dateRange = (start, end) => {
    const dates = [], d = new Date(start);
    while (d <= end) { dates.push(toDateStr(new Date(d))); d.setDate(d.getDate()+1); }
    return dates;
  };
  const yest        = shiftDay(-1);
  const weekAgo     = shiftDay(-7);
  const monthAgo    = shiftDay(-30);
  async function scoreRange(dates) {
    let w = 0, l = 0;
    for (const dateStr of dates.filter(d => d >= ACC_START_DATE)) {
      const isoDate = `${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`;
      try {
        const [games, storedOdds] = await Promise.all([
          fetchESPNFinal(dateStr),
          fetchOddsForDate(isoDate),
        ]);
        for (const g of games) {
          const hKey = matchTeam(g.home), aKey = matchTeam(g.away);
          const pred = predict(hKey, aKey, g.neutral);
          if (!pred) continue;
          const actual = g.homeScore - g.awayScore;
          if (actual === 0) continue;
          // Takes only: edge ≥ 7 on spread or total vs locked pre-game line
          const odds = matchStoredOdds(storedOdds, hKey, aKey);
          if (!odds) continue;
          const spreadEdge = odds.spread != null ? Math.abs(pred.margin + odds.spread) : 0;
          const totalEdge  = odds.total  != null ? Math.abs(pred.total  - odds.total)  : 0;
          const useSpread  = spreadEdge >= totalEdge && spreadEdge >= 7;
          const useTotal   = totalEdge  >  spreadEdge && totalEdge  >= 7;
          if (!useSpread && !useTotal) continue;
          // Score ATS for spread takes, O/U for total takes
          if (useSpread) {
            const cover = actual + odds.spread;
            if (cover === 0) continue; // push
            (pred.margin >= 0) === (cover > 0) ? w++ : l++;
          } else {
            const tot = g.homeScore + g.awayScore;
            if (tot === odds.total) continue; // push
            (pred.total > odds.total) === (tot > odds.total) ? w++ : l++;
          }
        }
      } catch(e) { /* skip */ }
    }
    return { w, l };
  }

  try {
    const [yd, wk, mo] = await Promise.all([
      scoreRange([toDateStr(yest)]),
      scoreRange(dateRange(weekAgo, yest)),
      scoreRange(dateRange(monthAgo, yest)),
    ]);
    _accCache = { yd, wk, mo };
    _accCacheTs = now;
    renderAccuracyBadges(_accCache);
  } catch(e) {
    const row = document.getElementById('picks-accuracy-row');
    if (row) row.innerHTML = '';
  }
}

function renderAccuracyBadges({ yd, wk, mo }) {
  const row = document.getElementById('picks-accuracy-row');
  if (!row) return;
  const badge = (lbl, { w, l }) => {
    const tot = w + l;
    if (!tot) return `<span class="acc-badge" title="Takes only (edge ≥ 7) — ATS for spreads, O/U for totals">${lbl}: <span class="acc-pct">—</span></span>`;
    const pct = Math.round(w / tot * 100);
    const cls = pct >= 60 ? 'acc-good' : pct < 50 ? 'acc-bad' : '';
    return `<span class="acc-badge ${cls}" title="Takes only (edge ≥ 7) — ATS for spreads, O/U for totals">${lbl} <span class="acc-pct">${w}-${l}</span> <span style="opacity:.55">takes ${pct}%</span></span>`;
  };
  row.innerHTML = badge('Yday', yd) + badge('Week', wk) + badge('Month', mo);
}

// ── Filter state ──────────────────────────────────────────
const filters = { compact:false, hasOdds:false, edgeOnly:false, onlyRanked:false, sort:'edge', conference:'', tab:'all', search:'' };

const FC_ID = { compact:'compact', hasOdds:'odds', edgeOnly:'edge', onlyRanked:'ranked' };

function toggleFilter(key) {
  filters[key] = !filters[key];
  document.getElementById('fc-' + FC_ID[key])?.classList.toggle('on', filters[key]);
  if (key === 'compact') {
    document.getElementById('game-list').querySelector('.game-list-inner')
      ?.classList.toggle('compact-list', filters.compact);
  }
  // Sync mobile checkboxes
  const cbMap = { hasOdds:'mfp-odds', edgeOnly:'mfp-edge', onlyRanked:'mfp-ranked', compact:'mfp-compact' };
  if (cbMap[key]) { const cb = document.getElementById(cbMap[key]); if (cb) cb.checked = filters[key]; }
  updateMobileFilterCount();
  render(_lastGames);
}

function updateMobileFilterCount() {
  const count = ['hasOdds','edgeOnly','onlyRanked','compact'].filter(k => filters[k]).length;
  const el = document.getElementById('mobile-filter-count');
  const btn = document.getElementById('mobile-filter-btn');
  if (el) { el.textContent = count || ''; el.style.display = count ? 'inline-flex' : 'none'; }
  if (btn) btn.classList.toggle('mfb-active', count > 0);
}

function toggleMobileFilters(e) {
  e.stopPropagation();
  document.getElementById('mobile-filter-panel')?.classList.toggle('mfp-open');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.mobile-filter-wrap')) {
    document.getElementById('mobile-filter-panel')?.classList.remove('mfp-open');
  }
});

function setSort(val) {
  filters.sort = val;
  document.querySelectorAll('.sort-pill').forEach(el =>
    el.classList.toggle('active', el.dataset.sort === val)
  );
  const ms = document.getElementById('mobile-sort'); if (ms) ms.value = val;
  render(_lastGames);
}

function setTab(tab) {
  filters.tab = tab;
  document.querySelectorAll('.stab').forEach(el =>
    el.classList.toggle('active', el.dataset.tab === tab)
  );
  render(_lastGames);
}

function onSearch(val) {
  filters.search = val.trim().toLowerCase();
  const clr = document.getElementById('search-clear');
  if (clr) clr.style.display = val ? '' : 'none';
  render(_lastGames);
}

function clearSearch() {
  filters.search = '';
  const inp = document.getElementById('team-search');
  if (inp) inp.value = '';
  const clr = document.getElementById('search-clear');
  if (clr) clr.style.display = 'none';
  render(_lastGames);
}

function setConference(c) {
  filters.conference = c;
  render(_lastGames);
}

function drillConf(conf) {
  // Click conference header → filter to that conf, switch to edge sort
  filters.conference = conf;
  filters.sort = 'edge';
  document.querySelectorAll('.sort-pill').forEach(el =>
    el.classList.toggle('active', el.dataset.sort === 'edge')
  );
  render(_lastGames);
}

function updateConferenceFilter(games) {
  const strip = document.getElementById('conf-strip');
  const mobileWrap = document.getElementById('mobile-conf-wrap');
  const mobileConf = document.getElementById('mobile-conf');
  if (!strip) return;
  const confs = [...new Set(
    games.flatMap(g => [g.hConf, g.aConf]).filter(c => c && c.length > 0)
  )].sort();
  if (!confs.length) {
    strip.style.display = 'none';
    if (mobileConf) mobileConf.innerHTML = '<option value="">All Conferences</option>';
    return;
  }
  strip.style.display = '';
  strip.innerHTML =
    `<span class="conf-strip-label">Conf</span>` +
    `<button class="conf-pill all-pill${!filters.conference ? ' active' : ''}" onclick="setConference('')">All</button>` +
    confs.map(c =>
      `<button class="conf-pill${filters.conference === c ? ' active' : ''}" onclick="setConference('${esc(c)}')">${esc(c)}</button>`
    ).join('');
  // Mobile conf select
  if (mobileWrap && mobileConf) {
    mobileWrap.style.display = '';
    mobileConf.innerHTML = `<option value="">All Conferences</option>` +
      confs.map(c => `<option value="${esc(c)}"${filters.conference === c ? ' selected' : ''}>${esc(c)}</option>`).join('');
  }
}

let _lastGames = [];

function render(games) {
  _lastGames = games || [];
  const el = document.getElementById('game-list');
  if (!games.length) {
    document.getElementById('top-picks-bar').style.display = 'none';
    el.innerHTML = '<div class="loading">No games found for this date.</div>';
    return;
  }

  // Always render top picks from full unfiltered set
  renderTopPicks(games);

  // Compute tab counts from full set
  const allLive     = games.filter(g => g.statusName==='STATUS_IN_PROGRESS'||g.statusName==='STATUS_HALFTIME');
  const allFinal    = games.filter(g => g.statusName==='STATUS_FINAL');
  const allUpcoming = games.filter(g => !allLive.includes(g) && !allFinal.includes(g));
  const setTC = (id, n) => { const el = document.getElementById(id); if (el) el.textContent = n || ''; };
  setTC('tc-all', games.length);
  setTC('tc-live', allLive.length);
  setTC('tc-upcoming', allUpcoming.length);
  setTC('tc-final', allFinal.length);

  // Day summary
  const topEdge = Math.max(...games.map(bestEdge).filter(e => e > 0), 0);
  const sumEl = document.getElementById('day-summary');
  if (sumEl) {
    const livePart = allLive.length
      ? `<span class="ds-live"><span class="ds-live-dot"></span>${allLive.length} Live</span><span class="ds-sep">·</span>` : '';
    const edgePart = topEdge >= 4
      ? `<span class="ds-sep">·</span><span class="ds-edge">Best edge +${topEdge.toFixed(1)}</span>` : '';
    sumEl.innerHTML = `${livePart}<span>${games.length} games</span><span class="ds-sep">·</span><span>${allUpcoming.length} upcoming</span><span class="ds-sep">·</span><span>${allFinal.length} final</span>${edgePart}`;
    sumEl.style.display = '';
  }

  // Apply filters
  let visible = games.filter(g => {
    if (filters.hasOdds    && !g.vegasSpread && !g.vegasTotal)           return false;
    if (filters.edgeOnly   && bestEdge(g) < 4)                            return false;
    if (filters.onlyRanked && g.homeRank > 25 && g.awayRank > 25)        return false;
    if (filters.conference && g.hConf !== filters.conference && g.aConf !== filters.conference) return false;
    return true;
  });

  // Apply tab filter
  if (filters.tab === 'live') {
    visible = visible.filter(g => g.statusName==='STATUS_IN_PROGRESS'||g.statusName==='STATUS_HALFTIME');
  } else if (filters.tab === 'upcoming') {
    visible = visible.filter(g => g.statusName!=='STATUS_FINAL'&&g.statusName!=='STATUS_IN_PROGRESS'&&g.statusName!=='STATUS_HALFTIME');
  } else if (filters.tab === 'final') {
    visible = visible.filter(g => g.statusName==='STATUS_FINAL');
  }

  // Apply search
  if (filters.search) {
    const q = filters.search;
    visible = visible.filter(g =>
      g.home.toLowerCase().includes(q) || g.away.toLowerCase().includes(q) ||
      (g.hKey && g.hKey.includes(q))   || (g.aKey && g.aKey.includes(q))
    );
  }

  // Populate conference filter from full game list
  updateConferenceFilter(games);

  // Sort
  if (filters.sort === 'time') {
    visible.sort((a, b) => new Date(a.time) - new Date(b.time));
  } else if (filters.sort === 'rank') {
    visible.sort((a, b) => {
      const aMin = Math.min(a.homeRank || 99, a.awayRank || 99);
      const bMin = Math.min(b.homeRank || 99, b.awayRank || 99);
      return aMin !== bMin ? aMin - bMin : bestEdge(b) - bestEdge(a);
    });
  } else if (filters.sort === 'conf') {
    visible.sort((a, b) => {
      const ac = a.hConf || a.aConf || 'zzz';
      const bc = b.hConf || b.aConf || 'zzz';
      return ac !== bc ? ac.localeCompare(bc) : bestEdge(b) - bestEdge(a);
    });
  } else {
    visible.sort((a, b) => bestEdge(b) - bestEdge(a));
  }

  if (!visible.length) {
    el.innerHTML = '<div class="loading" style="padding:2rem">No games match the current filters.</div>';
    return;
  }

  // All-games live status (for live refresh timer)
  const anyLive = visible.some(g => g.statusName==='STATUS_IN_PROGRESS'||g.statusName==='STATUS_HALFTIME');
  if (anyLive) startLiveRefresh(); else stopLiveRefresh();

  const compactCls = filters.compact ? 'compact-list' : '';

  // ── By-Conference grouping ─────────────────────────────
  if (filters.sort === 'conf') {
    const confMap = new Map();
    for (const g of visible) {
      const key = (g.hConf && g.hConf === g.aConf) ? g.hConf
                : (g.hConf || g.aConf || 'Non-Conf');
      if (!confMap.has(key)) confMap.set(key, []);
      confMap.get(key).push(g);
    }
    const sections = [...confMap.entries()]
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([conf, list]) => {
        const topE = Math.max(...list.map(bestEdge).filter(e=>e>0), 0);
        const edgePart = topE >= 4 ? `<span class="conf-group-edge">Top edge +${topE.toFixed(1)}</span>` : '';
        return `<div class="conf-group-section">
          <div class="conf-group-hd" onclick="drillConf('${esc(conf)}')" title="Filter to ${esc(conf)} only">
            <span class="conf-group-name">${esc(conf)}</span>
            <span class="conf-group-count">${list.length} game${list.length>1?'s':''}</span>
            ${edgePart}
            <span class="conf-group-drill">View only →</span>
          </div>
          ${list.map(renderCard).join('')}
        </div>`;
      }).join('');
    el.innerHTML = `<div class="game-list-inner ${compactCls}">${sections}</div>`;
    return;
  }

  // ── Standard Live / Upcoming / Final grouping ──────────
  const live     = visible.filter(g => g.statusName==='STATUS_IN_PROGRESS'||g.statusName==='STATUS_HALFTIME');
  const final    = visible.filter(g => g.statusName==='STATUS_FINAL');
  const upcoming = visible.filter(g => !live.includes(g) && !final.includes(g));

  function group(label, dot, list) {
    if (!list.length) return '';
    let extra = '';
    if (dot === 'live' && _lastESPNRefresh) {
      const sAgo = Math.round((Date.now() - _lastESPNRefresh) / 1000);
      extra = `<span style="margin-left:auto;font-size:.58rem;color:var(--muted)">Updated ${sAgo}s ago · auto-refreshes 45s</span>`;
    } else if (dot === 'live') {
      extra = `<span style="margin-left:auto;font-size:.58rem;color:var(--muted)">Auto-refreshes every 45s</span>`;
    }
    return `<div class="game-group">
      <div class="group-header"><span class="group-dot ${dot}"></span>${label} · ${list.length}${extra}</div>
      ${list.map(renderCard).join('')}
    </div>`;
  }

  el.innerHTML = `<div class="game-list-inner ${compactCls}">
    ${group('Live', 'live', live)}
    ${group('Upcoming', 'upcoming', upcoming)}
    ${group('Final', 'final', final)}
  </div>`;
}

function closeGameModal() {
  document.getElementById('gd-overlay').classList.remove('open');
}

function showGameModal(gameId) {
  const g = _lastGames.find(x => x.id === gameId);
  if (!g) return;
  const { pred, vegasSpread, vegasTotal } = g;
  const aName = displayName(g.aKey, g.away);
  const hName = displayName(g.hKey, g.home);
  const gameTime = g.time ? new Date(g.time).toLocaleString([], { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }) : 'TBD';

  document.getElementById('gd-header').innerHTML = `
    <div>
      <div class="gd-matchup">${esc(aName)} @ ${esc(hName)}</div>
      <div class="gd-time">${gameTime}${g.neutral ? ' · Neutral Site' : ''}${g.awayTravel ? ' · Travel' : ''}</div>
    </div>
    <button class="gd-close" onclick="closeGameModal()">✕</button>`;

  let html = '';

  // ── Prediction ──
  if (pred) {
    const hWins = pred.margin > 0;
    const aWins = pred.margin < 0;
    const favName = hWins ? hName.split(' ').pop() : aName.split(' ').pop();
    html += `<div class="gd-section">
      <div class="gd-section-title">Model Prediction</div>
      <div class="gd-scores">
        <div class="gd-score-team">
          <div class="gd-score-name">${esc(aName)}</div>
          <div class="gd-score-pts${aWins ? ' gd-winner' : ''}">${((pred.total - pred.margin) / 2).toFixed(0)}</div>
        </div>
        <div class="gd-score-sep">—</div>
        <div class="gd-score-team">
          <div class="gd-score-name">${esc(hName)}</div>
          <div class="gd-score-pts${hWins ? ' gd-winner' : ''}">${((pred.total + pred.margin) / 2).toFixed(0)}</div>
        </div>
      </div>
      <div class="gd-summary-row">
        <span>Margin: <span class="gd-summary-val">${favName} ${Math.abs(pred.margin).toFixed(1)}</span></span>
        <span>Total: <span class="gd-summary-val">${pred.total.toFixed(1)}</span></span>
      </div>
      <div class="gd-wp-row">
        <div class="gd-wp-label"><span class="gd-wp-name">${esc(aName)}</span><span class="gd-wp-pct">${pred.awayWinProb}%</span></div>
        <div class="gd-wp-bar"><div class="gd-wp-fill" style="width:${pred.awayWinProb}%;background:${pred.awayWinProb>=60?'var(--green)':pred.awayWinProb>=40?'var(--yellow)':'var(--muted)'}"></div></div>
      </div>
      <div class="gd-wp-row">
        <div class="gd-wp-label"><span class="gd-wp-name">${esc(hName)}</span><span class="gd-wp-pct">${pred.homeWinProb}%</span></div>
        <div class="gd-wp-bar"><div class="gd-wp-fill" style="width:${pred.homeWinProb}%;background:${pred.homeWinProb>=60?'var(--green)':pred.homeWinProb>=40?'var(--yellow)':'var(--muted)'}"></div></div>
      </div>
    </div>`;
  }

  // ── vs Vegas ──
  if (pred && (vegasSpread || vegasTotal)) {
    const sEdge = vegasSpread ? pred.margin - (-vegasSpread.point) : null;
    const tEdge = vegasTotal  ? pred.total  - vegasTotal.point    : null;
    const eCls  = e => e === null ? '' : Math.abs(e) >= 1.5 ? 'gd-edge-pos' : 'gd-edge-neu';
    let moveStr = '';
    if (g.spreadMove != null && Math.abs(g.spreadMove) >= 0.5) moveStr += `Spread ${g.spreadMove>0?'↑':'↓'}${Math.abs(g.spreadMove).toFixed(1)} `;
    if (g.totalMove  != null && Math.abs(g.totalMove)  >= 0.5) moveStr += `Total ${g.totalMove>0?'↑':'↓'}${Math.abs(g.totalMove).toFixed(1)}`;
    html += `<div class="gd-section">
      <div class="gd-section-title">vs Vegas</div>
      <table class="gd-table">
        <tr><th></th><th>Model</th><th>Vegas</th><th>Edge</th></tr>
        ${vegasSpread ? `<tr>
          <td>Spread</td>
          <td>${fmtSpread((-pred.margin).toFixed(1))} ${esc(spreadFavName(-pred.margin,g.hKey,g.home,g.aKey,g.away))}</td>
          <td>${fmtSpread(vegasSpread.point)} ${esc(spreadFavName(vegasSpread.point,g.hKey,g.home,g.aKey,g.away))}</td>
          <td class="${eCls(sEdge)}">${sEdge!==null?(sEdge>0?'+':'')+sEdge.toFixed(1):'—'}</td>
        </tr>` : ''}
        ${vegasTotal ? `<tr>
          <td>Total</td>
          <td>${pred.total.toFixed(1)}</td>
          <td>${vegasTotal.point}</td>
          <td class="${eCls(tEdge)}">${tEdge!==null?(tEdge>0?'+':'')+tEdge.toFixed(1):'—'}</td>
        </tr>` : ''}
      </table>
      ${moveStr ? `<div class="gd-move">Line movement: ${moveStr.trim()}</div>` : ''}
    </div>`;
  }

  // ── Team Ratings ──
  if (pred) {
    const a = pred.aRating, h = pred.hRating;
    const hi = (av, hv, lower=false) => lower ? (av<hv?['gd-edge-pos','']:av>hv?['','gd-edge-pos']:['','']) : (av>hv?['gd-edge-pos','']:av<hv?['','gd-edge-pos']:['','']);
    const [aO,hO] = hi(a.adjO, h.adjO);
    const [aD,hD] = hi(a.adjD, h.adjD, true);
    const [aB,hB] = hi(a.barthag, h.barthag);
    html += `<div class="gd-section">
      <div class="gd-section-title">Team Ratings</div>
      <table class="gd-table">
        <tr><th></th><th>${esc(aName)}</th><th>${esc(hName)}</th></tr>
        <tr><td>Adj Offense</td><td class="${aO}">${a.adjO.toFixed(1)}</td><td class="${hO}">${h.adjO.toFixed(1)}</td></tr>
        <tr><td>Adj Defense</td><td class="${aD}">${a.adjD.toFixed(1)}</td><td class="${hD}">${h.adjD.toFixed(1)}</td></tr>
        <tr><td>Tempo</td><td>${a.adjT.toFixed(1)}</td><td>${h.adjT.toFixed(1)}</td></tr>
        <tr><td>Barthag</td><td class="${aB}">${a.barthag.toFixed(3)}</td><td class="${hB}">${h.barthag.toFixed(3)}</td></tr>
      </table>
    </div>`;
  }

  // ── Four Factors ──
  if (pred?.aRating?.oEfg && pred?.hRating?.oEfg) {
    const a = pred.aRating, h = pred.hRating;
    const factors = [
      { name:'eFG%', aDelta:a.oEfg-h.dEfg, hDelta:h.oEfg-a.dEfg, invert:false },
      { name:'TO%',  aDelta:a.oTo -h.dTo,  hDelta:h.oTo -a.dTo,  invert:true  },
      { name:'OR%',  aDelta:a.oOr -h.dOr,  hDelta:h.oOr -a.dOr,  invert:false },
      { name:'FTR',  aDelta:a.oFtr-h.dFtr, hDelta:h.oFtr-a.dFtr, invert:false },
    ];
    const ffCls = (d, inv) => { const v = inv?-d:d; return v>=1?'gd-edge-pos':v<=-1?'gd-edge-neg':'gd-edge-neu'; };
    const fmt = v => (v>0?'+':'')+v.toFixed(1);
    html += `<div class="gd-section">
      <div class="gd-section-title">Four Factors <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:.58rem;color:var(--muted)">offense vs opponent defense</span></div>
      <table class="gd-table">
        <tr><th></th><th>${esc(aName.split(' ').pop())}</th><th>${esc(hName.split(' ').pop())}</th></tr>
        ${factors.map(f=>`<tr><td>${f.name}</td><td class="${ffCls(f.aDelta,f.invert)}">${fmt(f.aDelta)}</td><td class="${ffCls(f.hDelta,f.invert)}">${fmt(f.hDelta)}</td></tr>`).join('')}
      </table>
    </div>`;
  }

  // ── Contextual Factors ──
  const ctx = [];
  if (g.aB2B) ctx.push(['⚠️', `${esc(aName)} on a back-to-back (−1.8 pts applied)`]);
  if (g.hB2B) ctx.push(['⚠️', `${esc(hName)} on a back-to-back (−1.8 pts applied)`]);
  if (!g.aB2B && g.aDaysRest === 2) ctx.push(['😓', `${esc(aName)} on short rest (2 days)`]);
  if (!g.hB2B && g.hDaysRest === 2) ctx.push(['😓', `${esc(hName)} on short rest (2 days)`]);
  if (!g.hB2B && !g.aB2B && g.hDaysRest != null && g.aDaysRest != null) {
    const diff = g.hDaysRest - g.aDaysRest;
    if (Math.abs(diff) >= 3) ctx.push(['🛌', `Rest advantage: ${diff > 0 ? esc(hName) : esc(aName)} has ${Math.abs(diff)} more days rest`]);
  }
  if (g.awayTravel) ctx.push(['✈️', 'Away team crossing 2+ time zones']);
  if (g.aForm?.net && Math.abs(g.aForm.net)>=1.5) ctx.push([g.aForm.net>0?'📈':'📉', `${esc(aName)} form: ${g.aForm.net>0?'+':''}${g.aForm.net.toFixed(1)} net efficiency`]);
  if (g.hForm?.net && Math.abs(g.hForm.net)>=1.5) ctx.push([g.hForm.net>0?'📈':'📉', `${esc(hName)} form: ${g.hForm.net>0?'+':''}${g.hForm.net.toFixed(1)} net efficiency`]);
  (g.aInjuries||[]).forEach(i => ctx.push(['🩹', `${esc(aName)}: ${esc(i.name)} (${esc(i.status)}${i.mpg ? `, ~${i.mpg} mpg` : ''})`]));
  (g.hInjuries||[]).forEach(i => ctx.push(['🩹', `${esc(hName)}: ${esc(i.name)} (${esc(i.status)}${i.mpg ? `, ~${i.mpg} mpg` : ''})`]));
  // KenPom luck shown as context only — tested against 16k games, found to add noise (+0.39 MAE), not applied to model
  if (g.hLuck != null && Math.abs(g.hLuck) >= 0.05) {
    const icon = g.hLuck > 0 ? '🍀' : '📉';
    const dir  = g.hLuck > 0 ? `lucky (+${(g.hLuck*100).toFixed(0)}% wins vs expected)` : `unlucky (${(g.hLuck*100).toFixed(0)}% wins vs expected)`;
    ctx.push([icon, `${esc(hName)} KenPom luck: ${dir} — context only, not applied to model`]);
  }
  if (g.aLuck != null && Math.abs(g.aLuck) >= 0.05) {
    const icon = g.aLuck > 0 ? '🍀' : '📉';
    const dir  = g.aLuck > 0 ? `lucky (+${(g.aLuck*100).toFixed(0)}% wins vs expected)` : `unlucky (${(g.aLuck*100).toFixed(0)}% wins vs expected)`;
    ctx.push([icon, `${esc(aName)} KenPom luck: ${dir} — context only, not applied to model`]);
  }
  if (ctx.length) {
    html += `<div class="gd-section">
      <div class="gd-section-title">Contextual Factors</div>
      <ul class="gd-ctx-list">
        ${ctx.map(([icon,text])=>`<li class="gd-ctx-item"><span class="gd-ctx-icon">${icon}</span><span>${text}</span></li>`).join('')}
      </ul>
    </div>`;
  }

  // ── Refs ──
  if ((g.refStats || []).length) {
    const refRows = g.refStats.map(r => {
      let note = '';
      if (r.bias != null) {
        if      (r.bias >=  1.0) note = ' <span style="color:var(--green);font-size:.7em">home-leaning</span>';
        else if (r.bias <= -1.0) note = ' <span style="color:var(--yellow);font-size:.7em">away-leaning</span>';
      }
      const biasStr = r.bias != null ? ` bias ${r.bias > 0 ? '+' : ''}${r.bias.toFixed(1)}` : '';
      const stats = r.games != null ? ` <span style="color:var(--muted);font-size:.72em">(${r.games}G${biasStr})</span>` : '';
      return `<li>${esc(r.name)}${stats}${note}</li>`;
    });
    html += `<div class="gd-section">
      <div class="gd-section-title">Officials</div>
      <ul class="gd-ctx-list" style="list-style:none;padding:0">${refRows.join('')}</ul>
    </div>`;
  }

  // ── Public Betting % ──
  if (g.betting) {
    const b = g.betting;
    const hi = pct => pct >= 60 ? ' style="color:var(--accent);font-weight:700"' : '';
    html += `<div class="gd-section">
      <div class="gd-section-title">Public Betting (ActionNetwork)</div>
      <table class="gd-table">
        <tr><th></th><th>${esc(aName)}</th><th>${esc(hName)}</th></tr>
        ${b.homeSpreadBetPct||b.awaySpreadBetPct ? `<tr><td>Spread tickets</td><td${hi(b.awaySpreadBetPct)}>${b.awaySpreadBetPct}%</td><td${hi(b.homeSpreadBetPct)}>${b.homeSpreadBetPct}%</td></tr>` : ''}
        ${b.homeSpreadMnyPct||b.awaySpreadMnyPct ? `<tr><td>Spread money</td><td${hi(b.awaySpreadMnyPct)}>${b.awaySpreadMnyPct}%</td><td${hi(b.homeSpreadMnyPct)}>${b.homeSpreadMnyPct}%</td></tr>` : ''}
      </table>
      ${b.overBetPct||b.underBetPct ? `<table class="gd-table" style="margin-top:.4rem">
        <tr><th></th><th>Over</th><th>Under</th></tr>
        <tr><td>Total tickets</td><td${hi(b.overBetPct)}>${b.overBetPct}%</td><td${hi(b.underBetPct)}>${b.underBetPct}%</td></tr>
        ${b.overMnyPct||b.underMnyPct ? `<tr><td>Total money</td><td${hi(b.overMnyPct)}>${b.overMnyPct}%</td><td${hi(b.underMnyPct)}>${b.underMnyPct}%</td></tr>` : ''}
      </table>` : ''}
    </div>`;
  }

  if (!html) html = '<div class="gd-section" style="color:var(--muted);font-size:.82rem;">No prediction data available.</div>';
  document.getElementById('gd-body').innerHTML = html;
  document.getElementById('gd-overlay').classList.add('open');
}

function closeTeamModal() {
  document.getElementById('tm-overlay').classList.remove('open');
}

function showTeamModal(key, rawName) {
  const overlay  = document.getElementById('tm-overlay');
  const nameEl   = document.getElementById('tm-name');
  const badgesEl = document.getElementById('tm-badges');
  const winProbEl= document.getElementById('tm-win-prob');
  const winPctEl = document.getElementById('tm-win-pct');
  const barFill  = document.getElementById('tm-bar-fill');
  const bodyEl   = document.getElementById('tm-body');

  const r        = key ? ratings[key] : null;
  const displayN = key ? displayName(key, rawName) : (rawName || '?');

  // Find this team's game data for conference + rank
  const todayGame = _lastGames.find(g => g.hKey === key || g.aKey === key);
  const isHome    = todayGame?.hKey === key;
  const espnConf  = todayGame ? (isHome ? todayGame.hConf : todayGame.aConf) : '';
  const espnRank  = todayGame ? (isHome ? todayGame.homeRank : todayGame.awayRank) : 99;

  nameEl.textContent = displayN;

  // Badges
  const confStr = espnConf || r?.conf || '';
  const confBadge = confStr ? `<span class="tm-conf-badge">${esc(confStr)}</span>` : '';
  const rankBadge = espnRank <= 25 ? `<span class="tm-rank-badge">#${espnRank} AP</span>` : '';
  const tier = !r ? '' : r.barthag > 0.95 ? 'Title Contender' : r.barthag > 0.85 ? 'Elite' : r.barthag > 0.70 ? 'Tournament Caliber' : r.barthag > 0.50 ? 'Mid-Major Level' : 'Below Avg';
  const tierBadge = tier ? `<span class="tm-tier-badge">${tier}</span>` : '';
  badgesEl.innerHTML = confBadge + rankBadge + tierBadge;

  // Win probability bar
  if (r) {
    const pct = Math.round(r.barthag * 100);
    winProbEl.style.display = '';
    winPctEl.textContent = `${pct}%`;
    barFill.style.width = `${pct}%`;
    // color bar by tier
    barFill.style.background = r.barthag > 0.85
      ? 'linear-gradient(90deg,var(--green),rgba(46,204,113,.7))'
      : r.barthag > 0.5
      ? 'linear-gradient(90deg,var(--yellow),rgba(245,166,35,.7))'
      : 'linear-gradient(90deg,var(--red),rgba(224,82,82,.7))';
  } else {
    winProbEl.style.display = 'none';
  }

  overlay.classList.add('open');

  if (!r) {
    bodyEl.innerHTML = `<div class="tm-no-data">No Torvik ratings found for <strong>${esc(displayN)}</strong>.<br><br>This team may not be in the current dataset, or ratings haven't loaded yet.</div>`;
    return;
  }

  // KPI classification helpers
  const offKpi  = r.adjO > 113 ? 'kpi-good' : r.adjO > 107 ? 'kpi-warn' : r.adjO < 98 ? 'kpi-bad' : 'kpi-neu';
  const defKpi  = r.adjD < 94  ? 'kpi-good' : r.adjD < 100 ? 'kpi-warn' : r.adjD > 108 ? 'kpi-bad' : 'kpi-neu';
  const tempoKpi= 'kpi-neu';
  const offTag  = r.adjO > 113 ? 'Elite' : r.adjO > 107 ? 'Good' : r.adjO > 101 ? 'Average' : 'Weak';
  const defTag  = r.adjD < 94  ? 'Elite' : r.adjD < 100 ? 'Good' : r.adjD < 106 ? 'Average' : 'Weak';
  const tempoTag= r.adjT > 74  ? 'Very Fast' : r.adjT > 70 ? 'Fast' : r.adjT > 67 ? 'Avg' : 'Slow';

  // Interpretation
  const interp = `<strong>${displayN}</strong> runs a <strong>${tempoTag.toLowerCase()}-paced</strong> offense with <strong>${offTag.toLowerCase()}</strong> efficiency (${r.adjO.toFixed(1)} pts/100) and a <strong>${defTag.toLowerCase()}</strong> defense (${r.adjD.toFixed(1)} pts allowed/100). ${tier} program with ${Math.round(r.barthag*100)}% win probability vs an average D1 opponent.`;

  // Four factors helper
  const pctFmt = v => v ? `${(v*100).toFixed(1)}%` : '—';
  const ffCls  = (v, goodHigh, threshold) => {
    if (!v) return 'ff-neu';
    return (goodHigh ? v > threshold : v < threshold) ? 'ff-good' : 'ff-bad';
  };

  // Today's game
  let todayHtml = '';
  if (todayGame) {
    const oppKey  = isHome ? todayGame.aKey : todayGame.hKey;
    const oppName = isHome ? todayGame.away : todayGame.home;
    const opp     = displayName(oppKey, oppName);
    const site    = todayGame.neutral ? 'vs (N)' : isHome ? 'vs' : '@';
    const gameTime= todayGame.time ? new Date(todayGame.time).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}) : '';
    const { pred, vegasSpread, vegasTotal, statusName, homeScore, awayScore } = todayGame;

    const isLive  = statusName === 'STATUS_IN_PROGRESS' || statusName === 'STATUS_HALFTIME';
    const isFinal = statusName === 'STATUS_FINAL';

    let rows = '';
    if (gameTime && !isFinal) rows += `<div class="tm-game-row"><span>Tip-off</span><span class="val">${gameTime}</span></div>`;
    if ((isLive || isFinal) && homeScore !== undefined) {
      const hs = parseInt(homeScore)||0, as = parseInt(awayScore)||0;
      const ts = isHome ? hs : as, os = isHome ? as : hs;
      rows += `<div class="tm-game-row"><span>${isFinal?'Final score':'Current score'}</span><span class="val">${ts} – ${os}</span></div>`;
    }
    if (pred) {
      const modelLine = isHome ? -pred.margin : pred.margin;
      rows += `<div class="tm-game-row"><span>Model line</span><span class="val">${fmtSpread(modelLine.toFixed(1))}</span></div>`;
      rows += `<div class="tm-game-row"><span>Model total</span><span class="val">${pred.total.toFixed(1)}</span></div>`;
    }
    if (vegasSpread) {
      const vLine = isHome ? vegasSpread.point : -vegasSpread.point;
      rows += `<div class="tm-game-row"><span>Vegas spread</span><span class="val">${fmtSpread(vLine.toFixed(1))}</span></div>`;
    }
    if (vegasTotal) rows += `<div class="tm-game-row"><span>Vegas total</span><span class="val">O/U ${vegasTotal.point}</span></div>`;

    // Edge callout
    let edgeHtml = '';
    if (pred && vegasSpread) {
      const raw = pred.margin + vegasSpread.point;
      const teamEdge = isHome ? raw : -raw;
      const absEdge  = Math.abs(teamEdge);
      const dir      = teamEdge > 0 ? `Back ${displayN.split(' ').slice(-1)[0]}` : `Fade ${displayN.split(' ').slice(-1)[0]}`;
      const cls      = absEdge >= 7 ? 'good' : absEdge >= 4 ? 'warn' : 'none';
      const val      = absEdge >= 4 ? `${dir}  +${absEdge.toFixed(1)} pts` : 'No significant edge';
      edgeHtml = `<div class="tm-edge-row"><span class="tm-edge-lbl">Model Edge</span><span class="tm-edge-val ${cls}">${val}</span></div>`;
    }

    todayHtml = `
    <div class="tm-section">
      <div class="tm-section-title">Today's Game</div>
      <div class="tm-game-card">
        <div class="tm-game-hd">${esc(displayN)} ${site} ${esc(opp)}</div>
        <div class="tm-game-body">${rows}</div>
        ${edgeHtml}
      </div>
    </div>`;
  }

  bodyEl.innerHTML = `
    <div class="tm-section">
      <div class="tm-section-title">Efficiency</div>
      <div class="tm-kpi-row">
        <div class="tm-kpi ${offKpi}">
          <div class="tm-kpi-lbl">Adj Offense</div>
          <div class="tm-kpi-val">${r.adjO.toFixed(1)}</div>
          <div class="tm-kpi-tag">${offTag}</div>
        </div>
        <div class="tm-kpi ${defKpi}">
          <div class="tm-kpi-lbl">Adj Defense</div>
          <div class="tm-kpi-val">${r.adjD.toFixed(1)}</div>
          <div class="tm-kpi-tag">${defTag}</div>
        </div>
        <div class="tm-kpi ${tempoKpi}">
          <div class="tm-kpi-lbl">Tempo</div>
          <div class="tm-kpi-val">${r.adjT.toFixed(1)}</div>
          <div class="tm-kpi-tag">${tempoTag}</div>
        </div>
      </div>
      <div class="tm-interp">${interp}</div>
    </div>
    <div class="tm-section">
      <div class="tm-section-title">Four Factors</div>
      <div class="tm-ff-grid">
        <div class="tm-ff-cell">
          <div class="tm-ff-cell-label">Offense</div>
          <div class="tm-ff-stat"><span class="tm-ff-side">eFG%</span><span class="tm-ff-val ${ffCls(r.oEfg,true,.52)}">${pctFmt(r.oEfg)}</span></div>
          <div class="tm-ff-stat"><span class="tm-ff-side">TO%</span><span class="tm-ff-val ${ffCls(r.oTo,false,.18)}">${pctFmt(r.oTo)}</span></div>
          <div class="tm-ff-stat"><span class="tm-ff-side">OReb%</span><span class="tm-ff-val ${ffCls(r.oOr,true,.30)}">${pctFmt(r.oOr)}</span></div>
          <div class="tm-ff-stat"><span class="tm-ff-side">FT Rate</span><span class="tm-ff-val ${ffCls(r.oFtr,true,.30)}">${pctFmt(r.oFtr)}</span></div>
        </div>
        <div class="tm-ff-cell">
          <div class="tm-ff-cell-label">Defense</div>
          <div class="tm-ff-stat"><span class="tm-ff-side">eFG%</span><span class="tm-ff-val ${ffCls(r.dEfg,false,.50)}">${pctFmt(r.dEfg)}</span></div>
          <div class="tm-ff-stat"><span class="tm-ff-side">TO%</span><span class="tm-ff-val ${ffCls(r.dTo,true,.20)}">${pctFmt(r.dTo)}</span></div>
          <div class="tm-ff-stat"><span class="tm-ff-side">OReb%</span><span class="tm-ff-val ${ffCls(r.dOr,false,.28)}">${pctFmt(r.dOr)}</span></div>
          <div class="tm-ff-stat"><span class="tm-ff-side">FT Rate</span><span class="tm-ff-val ${ffCls(r.dFtr,false,.32)}">${pctFmt(r.dFtr)}</span></div>
        </div>
      </div>
    </div>
    ${todayHtml}`;
}

function bestEdge(g) {
  if (!g.pred) return 0;
  let e = 0;
  if (g.vegasSpread) {
    const edge = Math.abs(g.pred.margin + g.vegasSpread.point);
    if (edge > e) e = edge;
  }
  if (g.vegasTotal) {
    const edge = Math.abs(g.pred.total - g.vegasTotal.point);
    if (edge > e) e = edge;
  }
  return e;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
const ALLCAPS = new Set(['nc','unc','ucla','usc','uab','utsa','utep','fiu','fau','siue','liu','njit','utrgv','smu','tcu','byu','unlv','lsu','vcu','uc','uta','uic','usf','umbc','ipfw']);
function displayName(key, fallback) {

}
