<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueLine LS</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Tokens ── */
:root,[data-theme="dark"]{
  --bg:#07090f;--surface:#0e1320;--surface2:#161b2e;--border:#1e2540;
  --text:#dde2f5;--muted:#5a6690;
  --green:#2ecc71;--red:#e05252;--yellow:#f5a623;--blue:#4a9eff;
  --surface-green:#071a0e;--border-green:#124a28;
  --surface-red:#1a0707;--border-red:#4a1212;
  --surface-yellow:#1a1207;--border-yellow:#4a3210;
  --surface-blue:#070e1a;--border-blue:#122a4a;
  --shadow:0 2px 16px rgba(0,0,0,.45);
}
[data-theme="light"]{
  --bg:#edf1f8;--surface:#ffffff;--surface2:#f3f5fb;--border:#d4daee;
  --text:#1a1e35;--muted:#8090b8;
  --green:#1a8a40;--red:#d93025;--yellow:#b86e00;--blue:#2563eb;
  --surface-green:#edfaf3;--border-green:#1a8a40;
  --surface-red:#fde8e8;--border-red:#d93025;
  --surface-yellow:#fff8e1;--border-yellow:#b86e00;
  --surface-blue:#eff4ff;--border-blue:#2563eb;
  --shadow:0 1px 8px rgba(80,100,160,.10);
}
/* ── Reset ── */
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.mobile-conf-wrap{width:100%;box-sizing:border-box;}

/* ── Site Header ── */
.site-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:.65rem 1.25rem;
  display:grid;grid-template-columns:auto 1fr auto;
  align-items:center;gap:1rem;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(0,0,0,.3);
}
.brand{display:flex;align-items:baseline;gap:.15rem;text-decoration:none;}
.brand-ncaab{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:2px;color:var(--text);}
.brand-model{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:2px;color:var(--blue);}
.header-search{display:flex;align-items:center;}
.search-wrap{position:relative;display:flex;align-items:center;width:100%;max-width:360px;}
.search-icon{position:absolute;left:.75rem;color:var(--muted);font-size:.95rem;pointer-events:none;line-height:1;}
.team-search{
  width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:.38rem .9rem .38rem 2.1rem;border-radius:20px;
  font-family:'Inter',sans-serif;font-size:.8rem;
  transition:border-color .15s,box-shadow .15s;
}
.team-search::placeholder{color:var(--muted);}
.team-search:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(74,158,255,.12);}
.search-clear{
  position:absolute;right:.55rem;background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:.75rem;width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;transition:color .15s;
}
.search-clear:hover{color:var(--text);}
.header-actions{display:flex;align-items:center;gap:.4rem;}
.icon-btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  width:32px;height:32px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;transition:all .15s;flex-shrink:0;
}
.icon-btn:hover{border-color:var(--text);color:var(--text);}
.icon-btn.active{border-color:var(--blue);color:var(--blue);background:var(--surface-blue);}
input[type=date]{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:.35rem .65rem;border-radius:8px;font-family:'DM Mono',monospace;
  font-size:.73rem;cursor:pointer;height:32px;
}

/* ── Sub-nav (tabs + filters) ── */
.sub-nav{
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:stretch;
  position:sticky;top:54px;z-index:90;
  overflow-x:auto;scrollbar-width:none;
  width:100%;min-width:0;
}
.sub-nav::-webkit-scrollbar{display:none;}
.status-tabs{display:flex;flex-shrink:0;}
.stab{
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--muted);padding:.6rem .9rem;
  font-family:'Inter',sans-serif;font-size:.78rem;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:.35rem;
  transition:color .15s,border-color .15s;white-space:nowrap;
}
.stab:hover{color:var(--text);}
.stab.active{color:var(--blue);border-bottom-color:var(--blue);}
.stab-count{
  font-family:'DM Mono',monospace;font-size:.6rem;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:.05rem .38rem;color:var(--muted);
  transition:all .15s;
}
.stab.active .stab-count{background:var(--surface-blue);border-color:var(--border-blue);color:var(--blue);}
.stab-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite;flex-shrink:0;}
.stab-divider{width:1px;background:var(--border);margin:.5rem 0;flex-shrink:0;}
.sub-nav-right{
  display:flex;align-items:center;gap:.4rem;
  padding:.45rem .9rem;margin-left:auto;flex-shrink:0;
}
.sort-pills{
  display:flex;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;padding:.15rem;gap:.1rem;
}
.sort-pill{
  background:none;border:none;color:var(--muted);
  padding:.18rem .55rem;border-radius:6px;
  font-family:'Inter',sans-serif;font-size:.7rem;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.sort-pill:hover{color:var(--text);}
.sort-pill.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.25);}
.chip-btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:.2rem .58rem;border-radius:6px;
  font-family:'Inter',sans-serif;font-size:.7rem;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.chip-btn:hover{border-color:var(--text);color:var(--text);}
.chip-btn.on,.chip-btn.active{border-color:var(--blue);color:var(--blue);background:var(--surface-blue);}
.subnav-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;}

/* ── Day summary ── */
.day-summary{
  display:flex;align-items:center;gap:.6rem;
  padding:.35rem 1.25rem;
  background:var(--surface2);border-bottom:1px solid var(--border);
  font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);
  flex-wrap:wrap;
}
.ds-live{color:var(--red);font-weight:600;display:flex;align-items:center;gap:.3rem;}
.ds-live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);display:inline-block;animation:pulse 1.5s infinite;}
.ds-sep{color:var(--border);margin:0 .05rem;}
.ds-edge{color:var(--green);font-weight:600;}

/* ── Status bar (data load indicators) ── */
.status-bar{
  display:flex;gap:1rem;padding:.3rem 1.25rem;
  background:var(--surface2);border-bottom:1px solid var(--border);
  font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);flex-wrap:wrap;
}
.sc{display:flex;align-items:center;gap:.25rem;}
.sc.ok{color:var(--green);}
.sc.err{color:var(--red);}
.sc.warn{color:var(--yellow);}

/* ── Legacy btn (used in modals) ── */
.btn{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:.35rem .7rem;border-radius:8px;font-family:'Inter',sans-serif;
  font-size:.78rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;
}
.btn:hover{border-color:var(--blue);color:var(--blue);}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}
.btn.active{border-color:var(--blue);color:var(--blue);}

/* ── Layout ── */
.container{max-width:900px;margin:0 auto;padding:1.25rem;}
.game-list{display:flex;flex-direction:column;}
.loading{text-align:center;padding:3rem;color:var(--muted);font-family:'DM Mono',monospace;}
.err-banner{
  background:var(--surface-red);border:1px solid var(--border-red);
  border-radius:10px;padding:.65rem .9rem;color:var(--red);
  font-family:'DM Mono',monospace;font-size:.73rem;margin-bottom:.85rem;
}

/* ── Group headers ── */
.game-group{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1.5rem;}
.group-header{
  display:flex;align-items:center;gap:.5rem;
  font-family:'DM Mono',monospace;font-size:.6rem;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);
  padding:.2rem 0;border-bottom:1px solid var(--border);margin-bottom:.15rem;
}
.group-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.group-dot.live{background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse 1.5s infinite;}
.group-dot.upcoming{background:var(--blue);}
.group-dot.final{background:var(--muted);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── Card ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
  box-shadow:var(--shadow);
  transition:transform .15s,box-shadow .15s;
}
.card:hover{transform:translateY(-1px);box-shadow:0 5px 24px rgba(0,0,0,.3);}
.card.edge-hot{border-color:var(--green);}
.card.edge-warm{border-color:var(--yellow);}

/* Card header */
.card-hd{
  display:flex;justify-content:space-between;align-items:center;
  padding:.85rem 1.15rem .75rem;border-bottom:1px solid var(--border);
  gap:.5rem;flex-wrap:wrap;
}
.card-hd-teams{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;}
.team-away{font-family:'Inter',sans-serif;font-size:.92rem;font-weight:500;color:var(--muted);}
.team-home{font-family:'Inter',sans-serif;font-size:.92rem;font-weight:700;}
.card-vs{font-size:.72rem;color:var(--muted);}
.neutral-tag{font-size:.58rem;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:.05rem .3rem;}

/* Status badges */
.status-badge{
  font-family:'DM Mono',monospace;font-size:.67rem;
  padding:.2rem .6rem;border-radius:20px;font-weight:500;white-space:nowrap;
}
.badge-live{background:rgba(224,82,82,.12);color:var(--red);border:1px solid rgba(224,82,82,.3);}
.badge-final{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.badge-upcoming{background:var(--surface-blue);color:var(--blue);border:1px solid var(--border-blue);}

/* Card body — two columns */
.card-bd{display:grid;grid-template-columns:1fr 1px 1fr;}
.mblock{padding:.85rem 1.15rem;}
.mblock-div{background:var(--border);margin:.6rem 0;}
.mblock-label{
  font-family:'DM Mono',monospace;font-size:.57rem;
  text-transform:uppercase;letter-spacing:.9px;
  color:var(--muted);margin-bottom:.6rem;
}
.mnum-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.32rem;}
.mnum-row:last-child{margin-bottom:0;}
.mnum-lbl{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);width:3rem;flex-shrink:0;}
.mnum-val{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.5px;line-height:1;color:var(--text);}
.mnum-no-data{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);font-style:italic;padding:.3rem 0;}

/* Edge tooltip */
.edge-tip{display:inline-flex;align-items:center;justify-content:center;width:.9rem;height:.9rem;border-radius:50%;background:var(--surface2);border:1px solid var(--border);font-size:.5rem;color:var(--muted);cursor:default;margin-left:.25rem;vertical-align:middle;flex-shrink:0;}
#edge-tooltip{position:fixed;background:#1e1e2e;color:#e8e8f0;font-family:'Inter',sans-serif;font-size:.6rem;font-weight:400;white-space:nowrap;padding:.3rem .55rem;border-radius:6px;border:1px solid #2e2e45;pointer-events:none;z-index:9999;display:none;}

/* Edge pills */
.edge-pill{
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.3px;
  padding:.15rem .5rem;border-radius:20px;font-weight:600;
  margin-left:auto;white-space:nowrap;
}
.edge-pill.strong{background:var(--surface-green);color:var(--green);border:1px solid var(--border-green);}
.edge-pill.mod{background:var(--surface-yellow);color:var(--yellow);border:1px solid var(--border-yellow);}
.mnum-edge-sm{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);margin-left:auto;}
.mnum-edge-sm.strong{color:var(--green);}
.mnum-edge-sm.mod{color:var(--yellow);}

/* Card footer (ratings) */
.card-ft{
  display:flex;align-items:center;gap:.5rem;
  padding:.65rem 1.15rem;
  background:var(--surface2);border-top:1px solid var(--border);
  flex-wrap:wrap;
}
.ft-team{display:flex;flex-direction:column;gap:.1rem;flex:1;min-width:110px;}
.ft-tname{font-family:'Inter',sans-serif;font-size:.7rem;font-weight:600;color:var(--text);}
.ft-stats{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);}
.ft-div{width:1px;height:26px;background:var(--border);flex-shrink:0;}
.card-ft-warn{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--red);}

/* ── Four Factors ── */
.factors-wrap{padding:.75rem 1.15rem;border-top:1px solid var(--border);}
.factors-title{font-family:'DM Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:.4rem;}
.factors-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;}
.factor-cell{background:var(--surface2);border-radius:8px;padding:.4rem .55rem;}
.factor-name{font-family:'DM Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:.28rem;}
.fm-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.1rem;font-family:'DM Mono',monospace;font-size:.65rem;}
.fm-side{font-size:.57rem;color:var(--muted);}
.fm-val{font-weight:600;}
.fm-val.pos{color:var(--green);}
.fm-val.neg{color:var(--red);}
.fm-val.neu{color:var(--muted);}

/* ── Top picks bar ── */
.top-picks-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1.25rem .75rem;}
.picks-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem;margin-bottom:.55rem;}
.top-picks-title{font-family:'DM Mono',monospace;font-size:.57rem;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);}
.picks-accuracy{display:flex;gap:.35rem;flex-wrap:wrap;}
.acc-badge{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.15rem .45rem;white-space:nowrap;}
.acc-badge .acc-pct{font-weight:700;color:var(--text);}
.acc-badge.acc-good .acc-pct{color:var(--green);}
.acc-badge.acc-bad .acc-pct{color:var(--red);}
.picks-row{display:flex;gap:.55rem;overflow-x:auto;padding-bottom:.2rem;scrollbar-width:none;}
.picks-row::-webkit-scrollbar{display:none;}
.pick-card{
  flex-shrink:0;cursor:pointer;
  background:var(--surface2);border:1px solid var(--border);border-radius:12px;
  padding:.65rem .9rem;width:185px;
  transition:transform .12s,box-shadow .12s,border-color .12s;
}
.pick-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.25);}
.pick-card.hot{border-color:var(--green);}
.pick-card.warm{border-color:var(--yellow);}
.pick-matchup{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);margin-bottom:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pick-main{font-family:'DM Mono',monospace;font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pick-meta{display:flex;align-items:baseline;gap:.4rem;margin-bottom:.3rem;}
.pick-edge{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;line-height:1;}
.pick-card.hot .pick-edge{color:var(--green);}
.pick-card.warm .pick-edge{color:var(--yellow);}
.pick-type-tag{font-family:'DM Mono',monospace;font-size:.57rem;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.06rem .3rem;}
.pick-why{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);line-height:1.4;}
.picks-divider{flex-shrink:0;width:1px;background:var(--border);margin:0 .25rem;align-self:stretch;}

/* ── Settings modal ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;width:90%;max-width:440px;box-shadow:0 8px 40px rgba(0,0,0,.4);}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1.5px;margin-bottom:1.1rem;}
.field{margin-bottom:.9rem;}
.field label{display:block;font-family:'DM Mono',monospace;font-size:.63rem;color:var(--muted);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.4px;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.5rem .8rem;border-radius:8px;font-family:'DM Mono',monospace;font-size:.8rem;transition:border-color .15s;}
.field input:focus{outline:none;border-color:var(--blue);}
.field small{display:block;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);margin-top:.3rem;}
.modal-footer{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.1rem;}

/* ── Backtest ── */
.bt-panel{max-width:900px;margin:0 auto;padding:1rem 1.25rem;}
.bt-controls{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem;}
.bt-controls label{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);}
.bt-stats{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem;}
.bt-stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.6rem 1rem;min-width:80px;text-align:center;}
.bt-stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--text);}
.bt-stat-lbl{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.bt-table{width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:.73rem;}
.bt-table th{text-align:left;color:var(--muted);font-size:.6rem;text-transform:uppercase;letter-spacing:.4px;padding:.45rem .5rem;border-bottom:1px solid var(--border);}
.bt-table td{padding:.45rem .5rem;border-bottom:1px solid var(--border);}
.bt-table tr:last-child td{border-bottom:none;}
.bt-date{color:var(--muted);white-space:nowrap;}

/* ── Live score widget ── */
.live-score{
  display:flex;flex-direction:column;align-items:center;gap:.55rem;
  padding:1rem 1.15rem .85rem;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(224,82,82,.05) 0%,transparent 100%);
}
.live-score-row{
  display:flex;align-items:center;justify-content:center;gap:1.5rem;width:100%;
}
.live-score-team{display:flex;flex-direction:column;align-items:flex-end;flex:1;gap:.15rem;}
.live-score-team-home{align-items:flex-start;}
.live-score-name{
  font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.5px;
  text-transform:uppercase;color:var(--muted);
}
.live-score-pts{
  font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:1px;
  line-height:1;color:var(--muted);
}
.live-score-pts.winning{color:var(--text);}
.live-score-pts.losing{color:var(--muted);opacity:.6;}
.live-score-sep{
  font-family:'DM Mono',monospace;font-size:1.1rem;color:var(--border);
  flex-shrink:0;padding:0 .25rem;margin-top:.6rem;
}
.live-score-clock{
  font-family:'DM Mono',monospace;font-size:.7rem;color:var(--red);
  font-weight:500;letter-spacing:.3px;
}
.live-score-trend{
  display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;justify-content:center;
}
.trend-chip{
  font-family:'DM Mono',monospace;font-size:.65rem;font-weight:600;
  padding:.2rem .55rem;border-radius:20px;white-space:nowrap;
}
.trend-chip.covering{background:var(--surface-green);color:var(--green);border:1px solid var(--border-green);}
.trend-chip.trailing{background:var(--surface-red);color:var(--red);border:1px solid var(--border-red);}
.trend-chip.push{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.trend-pace{
  font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);
}
.trend-pace.over{color:var(--green);}
.trend-pace.under{color:var(--red);}

/* ── Final score widget ── */
.final-widget{
  display:flex;flex-direction:column;align-items:center;gap:.6rem;
  padding:.9rem 1.15rem .8rem;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.final-score-row{
  display:flex;align-items:center;justify-content:center;gap:1.5rem;width:100%;
}
.final-results{display:flex;flex-direction:column;gap:.3rem;width:100%;}
.fr-row{
  display:flex;align-items:center;gap:.45rem;
  font-family:'DM Mono',monospace;font-size:.65rem;flex-wrap:wrap;
}
.fr-label{
  font-size:.57rem;text-transform:uppercase;letter-spacing:.7px;
  color:var(--muted);width:3.8rem;flex-shrink:0;
}
.fr-val{color:var(--muted);}
.fr-sep{color:var(--border);}
.fr-actual{font-weight:600;color:var(--text);}
.fr-badge{
  font-family:'DM Mono',monospace;font-size:.63rem;font-weight:600;
  padding:.15rem .5rem;border-radius:20px;white-space:nowrap;margin-left:auto;
}
.fr-badge.cover,.fr-badge.over{background:var(--surface-green);color:var(--green);border:1px solid var(--border-green);}
.fr-badge.no-cover,.fr-badge.under{background:var(--surface-red);color:var(--red);border:1px solid var(--border-red);}
.fr-badge.push{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}

/* ── Rank badge ── */
.rank-badge{
  font-family:'DM Mono',monospace;font-size:.6rem;font-weight:700;
  color:#c8920a;background:rgba(245,166,35,.13);
  border:1px solid rgba(245,166,35,.35);
  border-radius:5px;padding:.05rem .32rem;flex-shrink:0;letter-spacing:.2px;
}
[data-theme="light"] .rank-badge{color:#7a4e00;background:rgba(184,110,0,.1);border-color:rgba(184,110,0,.3);}

/* ── Conference tag ── */
.conf-tag{
  font-family:'DM Mono',monospace;font-size:.57rem;color:var(--muted);
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:.04rem .3rem;
}

/* ── Ranked matchup card accent ── */
.card.ranked-game .card-hd{
  background:linear-gradient(135deg,rgba(245,166,35,.05) 0%,transparent 60%);
}
.card.ranked-game{border-color:rgba(245,166,35,.4);}
.ranked-badge{
  font-family:'DM Mono',monospace;font-size:.6rem;font-weight:700;
  color:var(--yellow);background:rgba(245,166,35,.1);
  border:1px solid rgba(245,166,35,.3);border-radius:20px;
  padding:.15rem .5rem;white-space:nowrap;
}

/* ── Conference pill strip ── */
.conf-strip{
  display:flex;align-items:center;gap:.35rem;
  padding:.5rem 1.25rem;
  background:var(--surface);border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.conf-strip::-webkit-scrollbar{display:none;}
.conf-strip-label{
  font-family:'DM Mono',monospace;font-size:.55rem;text-transform:uppercase;
  letter-spacing:.7px;color:var(--muted);flex-shrink:0;margin-right:.1rem;
}
.conf-pill{
  flex-shrink:0;background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:.25rem .65rem;border-radius:20px;
  font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.conf-pill:hover{border-color:var(--text);color:var(--text);}
.conf-pill.active{border-color:var(--blue);color:var(--blue);background:var(--surface-blue);}
.conf-pill.all-pill{color:var(--text);border-color:var(--border);}
.conf-pill.all-pill.active{border-color:var(--blue);background:var(--surface-blue);color:var(--blue);}

/* ── Compact mode ── */
.compact-list .card-ft{display:none;}
.compact-list .factors-wrap{display:none;}

/* ── Clickable team name ── */
.team-link{cursor:pointer;transition:color .12s;}
.team-link:hover{color:var(--blue);text-decoration:underline;text-underline-offset:2px;}

/* ── Conference group headers (By Conf sort) ── */
.conf-group-section{margin-bottom:1.75rem;}
.conf-group-hd{
  display:flex;align-items:center;gap:.6rem;
  padding:.5rem 0 .5rem;
  border-bottom:2px solid var(--border);
  margin-bottom:.85rem;
}
.conf-group-name{
  font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1.5px;color:var(--text);
}
.conf-group-count{
  font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:.05rem .4rem;
}
.conf-group-edge{
  font-family:'DM Mono',monospace;font-size:.6rem;color:var(--green);
}
.conf-group-drill{
  font-family:'DM Mono',monospace;font-size:.6rem;color:var(--blue);
  margin-left:auto;opacity:0;transition:opacity .15s;
}
.conf-group-hd{cursor:pointer;}
.conf-group-hd:hover .conf-group-drill{opacity:1;}
.conf-group-hd:hover .conf-group-name{color:var(--blue);}

/* ── Team stats panel ── */
.tm-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
  z-index:300;
}
.tm-overlay.open{display:block;}
.tm-panel{
  position:fixed;top:0;right:0;bottom:0;
  width:min(440px,100vw);
  background:var(--bg);
  display:flex;flex-direction:column;
  box-shadow:-12px 0 60px rgba(0,0,0,.6);
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.tm-overlay.open .tm-panel{transform:translateX(0);}

/* Header hero */
.tm-hero{
  flex-shrink:0;padding:1.5rem 1.35rem 1.15rem;
  background:linear-gradient(160deg,var(--surface2) 0%,var(--surface) 100%);
  border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
.tm-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 110% -20%,rgba(74,158,255,.08) 0%,transparent 70%);
  pointer-events:none;
}
.tm-hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem;}
.tm-hero-left{display:flex;flex-direction:column;gap:.3rem;}
.tm-name{
  font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;line-height:1;
  color:var(--text);
}
.tm-badges{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.tm-conf-badge{
  font-family:'DM Mono',monospace;font-size:.65rem;font-weight:600;
  background:var(--surface-blue);border:1px solid var(--border-blue);
  color:var(--blue);border-radius:6px;padding:.15rem .5rem;
}
.tm-rank-badge{
  font-family:'DM Mono',monospace;font-size:.65rem;font-weight:700;
  background:rgba(245,166,35,.13);border:1px solid rgba(245,166,35,.35);
  color:#c8920a;border-radius:6px;padding:.15rem .5rem;
}
.tm-tier-badge{
  font-family:'DM Mono',monospace;font-size:.62rem;
  color:var(--muted);background:var(--surface);
  border:1px solid var(--border);border-radius:6px;padding:.12rem .45rem;
}
.tm-close{
  background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);
  width:30px;height:30px;border-radius:8px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.85rem;
  transition:all .15s;
}
.tm-close:hover{border-color:var(--text);color:var(--text);background:var(--surface2);}

/* Win probability bar */
.tm-win-prob{display:flex;flex-direction:column;gap:.35rem;}
.tm-win-prob-label{
  font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;
  letter-spacing:.6px;color:var(--muted);display:flex;justify-content:space-between;
}
.tm-win-prob-label strong{color:var(--text);}
.tm-bar-track{
  height:6px;background:var(--border);border-radius:3px;overflow:hidden;
}
.tm-bar-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--green),rgba(46,204,113,.6));
  transition:width .6s cubic-bezier(.4,0,.2,1);
}

/* Body */
.tm-body{overflow-y:auto;flex:1;padding:1.1rem 1.35rem;display:flex;flex-direction:column;gap:1.1rem;}
.tm-body::-webkit-scrollbar{width:4px;}
.tm-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* Sections */
.tm-section{display:flex;flex-direction:column;gap:.6rem;}
.tm-section-title{
  font-family:'DM Mono',monospace;font-size:.58rem;text-transform:uppercase;
  letter-spacing:.8px;color:var(--muted);
  display:flex;align-items:center;gap:.5rem;
}
.tm-section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* KPI row — 3 tiles */
.tm-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;}
.tm-kpi{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:.8rem .6rem;text-align:center;
  position:relative;overflow:hidden;
}
.tm-kpi::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--border);
}
.tm-kpi.kpi-good::before{background:var(--green);}
.tm-kpi.kpi-bad::before{background:var(--red);}
.tm-kpi.kpi-warn::before{background:var(--yellow);}
.tm-kpi-val{
  font-family:'Bebas Neue',sans-serif;font-size:1.65rem;line-height:1;
  margin-bottom:.25rem;color:var(--text);
}
.tm-kpi.kpi-good .tm-kpi-val{color:var(--green);}
.tm-kpi.kpi-bad  .tm-kpi-val{color:var(--red);}
.tm-kpi-lbl{font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:.2rem;}
.tm-kpi-tag{
  font-family:'DM Mono',monospace;font-size:.57rem;
  padding:.1rem .35rem;border-radius:4px;display:inline-block;margin-top:.2rem;
}
.tm-kpi.kpi-good .tm-kpi-tag{background:var(--surface-green);color:var(--green);border:1px solid var(--border-green);}
.tm-kpi.kpi-bad  .tm-kpi-tag{background:var(--surface-red);color:var(--red);border:1px solid var(--border-red);}
.tm-kpi.kpi-warn .tm-kpi-tag{background:var(--surface-yellow);color:var(--yellow);border:1px solid var(--border-yellow);}
.tm-kpi.kpi-neu  .tm-kpi-tag{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}

/* Four factors */
.tm-ff-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;}
.tm-ff-cell{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.6rem .75rem;}
.tm-ff-cell-label{font-family:'DM Mono',monospace;font-size:.57rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:.5rem;}
.tm-ff-stat{display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem;}
.tm-ff-stat:last-child{margin-bottom:0;}
.tm-ff-side{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);}
.tm-ff-val{font-family:'DM Mono',monospace;font-size:.72rem;font-weight:600;}
.tm-ff-val.ff-good{color:var(--green);}
.tm-ff-val.ff-bad{color:var(--red);}
.tm-ff-val.ff-neu{color:var(--text);}

/* Interpretation */
.tm-interp{
  font-family:'Inter',sans-serif;font-size:.75rem;color:var(--muted);
  line-height:1.6;padding:.8rem 1rem;
  background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--blue);
  border-radius:0 10px 10px 0;
}
.tm-interp strong{color:var(--text);}

/* Today's game */
.tm-game-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;
}
.tm-game-hd{
  padding:.65rem .9rem;background:var(--surface2);
  border-bottom:1px solid var(--border);
  font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;
}
.tm-game-body{padding:.6rem .9rem;display:flex;flex-direction:column;gap:.35rem;}
.tm-game-row{
  font-family:'DM Mono',monospace;font-size:.67rem;color:var(--muted);
  display:flex;align-items:center;justify-content:space-between;
}
.tm-game-row .val{color:var(--text);}
.tm-edge-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:.5rem .9rem;border-top:1px solid var(--border);
  background:var(--surface2);
}
.tm-edge-lbl{font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.tm-edge-val{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.5px;}
.tm-edge-val.good{color:var(--green);}
.tm-edge-val.warn{color:var(--yellow);}
.tm-edge-val.none{color:var(--muted);font-size:.75rem;font-family:'DM Mono',monospace;letter-spacing:0;}

.tm-no-data{
  font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);
  text-align:center;padding:2rem 1rem;line-height:1.6;
}

/* ── Game detail modal ── */
.gd-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:300;overflow-y:auto;padding:1rem;align-items:flex-start;justify-content:center;}
.gd-overlay.open{display:flex;}
.gd-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;overflow:hidden;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.gd-header{padding:.7rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;}
.gd-matchup{font-weight:700;font-size:.95rem;color:var(--text);}
.gd-time{font-size:.7rem;color:var(--muted);margin-top:2px;}
.gd-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.9rem;padding:2px 6px;border-radius:4px;flex-shrink:0;line-height:1;}
.gd-close:hover{background:var(--border);color:var(--text);}
.gd-section{padding:.7rem 1rem;border-bottom:1px solid var(--border);}
.gd-section:last-child{border-bottom:none;}
.gd-section-title{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:.5rem;}
.gd-scores{display:flex;align-items:center;justify-content:center;gap:1.25rem;margin-bottom:.5rem;}
.gd-score-team{text-align:center;}
.gd-score-name{font-size:.65rem;color:var(--muted);margin-bottom:2px;}
.gd-score-pts{font-size:2rem;font-weight:800;color:var(--text);line-height:1;}
.gd-score-pts.gd-winner{color:var(--green);}
.gd-score-sep{font-size:1.2rem;color:var(--border);}
.gd-summary-row{display:flex;justify-content:center;gap:1.5rem;font-size:.73rem;color:var(--muted);margin-bottom:.6rem;}
.gd-summary-val{color:var(--text);font-weight:600;}
.gd-wp-row{margin-bottom:.3rem;}
.gd-wp-label{display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:3px;}
.gd-wp-name{color:var(--text);font-weight:600;}
.gd-wp-pct{color:var(--muted);}
.gd-wp-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.gd-wp-fill{height:100%;border-radius:3px;transition:width .3s;}
.gd-table{width:100%;border-collapse:collapse;font-size:.78rem;}
.gd-table th{color:var(--muted);font-weight:600;font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;padding:.2rem .35rem;text-align:left;}
.gd-table td{padding:.28rem .35rem;color:var(--text);}
.gd-table tr:not(:last-child) td{border-bottom:1px solid var(--border);}
.gd-edge-pos{color:var(--green);font-weight:700;}
.gd-edge-neg{color:var(--red);font-weight:700;}
.gd-edge-neu{color:var(--muted);}
.gd-move{font-size:.67rem;color:var(--muted);margin-top:.35rem;}
.gd-ctx-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.28rem;}
.gd-ctx-item{font-size:.78rem;color:var(--text);display:flex;align-items:flex-start;gap:.4rem;line-height:1.4;}
.gd-ctx-icon{flex-shrink:0;}
/* Details button on cards */
.gd-btn{font-family:'Inter',sans-serif;font-size:.62rem;font-weight:600;padding:.15rem .45rem;border:1px solid var(--border);border-radius:4px;background:none;color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap;}
.gd-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── Mobile controls (hidden on desktop) ── */
.mobile-controls { display:none; }
.mobile-conf-wrap { display:none; }

.mobile-select {
  font-size:.72rem; padding:.22rem .5rem;
  border:1px solid var(--border); border-radius:6px;
  background:var(--surface); color:var(--text);
  cursor:pointer; appearance:auto;
}
.mobile-filter-wrap { position:relative; }
.mobile-filter-btn {
  font-size:.72rem; padding:.22rem .55rem;
  border:1px solid var(--border); border-radius:6px;
  background:var(--surface); color:var(--text);
  cursor:pointer; display:flex; align-items:center; gap:.25rem;
}
.mobile-filter-btn.mfb-active { border-color:var(--accent); color:var(--accent); }
.mobile-filter-count {
  background:var(--accent); color:#fff;
  border-radius:50%; width:14px; height:14px;
  font-size:.58rem; font-weight:700;
  display:inline-flex; align-items:center; justify-content:center;
}
.mobile-filter-panel {
  display:none; position:absolute; top:calc(100% + 4px); right:0;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:.5rem .6rem; z-index:200;
  min-width:140px; box-shadow:0 4px 16px rgba(0,0,0,.15);
}
.mobile-filter-panel.mfp-open { display:block; }
.mfp-item {
  display:flex; align-items:center; gap:.4rem;
  font-size:.75rem; color:var(--text);
  padding:.28rem 0; cursor:pointer; white-space:nowrap;
}
.mfp-item input { cursor:pointer; accent-color:var(--accent); }
.mobile-conf-select { width:auto; }

/* ── Responsive ── */
@media(max-width:640px){
  /* Header */
  .site-header{grid-template-columns:auto 1fr;row-gap:.3rem;padding:.4rem .85rem;}
  .header-search{grid-column:1/-1;order:4;}
  .header-actions{gap:.2rem;flex-wrap:wrap;justify-content:flex-end;align-content:flex-start;}
  .search-wrap{max-width:100%;}
  .brand-ncaab,.brand-model{font-size:1.1rem;}
  /* Date picker gets its own row below the icon buttons */
  #date-pick{order:10;width:100%;font-size:.7rem;padding:.1rem .25rem;height:1.8rem;}
  .icon-btn{padding:.28rem .38rem;font-size:.85rem;}

  /* Sub-nav — hide desktop controls, show mobile replacements */
  .sub-nav-right{padding:.3rem .6rem;gap:.3rem;}
  .stab{padding:.45rem .6rem;font-size:.72rem;}
  .sort-pills{display:none;}
  .subnav-sep{display:none;}
  .chip-btn{display:none;}
  .conf-strip{display:none!important;}
  .mobile-conf-wrap{display:flex!important;align-items:center;gap:.4rem;padding:.3rem .6rem;border-bottom:1px solid var(--border);background:var(--surface2);}
  .mobile-controls{display:flex;align-items:center;gap:.3rem;margin-left:auto;}
  .sort-pill{font-size:.68rem;padding:.15rem .45rem;}
  .chip-btn{font-size:.68rem;padding:.18rem .45rem;}
  .conf-strip{padding:.4rem .85rem;gap:.25rem;}
  .conf-pill{font-size:.64rem;padding:.2rem .5rem;}

  /* Layout & spacing */
  .container{padding:.75rem .15rem;}
  .game-group{gap:.45rem;margin-bottom:.85rem;}
  .top-picks-bar{padding:.5rem .85rem .6rem;}
  .pick-card{width:158px;padding:.5rem .7rem;}
  .picks-row{gap:.4rem;}

  /* Card */
  .card{border-radius:11px;}
  .card-hd{padding:.55rem .85rem .5rem;gap:.35rem;}
  .team-away,.team-home{font-size:.82rem;}
  .status-badge{font-size:.62rem;padding:.15rem .45rem;}

  /* Card body — keep 2-col on mobile, just reduce padding */
  .card-bd{grid-template-columns:1fr 1px 1fr;}
  .mblock{padding:.55rem .75rem;}
  .mblock-div{background:var(--border);margin:.4rem 0;}
  .mnum-val{font-size:.95rem;}
  .mnum-lbl{font-size:.56rem;width:2.5rem;}
  .mnum-row{margin-bottom:.22rem;}

  /* Card footer */
  .card-ft{padding:.4rem .85rem;gap:.35rem;}
  .ft-stats{font-size:.56rem;}

  /* Four factors */
  .factors-wrap{padding:.5rem .85rem;}
  .factors-grid{grid-template-columns:repeat(4,1fr);}
  .factor-cell{padding:.3rem .4rem;}
  .fm-row{font-size:.6rem;}

  /* Live score widget */
  .live-score{padding:.7rem .85rem .65rem;}
  .live-score-pts{font-size:1.85rem;}
  .live-score-name{font-size:.58rem;}
  .live-score-row{gap:1rem;}

  /* Day summary & status bar */
  .day-summary{padding:.3rem .85rem;font-size:.6rem;}
  .status-bar{padding:.25rem .85rem;font-size:.57rem;}

  /* Pick cards */
  .pick-matchup{font-size:.58rem;}
  .pick-main{font-size:.75rem;}
  .pick-edge{font-size:1rem;}
  .pick-why{font-size:.55rem;}
}

/* ── Font overrides: Syne for brand/headings; Inter for numbers + UI ── */

/* Brand & section headings → Syne */
.brand-ncaab,.brand-model,
.conf-group-name,.modal h2 {
  font-family:'Syne',sans-serif;
  font-weight:800;
  letter-spacing:.5px;
}
.conf-group-name{ font-size:1rem;font-weight:700;letter-spacing:.3px; }
.modal h2{ font-weight:700;letter-spacing:.3px; }

/* Numbers & scores → Inter 800 (clean, tight, purpose-built for numerics) */
.mnum-val,.pick-edge,
.bt-stat-val,.live-score-pts,
.tm-name,.tm-edge-val {
  font-family:'Inter',sans-serif;
  font-weight:800;
  letter-spacing:-.02em;
}
/* Inter 800 is wider than old Bebas Neue — scale down to compensate */
.mnum-val{ font-size:1.05rem; }
.pick-edge{ font-size:1.15rem; }
.bt-stat-val{ font-size:1.2rem; }
.live-score-pts{ font-size:2.2rem; }
.tm-name{ font-size:1.55rem;letter-spacing:-.01em; }

/* UI labels, nav, descriptive text → Inter */
.day-summary,.status-bar,
.loading,.err-banner,
.group-header,
.mblock-label,
.status-badge,
.factors-title,.factor-name,
.top-picks-title,
.acc-badge,
.pick-matchup,.pick-main,.pick-type-tag,.pick-why,
.field label,.field small,
.bt-controls label,.bt-stat-lbl,
.bt-table th,
.live-score-name,
.conf-tag,
.conf-group-count,.conf-group-edge,.conf-group-drill,
.tm-conf-badge,.tm-kpi-lbl,.tm-ff-cell-label,.tm-ff-side,
.conf-strip-label,
input[type=date] {
  font-family:'Inter',sans-serif;
}
.pick-main{ font-size:.8rem;font-weight:700;letter-spacing:-.01em; }
.group-header{ letter-spacing:.08em; }
.mblock-label{ letter-spacing:.06em; }

/* Mobile overrides — must come AFTER base override block to win cascade */
@media(max-width:640px){
  .brand-ncaab,.brand-model{ font-size:1.2rem; }
  .mnum-val{ font-size:.88rem; }
  .mnum-lbl{ font-size:.55rem;width:2.4rem; }
  .mnum-row{ margin-bottom:.18rem; }
  .pick-edge{ font-size:.95rem; }
  .bt-stat-val{ font-size:1.05rem; }
  .live-score-pts{ font-size:1.8rem; }
  .tm-name{ font-size:1.3rem; }
  .pick-main{ font-size:.72rem; }

  /* Hide four factors on mobile — saves ~90px per card */
  .factors-wrap{ display:none; }

  /* Card-ft (team ratings) — collapse to one compact line */
  .card-ft{ flex-wrap:nowrap;overflow:hidden; }
  .ft-team{ min-width:0;flex:1; }
  .ft-stats{ white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
}

/* ── Compact mobile card ── */
.card-mobile{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.card-mobile.cm-hot{border-color:var(--green);}
.card-mobile.cm-warm{border-color:var(--yellow);}
.cm-hd{display:flex;align-items:center;justify-content:space-between;padding:.38rem .7rem;gap:.4rem;}
.cm-teams{display:flex;align-items:center;gap:.22rem;flex:1;min-width:0;font-size:.76rem;font-weight:600;overflow:hidden;}
.cm-tname{cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:38%;}
.cm-tname:hover{color:var(--blue);}
.cm-at{color:var(--muted);font-size:.68rem;flex-shrink:0;}
.cm-rank{font-size:.58rem;color:#c8920a;font-weight:700;flex-shrink:0;}
.cm-score{display:flex;align-items:center;gap:.5rem;padding:.28rem .7rem;background:rgba(224,82,82,.06);border-top:1px solid var(--border);}
.cm-pts{font-family:'Inter',sans-serif;font-weight:800;font-size:1.05rem;color:var(--muted);letter-spacing:-.02em;min-width:1.6rem;text-align:center;}
.cm-pts.cm-lead{color:var(--text);}
.cm-score-sep{color:var(--border);}
.cm-clock{font-size:.6rem;color:var(--red);font-weight:600;margin-left:auto;}
.cm-cover{font-size:.58rem;font-weight:600;padding:.1rem .32rem;border-radius:10px;flex-shrink:0;}
.cm-cover.cm-covering{background:var(--surface-green);color:var(--green);border:1px solid var(--border-green);}
.cm-cover.cm-trailing{background:var(--surface-red);color:var(--red);border:1px solid var(--border-red);}
.cm-cover.cm-push{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.cm-pace{font-size:.58rem;font-weight:600;flex-shrink:0;}
.cm-pace.cm-over{color:var(--green);}
.cm-pace.cm-under{color:var(--red);}
.cm-lines{border-top:1px solid var(--border);padding:.28rem .7rem;display:flex;flex-direction:column;}
.cm-row{display:flex;align-items:center;gap:.4rem;padding:.18rem 0;}
.cm-row+.cm-row{border-top:1px solid var(--border);}
.cm-lbl{font-family:'Inter',sans-serif;font-size:.56rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);width:2.8rem;flex-shrink:0;}
.cm-val{font-family:'Inter',sans-serif;font-weight:700;font-size:.72rem;color:var(--text);min-width:2.6rem;}
.cm-vs{font-size:.58rem;color:var(--border);flex-shrink:0;}
.cm-vval{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);min-width:2.6rem;}
.cm-edge{margin-left:auto;font-size:.62rem;font-weight:700;color:var(--muted);}
.cm-edge.cm-good{color:var(--green);}
.cm-edge.cm-mod{color:var(--yellow);}
.cm-col-hdrs{display:flex;align-items:center;gap:.4rem;padding:.1rem 0 .18rem;border-bottom:1px solid var(--border);margin-bottom:.02rem;}
.cm-col-hdr{font-family:'Inter',sans-serif;font-size:.52rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);min-width:2.6rem;}
.cm-col-hdr.ch-lbl{width:2.8rem;flex-shrink:0;}
.cm-col-hdr.ch-edge{margin-left:auto;}
.cm-advice{display:flex;align-items:center;gap:.35rem;padding:.28rem .7rem;border-top:1px solid var(--border);font-family:'Inter',sans-serif;font-size:.68rem;font-weight:600;}
.cm-advice.cm-act-strong{color:var(--green);}
.cm-advice.cm-act-lean{color:var(--yellow);}
.cm-advice.cm-act-none{color:var(--muted);font-weight:400;}
.cm-advice-text{flex:1;}
.cm-wp{font-family:'Inter',sans-serif;font-size:.6rem;font-weight:700;color:var(--blue);white-space:nowrap;margin-left:auto;flex-shrink:0;}

/* Favored team name label next to spread number */
.mnum-team{font-family:'Inter',sans-serif;font-size:.62rem;font-weight:600;color:var(--muted);margin-left:.3rem;flex-shrink:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cm-fav{font-size:.6rem;font-weight:500;color:var(--muted);margin-left:.15rem;}

/* ── Contextual badges ────────────────────────────── */
.ctx-badge{display:inline-flex;align-items:center;font-family:'Inter',sans-serif;font-size:.52rem;font-weight:700;border-radius:3px;padding:.06rem .28rem;margin-left:.22rem;vertical-align:middle;flex-shrink:0;white-space:nowrap;}
.b2b-tag{color:var(--yellow);background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.28);}
.inj-flag{color:var(--red);background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.25);}
.early-tag{color:#a78bfa;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.28);}
.form-tag{border:1px solid currentColor;background:rgba(0,0,0,.04);}
.form-up{color:var(--green);}
.form-dn{color:var(--red);}
.travel-tag{color:var(--muted);background:var(--surface2);border:1px solid var(--border);}
.public-tag{color:var(--yellow);background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);}

/* Line movement */
.line-move{font-family:'Inter',sans-serif;font-size:.58rem;font-weight:700;margin-left:.18rem;flex-shrink:0;}
.lm-up{color:var(--green);}
.lm-dn{color:var(--red);}

/* ── Sport Switcher ── */
.sport-nav{display:flex;align-items:center;gap:.25rem;background:var(--surface);border-bottom:1px solid var(--border);padding:.3rem .9rem;}
.sp-tab{background:none;border:1px solid transparent;cursor:pointer;font-family:'DM Mono',monospace;font-size:.72rem;font-weight:500;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:.35rem .75rem;border-radius:5px;transition:color .15s,background .15s;}
.sp-tab:hover{color:var(--text);background:var(--surface2);}
.sp-tab.active{color:var(--blue);background:var(--surface-blue);border-color:var(--border-blue);}

/* ── MLB placeholder ── */
.mlb-cs-banner{padding:.85rem 1.15rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem;}
.mlb-cs-tag{font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);background:var(--surface-blue);border:1px solid var(--border-blue);border-radius:4px;padding:.15rem .4rem;flex-shrink:0;}
.mlb-cs-text{font-family:'Inter',sans-serif;font-size:.8rem;color:var(--muted);}
.mnum-placeholder{color:var(--muted);opacity:.4;}
.card-ft-cs{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);font-style:italic;}
.mlb-sub-nav{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);padding:.25rem .9rem;gap:.75rem;}
.mlb-sub-nav-left{display:flex;align-items:center;gap:.5rem;}
.mlb-sub-nav-right{display:flex;align-items:center;gap:.4rem;}
.mlb-season-tag{font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.2rem .5rem;border:1px solid var(--border);border-radius:4px;}
.mlb-lines{display:grid;grid-template-columns:3rem 1fr 1fr 1fr;align-items:center;gap:.1rem 0;padding:.55rem 1.15rem;border-top:1px solid var(--border);}
.mlb-lines-hd{font-family:'DM Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:center;padding-bottom:.25rem;}
.mlb-lines-lbl{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);}
.mlb-lines-val{font-family:'DM Mono',monospace;font-size:.78rem;font-weight:500;text-align:center;color:var(--muted);opacity:.4;}
.mlb-pitchers{display:flex;gap:.75rem;padding:.65rem 1.15rem;border-top:1px solid var(--border);background:var(--surface2);}
.mlb-pitcher{flex:1;min-width:0;display:flex;flex-direction:column;gap:.2rem;}
.mlb-pitcher-side{font-family:'DM Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
.mlb-pitcher-name{font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;color:var(--text);}
.mlb-pitcher-stats{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);display:flex;gap:.5rem;flex-wrap:wrap;}
.mlb-pitcher-stat{display:flex;flex-direction:column;gap:.05rem;align-items:center;}
.mlb-pitcher-stat-lbl{font-size:.52rem;text-transform:uppercase;letter-spacing:.05em;opacity:.6;}
.mlb-pitcher-stat-val{color:var(--text);font-weight:500;}
.mlb-pitcher-stat-val.ph{opacity:.35;}
.mlb-hand{font-family:'DM Mono',monospace;font-size:.58rem;font-weight:600;color:var(--muted);margin-left:.25rem;opacity:.7;}
.mlb-quality{font-family:'DM Mono',monospace;font-size:.6rem;font-weight:700;margin-left:.3rem;padding:.05rem .28rem;border-radius:3px;}
.mlb-quality-pos{color:var(--green);background:rgba(46,204,113,.1);}
.mlb-quality-neg{color:var(--red);background:rgba(224,82,82,.1);}
.mlb-quality-neu{color:var(--muted);background:var(--surface2);}
.mlb-opp-pos{color:var(--red);}   /* strong offense vs this pitcher — bad for pitcher */
.mlb-opp-neg{color:var(--green);} /* weak offense vs this pitcher — good for pitcher */
.mlb-pitcher-div{width:1px;background:var(--border);flex-shrink:0;align-self:stretch;}
.mlb-proj-score{display:flex;align-items:center;justify-content:center;padding:.5rem 1.15rem .2rem;border-top:1px solid var(--border);}
.mlb-proj-line{display:flex;align-items:baseline;gap:.4rem;font-family:'DM Mono',monospace;font-size:.95rem;font-weight:600;color:var(--text);}
.mlb-proj-team-score{color:var(--blue);}
.mlb-proj-sep{color:var(--muted);font-size:.8rem;font-weight:400;}
.mlb-diff-table{width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:.65rem;margin:.15rem 0 0;}
.mlb-diff-table th{font-size:.56rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:400;padding:.2rem .35rem;opacity:.6;text-align:center;}
.mlb-diff-table th:first-child{text-align:left;padding-left:1.15rem;width:4.2rem;}
.mlb-diff-table td{padding:.18rem .35rem;text-align:center;vertical-align:middle;color:var(--text);}
.mlb-diff-table td:first-child{text-align:left;padding-left:1.15rem;color:var(--muted);font-size:.57rem;text-transform:uppercase;letter-spacing:.04em;}
.mlb-diff-table td:last-child,.mlb-diff-table th:last-child{padding-right:1.15rem;}
.mlb-dt-diff td{font-weight:600;font-size:.67rem;}
.mlb-impl{font-size:.55rem;color:var(--muted);font-weight:400;}
.diff-green{color:var(--green);}
.diff-yellow{color:var(--yellow);}
.diff-gray{color:var(--muted);font-weight:400;}
.mlb-bet-signal{display:flex;align-items:center;gap:.45rem;padding:.35rem 1.15rem .45rem;border-top:1px solid var(--border);}
.mlb-bet-signal.take .mlb-bet-text{color:var(--green);font-weight:600;}
.mlb-bet-signal.lean .mlb-bet-text{color:var(--yellow);font-weight:500;}
.mlb-bet-text{font-family:'Inter',sans-serif;font-size:.72rem;}
.mlb-bet-icon{font-size:.8rem;line-height:1;}
.mlb-wp-row{display:flex;justify-content:space-between;align-items:center;padding:.3rem 1.15rem .1rem;gap:.5rem;}
.mlb-wp-team{display:flex;flex-direction:column;align-items:center;gap:.1rem;flex:1;}
.mlb-wp-pct{font-family:'DM Mono',monospace;font-size:.82rem;font-weight:700;color:var(--text);}
.mlb-wp-pct.wp-fav{color:var(--blue);}
.mlb-wp-name{font-family:'Inter',sans-serif;font-size:.6rem;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:7rem;}
.mlb-wp-sep{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);}
.mlb-wp-ml{font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;color:var(--muted);opacity:.8;}
.mlb-edge-row{display:flex;justify-content:flex-end;padding:.15rem 1.15rem .35rem;border-bottom:1px solid var(--border);}
.mlb-edge-badge{font-family:'DM Mono',monospace;font-size:.65rem;font-weight:600;padding:.1rem .4rem;border-radius:4px;}
.mlb-edge-pos{color:var(--green);background:rgba(46,204,113,.1);}
.mlb-edge-neg{color:var(--red);background:rgba(224,82,82,.1);}
.mlb-edge-neu{color:var(--muted);background:var(--surface2);}
</style>
</head>
<body>

<div class="site-header">
  <div class="brand">
    <span class="brand-ncaab">TrueLine</span><span class="brand-model"> LS</span>
  </div>
  <div class="header-search">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="team-search" id="team-search" type="search" placeholder="Search teams…" oninput="onSearch(this.value)" autocomplete="off">
      <button class="search-clear" id="search-clear" onclick="clearSearch()" style="display:none" title="Clear">✕</button>
    </div>
  </div>
  <div class="header-actions">
    <input type="date" id="date-pick" onchange="onDateChange()">
    <button class="icon-btn" onclick="refresh()" title="Refresh data">↻</button>
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <button class="icon-btn" onclick="openSettings()" title="Settings">⚙</button>
    <button class="icon-btn" id="bt-toggle" onclick="toggleBacktest()" title="Backtest">📊</button>
  </div>
</div>

<div class="sport-nav" id="sport-nav">
  <button class="sp-tab" data-sport="ncaab">NCAAB</button>
  <button class="sp-tab active" data-sport="mlb">MLB</button>
</div>

<div id="ncaab-view" style="display:none">
<div id="top-picks-bar" class="top-picks-bar" style="display:none"></div>

<div class="sub-nav" id="sub-nav">
  <div class="status-tabs">
    <button class="stab active" data-tab="all" onclick="setTab('all')">All <span class="stab-count" id="tc-all">—</span></button>
    <button class="stab" data-tab="live" onclick="setTab('live')"><span class="stab-dot"></span>Live <span class="stab-count" id="tc-live"></span></button>
    <button class="stab" data-tab="upcoming" onclick="setTab('upcoming')">Upcoming <span class="stab-count" id="tc-upcoming"></span></button>
    <button class="stab" data-tab="final" onclick="setTab('final')">Final <span class="stab-count" id="tc-final"></span></button>
  </div>
  <div class="stab-divider"></div>
  <div class="sub-nav-right">
    <div class="sort-pills">
      <button class="sort-pill active" data-sort="edge" onclick="setSort('edge')">Best Edge<span class="edge-tip" data-tip="Edge = model line minus Vegas line. Lean ≥ 3pts · Take ≥ 6pts">?</span></button>
      <button class="sort-pill" data-sort="time" onclick="setSort('time')">Time</button>
      <button class="sort-pill" data-sort="rank" onclick="setSort('rank')">Ranked</button>
      <button class="sort-pill" data-sort="conf" onclick="setSort('conf')">By Conf</button>
    </div>
    <div class="subnav-sep"></div>
    <button class="chip-btn" id="fc-odds" onclick="toggleFilter('hasOdds')">Odds Only</button>
    <button class="chip-btn" id="fc-edge" onclick="toggleFilter('edgeOnly')">Edge ≥ 4</button>
    <button class="chip-btn" id="fc-ranked" onclick="toggleFilter('onlyRanked')">Top 25</button>
    <div class="subnav-sep"></div>
    <button class="chip-btn" id="fc-compact" onclick="toggleFilter('compact')" title="Compact view">⊟</button>
  </div>
</div>

<div class="conf-strip" id="conf-strip" style="display:none"></div>
<div class="mobile-conf-wrap" id="mobile-conf-wrap">
  <select class="mobile-select mobile-conf-select" id="mobile-conf" onchange="setConference(this.value)">
    <option value="">All Conferences</option>
  </select>
  <div class="mobile-controls">
    <select class="mobile-select" id="mobile-sort" onchange="setSort(this.value)">
      <option value="edge">Best Edge</option>
      <option value="time">Time</option>
      <option value="rank">Ranked</option>
      <option value="conf">By Conf</option>
    </select>
    <div class="mobile-filter-wrap">
      <button class="mobile-filter-btn" id="mobile-filter-btn" onclick="toggleMobileFilters(event)">
        Filters<span class="mobile-filter-count" id="mobile-filter-count" style="display:none"></span>
      </button>
      <div class="mobile-filter-panel" id="mobile-filter-panel">
        <label class="mfp-item"><input type="checkbox" id="mfp-odds" onchange="toggleFilter('hasOdds')"> Odds Only</label>
        <label class="mfp-item"><input type="checkbox" id="mfp-edge" onchange="toggleFilter('edgeOnly')"> Edge ≥ 4</label>
        <label class="mfp-item"><input type="checkbox" id="mfp-ranked" onchange="toggleFilter('onlyRanked')"> Top 25</label>
        <label class="mfp-item"><input type="checkbox" id="mfp-compact" onchange="toggleFilter('compact')"> Compact</label>
      </div>
    </div>
  </div>
</div>
<div class="day-summary" id="day-summary" style="display:none"></div>
<div class="status-bar">
  <span class="sc" id="st-ratings">Ratings: —</span>
  <span class="sc" id="st-games">Games: —</span>
  <span class="sc" id="st-odds">Odds: —</span>
  <span class="sc" id="st-betting" style="display:none">Public: —</span>
</div>

<div class="container">
  <div id="err-area"></div>
  <div id="game-list" class="loading">Loading…</div>
</div>
</div><!-- /#ncaab-view -->

<div id="mlb-view">
  <div class="mlb-sub-nav">
    <div class="mlb-sub-nav-left">
      <span class="mlb-season-tag">2026 Regular Season</span>
    </div>
    <div class="mlb-sub-nav-right">
      <input type="date" id="mlb-date-pick" onchange="mlbOnDateChange()">
      <button class="icon-btn" onclick="mlbRefresh()" title="Refresh MLB data">↻</button>
    </div>
  </div>
  <div id="mlb-top-picks" class="top-picks-bar" style="display:none"></div>
  <div class="status-bar">
    <span class="sc" id="st-mlb-games">Games: —</span>
    <span class="sc" id="st-mlb-odds">Odds: —</span>
  </div>
  <div class="container">
    <div id="mlb-game-list" class="game-list"></div>
  </div>
</div><!-- /#mlb-view -->

<!-- Team stats panel -->
<div class="tm-overlay" id="tm-overlay" onclick="if(event.target===this)closeTeamModal()">
  <div class="tm-panel" id="tm-panel">
    <div class="tm-hero" id="tm-hero">
      <div class="tm-hero-top">
        <div class="tm-hero-left">
          <span class="tm-name" id="tm-name"></span>
          <div class="tm-badges" id="tm-badges"></div>
        </div>
        <button class="tm-close" onclick="closeTeamModal()">✕</button>
      </div>
      <div class="tm-win-prob" id="tm-win-prob" style="display:none">
        <div class="tm-win-prob-label">
          <span>Win Probability vs Avg D1</span>
          <strong id="tm-win-pct">—</strong>
        </div>
        <div class="tm-bar-track"><div class="tm-bar-fill" id="tm-bar-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="tm-body" id="tm-body"><div class="tm-no-data">Loading…</div></div>
  </div>
</div>

<!-- Game detail modal -->
<div class="gd-overlay" id="gd-overlay" onclick="if(event.target===this)closeGameModal()">
  <div class="gd-modal">
    <div class="gd-header" id="gd-header"></div>
    <div class="gd-body" id="gd-body"></div>
  </div>
</div>

<!-- Settings -->
<div class="overlay" id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">

// Try CORS proxies in sequence — returns parsed JSON or throws
async function fetchViaProxy(url) {
  const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const attempts = [
    // 1. Direct — only on localhost (avoids CORS console error on GitHub Pages)
    ...(isLocal ? [async () => {
      const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }] : []),
    // 2. corsproxy.io
    async () => {
      const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(10000) });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    },
  ];
  const errors = [];
  for (const attempt of attempts) {
    try { return await attempt(); } catch(e) { errors.push(e.message); }
  }
  throw new Error('All proxies failed: ' + errors.join(' | '));
}

function cacheAge(ts) {
  const mins = Math.round((Date.now() - ts) / 60000);
  if (mins < 2) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m > 0 ? `${h}h ${m}m ago` : `${h}h ago`;
}

function normTeam(raw) {
  if (!raw) return '';
  let s = raw.toLowerCase()
    .replace(/[\u2018\u2019''`]/g,"'")
    .replace(/\s*\([^)]{0,6}\)\s*/g,' ')  // strip (NY), (FL) etc.
    .replace(/[^a-z0-9\s'&.-]/g,'')
    .replace(/([a-z])\.([a-z])\./g, '$1$2')  // n.c. → nc
    .replace(/\s+/g,' ')
    .trim()
    .replace(/ st\.$/, ' state')          // "iowa st." → "iowa state"
    .replace(/\bst\b(?!\.)/g, 'state');   // standalone "st" → "state"
  return ALIAS[s] || s;
}

// Find Torvik key that best matches a full team name (ESPN or Odds API)
function matchTeam(fullName) {
  const norm = normTeam(TeamResolver.getCanonical(fullName));
  if (ratings[norm]) return norm;

  // Strip trailing words one at a time (removes mascot progressively)
  const words = norm.split(' ');
  for (let len = words.length - 1; len >= 1; len--) {
    const shorter = words.slice(0, len).join(' ');
    if (ratings[shorter]) return shorter;
  }

  // Fuzzy: Dice coefficient on shared words
  const nw = words.filter(w => w.length > 2);
  let best = 0, bestKey = null;
  for (const key of Object.keys(ratings)) {
    const kw = key.split(' ').filter(w => w.length > 2);
    const shared = nw.filter(w => kw.includes(w)).length;
    if (!shared) continue;
    const score = (2 * shared) / (nw.length + kw.length);
    if (score > best && score >= 0.5) { best = score; bestKey = key; }
  }
  if (bestKey) return bestKey;

  // Last-resort: try just the first word.
  // Handles "Duke Blue Devils"→"duke", "Michigan Wolverines"→"michigan",
  // "Gonzaga Bulldogs"→"gonzaga", "VCU Rams"→"vcu", etc.
  // Multi-word Torvik keys (e.g. "michigan state") are always found by the
  // strip loop above (which goes down to 2 words), so they never reach here.
  if (words.length >= 2) {
    const firstResolved = ALIAS[words[0]] || words[0];
    if (ratings[firstResolved]) return firstResolved;
  }

  // Only warn for multi-word strings that look like real team names
  if (fullName && fullName.includes(' ')) console.warn(`[TrueLine] matchTeam MISS: "${fullName}" → norm="${norm}"`);
  return null;
}

async function loadTorvik() {
  // 6-hour localStorage cache (v3 = TAMU-CC alias fix, forces re-parse with new ALIAS)
  const CACHE_VER = '3';
  if (localStorage.getItem('torvik_ver') !== CACHE_VER) {
    localStorage.removeItem('torvik_ratings');
    localStorage.removeItem('torvik_ts');
    localStorage.setItem('torvik_ver', CACHE_VER);
  }
  const cached = localStorage.getItem('torvik_ratings');
  const ts     = parseInt(localStorage.getItem('torvik_ts') || '0');
  if (cached && Date.now() - ts < 6 * 3600 * 1000) {
    ratings = JSON.parse(cached);
    const n = Object.keys(ratings).length;
    // Try to show Gist freshness even when serving from local cache
    fetch(GIST_META_URL, { signal: AbortSignal.timeout(5000) })
      .then(r => r.ok ? r.json() : null)
      .then(meta => {
        const gistAge = meta?.updated_at ? ` · updated ${cacheAge(new Date(meta.updated_at).getTime())}` : '';
        setSt('st-ratings', `Ratings: ${n} teams · cached ${cacheAge(ts)}${gistAge}`, 'ok');
      })
      .catch(() => setSt('st-ratings', `Ratings: ${n} teams · cached ${cacheAge(ts)}`, 'ok'));
    return;
  }
  setSt('st-ratings', 'Ratings: loading…', '');
  let data;
  try {
    const r = await fetch(GIST_URL, { signal: AbortSignal.timeout(15000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
  } catch(e) {
    setSt('st-ratings', 'Ratings: failed', 'err');
    showErr('Could not load Torvik ratings: ' + e.message);
    return;
  }
  ratings = parseTorvik(data);
  const n = Object.keys(ratings).length;
  if (n < 20) {
    setSt('st-ratings', 'Ratings: parse error', 'err');
    // Log first record to console so we can fix field mapping
    console.warn('Torvik parse issue. First raw record:', Array.isArray(data) ? data[0] : data);
    showErr('Torvik data loaded but could not parse ratings. Open console for raw data to help debug field mapping.');
    return;
  }
  localStorage.setItem('torvik_ratings', JSON.stringify(ratings));
  localStorage.setItem('torvik_ts', Date.now().toString());
  // Fetch meta for Gist update timestamp (non-blocking — failure is silent)
  fetch(GIST_META_URL, { signal: AbortSignal.timeout(5000) })
    .then(r => r.ok ? r.json() : null)
    .then(meta => {
      if (!meta?.updated_at) { setSt('st-ratings', `Ratings: ${n} teams`, 'ok'); return; }
      const gistAge = cacheAge(new Date(meta.updated_at).getTime());
      setSt('st-ratings', `Ratings: ${n} teams · updated ${gistAge}`, 'ok');
    })
    .catch(() => setSt('st-ratings', `Ratings: ${n} teams`, 'ok'));
}

function parseTorvik(data) {
  const out = {};
  const rows = Array.isArray(data) ? data
             : Array.isArray(data?.teams) ? data.teams
             : Array.isArray(data?.data)  ? data.data
             : [];
  rows.forEach(row => {
    try {
      let team, adjO, adjD, adjT, barthag, conf = '', games = null;
      let oEfg, oTo, oOr, oFtr, dEfg, dTo, dOr, dFtr;
      if (Array.isArray(row)) {
        // Common Torvik array layout:
        // [rank, team, conf, record, barthag, adjOE, adjDE, efg%, to%, or%, ftr%, def_efg%, def_to%, def_or%, def_ftr%, adjT, wab]
        if (typeof row[0] === 'number' && typeof row[1] === 'string') {
          team = row[1]; conf = typeof row[2]==='string' ? row[2].trim() : '';
          barthag = row[4]; adjO = row[5]; adjD = row[6];
          oEfg = row[7]; oTo = row[8]; oOr = row[9]; oFtr = row[10];
          dEfg = row[11]; dTo = row[12]; dOr = row[13]; dFtr = row[14]; adjT = row[15];
        } else if (typeof row[0] === 'string') {
          // [team, adjOE, adjDE, barthag, record, wins, games, ...]
          team = row[0]; adjO = row[1]; adjD = row[2]; barthag = row[3]; adjT = row[15];
          games = typeof row[6] === 'number' ? row[6] : null;
        }
      } else if (row && typeof row === 'object') {
        team    = row.team || row.Team;
        adjO    = row.adjoe  || row.adjOE  || row.AdjOE  || row.adj_oe;
        adjD    = row.adjde  || row.adjDE  || row.AdjDE  || row.adj_de;
        adjT    = row.adj_t  || row.adjT   || row.AdjT   || row.tempo;
        barthag = row.barthag || row.Barthag || 0;
        oEfg = row.efg || row.efg_pct || row.oefg; oTo = row.tov || row.tov_pct || row.oto;
        oOr  = row.orb || row.orb_pct || row.oor;  oFtr = row.ftr || row.ft_rate || row.oftr;
        dEfg = row.def_efg || row.defEfg || row.defefg; dTo = row.def_tov || row.deftov || row.dto;
        dOr  = row.def_orb || row.deforb || row.dor;    dFtr = row.def_ftr || row.defftr || row.dftr;
        conf = row.conf || row.Conf || row.conference || '';
      }
      adjO = parseFloat(adjO); adjD = parseFloat(adjD); adjT = parseFloat(adjT) || 68;
      if (!team || adjO < 60 || adjO > 155 || adjD < 60 || adjD > 155) return;
      const key = normTeam(team);
      out[key] = {
        raw: team, conf: (typeof conf === 'string' ? conf : ''),
        adjO, adjD, adjT, barthag: parseFloat(barthag) || 0,
        games: games != null ? parseInt(games) : null,
        oEfg: parseFloat(oEfg) || 0, oTo: parseFloat(oTo) || 0,
        oOr:  parseFloat(oOr)  || 0, oFtr: parseFloat(oFtr) || 0,
        dEfg: parseFloat(dEfg) || 0, dTo: parseFloat(dTo) || 0,
        dOr:  parseFloat(dOr)  || 0, dFtr: parseFloat(dFtr) || 0,
      };
    } catch(e) { /* skip malformed row */ }
  });
  return out;
}

function _cleanConfName(n) {
  return (n || '')
    .replace(/ Conference$/i, '')
    .replace(/ Athletic$/i, '')
    .replace(/^Southeastern$/, 'SEC')
    .replace(/^Atlantic Coast$/, 'ACC')
    .replace(/^Big Ten$/, 'Big Ten')
    .trim();
}

async function loadConferences() {
  const cached = sessionStorage.getItem('espn_team_confs_v2');
  if (cached) { teamIdToConf = JSON.parse(cached); return; }
  try {
    const r = await fetch(
      'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/groups?limit=100',
      { signal: AbortSignal.timeout(6000) }
    );
    const d = await r.json();
    const map = {};
    // Structure: groups[0]="NCAA Division I" → children[]=conferences → teams[]
    (d.groups || []).forEach(division => {
      (division.children || []).forEach(conf => {
        const confName = _cleanConfName(conf.name);
        (conf.teams || []).forEach(t => { if (t.id) map[String(t.id)] = confName; });
        (conf.children || []).forEach(sub => {
          (sub.teams || []).forEach(t => { if (t.id) map[String(t.id)] = confName; });
        });
      });
    });
    teamIdToConf = map;
    sessionStorage.setItem('espn_team_confs_v2', JSON.stringify(map));
  } catch(e) {
    teamIdToConf = {}; // will fall back to Torvik conf or static map
  }
  confIdMap = { ...CONF_ID_MAP }; // always keep static map as final fallback
}

async function loadESPN(dateStr) {
  try {
    const r = await fetch(`${ESPN_URL}?groups=50&limit=300&dates=${dateStr}`, { signal: AbortSignal.timeout(10000) });
    if (!r.ok) throw new Error(`ESPN ${r.status}`);
    const d = await r.json();
    espnList = (d.events || []).map(ev => {
      const comp = ev.competitions?.[0];
      const cs   = comp?.competitors || [];
      const home = cs.find(c => c.homeAway === 'home');
      const away = cs.find(c => c.homeAway === 'away');
      return {
        id:          ev.id,
        home:        home?.team?.displayName || '',
        away:        away?.team?.displayName || '',
        homeScore:   home?.score || '0',
        awayScore:   away?.score || '0',
        time:        ev.date,
        statusName:  comp?.status?.type?.name || '',
        shortDetail: comp?.status?.type?.shortDetail || '',
        period:      comp?.status?.period || 0,
        clock:       comp?.status?.displayClock || '',
        neutral:     comp?.neutralSite || false,
        homeRank:    parseInt(home?.curatedRank?.current) || 99,
        awayRank:    parseInt(away?.curatedRank?.current) || 99,
        homeTeamId:  home?.team?.id || '',
        awayTeamId:  away?.team?.id || '',
        homeConfId:  home?.team?.conferenceId || '',
        awayConfId:  away?.team?.conferenceId || '',
        officials:   (comp?.officials || []).map(o => o.displayName || o.fullName || '').filter(Boolean),
      };
    });
    _lastESPNRefresh = new Date();
    setSt('st-games', `Games: ${espnList.length}`, espnList.length ? 'ok' : 'warn');
  } catch(e) {
    setSt('st-games', 'Games: fetch error', 'err');
    console.warn('loadESPN failed:', e.message);
  }
}

// DATA: THE ODDS API

async function loadOdds(isoDate) {
  // Determine today's local date for historical comparison
  const _n = new Date();
  const todayIso = `${_n.getFullYear()}-${String(_n.getMonth()+1).padStart(2,'0')}-${String(_n.getDate()).padStart(2,'0')}`;

  // ── Historical date: use stored data, never call the live API ──
  if (isoDate < todayIso) {
    setSt('st-odds', 'Odds: loading historical lines…', 'ok');
    const gistData = await fetchStoredOdds(isoDate);
    if (gistData.length > 0) {
      oddsList = gistToOddsFormat(gistData);
      setSt('st-odds', `Odds: ${oddsList.length} games (historical)`, 'ok');
    } else {
      setSt('st-odds', 'Odds: no lines saved for this date', 'warn');
      oddsList = [];
    }
    return;
  }

  // Centralized odds: fetch live + locked-pregame files from Gist in parallel
  if (cfg.oddsGistId && isoDate === todayIso) {
    const base = `https://gist.githubusercontent.com/loganthein/${cfg.oddsGistId}/raw`;
    try {
      const [liveR, lockedR] = await Promise.all([
        fetch(`${base}/odds-${isoDate}.json`,        { cache: 'no-store', signal: AbortSignal.timeout(8000) }),
        fetch(`${base}/locked-odds-${isoDate}.json`, { cache: 'no-store', signal: AbortSignal.timeout(8000) }).catch(() => null),
      ]);
      if (liveR.ok) {
        const live    = await liveR.json();
        lockedOddsList = (lockedR?.ok ? await lockedR.json() : []);
        const lockedMap = new Map(lockedOddsList.filter(g => g.id).map(g => [g.id, g]));
        const liveIds   = new Set(live.map(g => g.id).filter(Boolean));
        const nowMs     = Date.now();
        oddsList = [
          // Live games: use locked (pre-game) entry for started games
          ...live.map(og => {
            if (!og.id || !og.commence_time) return og;
            const started = nowMs >= new Date(og.commence_time).getTime();
            return (started && lockedMap.has(og.id)) ? lockedMap.get(og.id) : og;
          }),
          // Re-add started games that have since dropped from the live API
          ...lockedOddsList.filter(og =>
            !liveIds.has(og.id) &&
            og.commence_time &&
            nowMs >= new Date(og.commence_time).getTime()
          ),
        ];
        setSt('st-odds', `Odds: ${oddsList.length} games (centralized)`, 'ok');
        return;
      }
    } catch(e) { /* fall through to direct API path */ }
  }

  // 30-min session cache
  const cc = sessionStorage.getItem('odds_cache');
  const ct = parseInt(sessionStorage.getItem('odds_ts') || '0');
  if (cc && Date.now() - ct < 30 * 60 * 1000) {
    oddsList = JSON.parse(cc);
    setSt('st-odds', `Odds: ${oddsList.length} games (cached)`, 'ok');
    return;
  }

  // Use noon UTC as boundaries so all US game times (ET through PT) are captured
  const nextDay = new Date(isoDate + 'T00:00:00Z');
  nextDay.setUTCDate(nextDay.getUTCDate() + 1);
  const nextIso = nextDay.toISOString().slice(0, 10);
  const FALLBACK_KEY = '4a78a7c6ae2eb0594f8ca57059dd14e4';
  const url = `${ODDS_BASE}/odds/?apiKey=${FALLBACK_KEY}`
    + `&regions=us&markets=spreads,totals&oddsFormat=american`
    + `&commenceTimeFrom=${isoDate}T12:00:00Z&commenceTimeTo=${nextIso}T12:00:00Z`;

  try {
    // Try direct fetch first (works when server sets CORS headers),
    // fall back through proxies if blocked (e.g. opened as file://)
    let data;
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
      oddsLeft = r.headers.get('x-requests-remaining');
      if (!r.ok) {
        const e = await r.json().catch(() => ({}));
        setSt('st-odds', `Odds: error ${r.status}`, 'err');
        showErr(`Odds API: ${e.message || r.statusText}`);
        oddsList = []; return;
      }
      data = await r.json();
    } catch {
      // Direct fetch blocked — try via proxy
      data = await fetchViaProxy(url);
    }
    oddsList = Array.isArray(data) ? data : [];
    sessionStorage.setItem('odds_cache', JSON.stringify(oddsList));
    sessionStorage.setItem('odds_ts', Date.now().toString());
    setSt('st-odds', `Odds: ${oddsList.length} games${oddsLeft ? ` · ${oddsLeft} req left` : ''}`, 'ok');
  } catch(e) {
    setSt('st-odds', 'Odds: fetch error', 'err');
    showErr(`Odds API failed: ${e.message}. Check Settings → key may be expired, or get a new free key at the-odds-api.com`);
    oddsList = [];
  }
}

// DATA: REST DATA (7-day lookback — B2B + short-rest detection)
// ══════════════════════════════════════════════════════════
async function loadRestData(dateStr) {
  const cacheKey = `rest_${dateStr}`;
  const cached = sessionStorage.getItem(cacheKey);
  if (cached) {
    teamDaysRest = JSON.parse(cached);
    teamsPlayedYesterday = new Set(Object.keys(teamDaysRest).filter(id => teamDaysRest[id] === 1));
    return;
  }

  const target = new Date(`${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}T12:00:00Z`);

  // Fetch up to 7 prior days in parallel; first (most recent) occurrence wins
  const fetches = [];
  for (let daysBack = 1; daysBack <= 7; daysBack++) {
    const d = new Date(target);
    d.setUTCDate(d.getUTCDate() - daysBack);
    const dStr = `${d.getUTCFullYear()}${String(d.getUTCMonth()+1).padStart(2,'0')}${String(d.getUTCDate()).padStart(2,'0')}`;
    fetches.push(
      fetch(`${ESPN_URL}?groups=50&limit=300&dates=${dStr}`, { signal: AbortSignal.timeout(8000) })
        .then(r => r.json())
        .then(data => ({ daysBack, data }))
        .catch(() => ({ daysBack, data: null }))
    );
  }

  const results = await Promise.allSettled(fetches);
  // Sort ascending so most recent (daysBack=1) overwrites older entries
  const sorted = results
    .filter(r => r.status === 'fulfilled' && r.value.data)
    .map(r => r.value)
    .sort((a, b) => b.daysBack - a.daysBack); // process oldest first so recent wins

  const restMap = {};
  for (const { daysBack, data } of sorted) {
    for (const ev of (data.events || [])) {
      for (const comp of (ev.competitions || [])) {
        for (const c of (comp.competitors || [])) {
          if (c.team?.id) restMap[c.team.id] = daysBack;
        }
      }
    }
  }

  teamDaysRest = restMap;
  teamsPlayedYesterday = new Set(Object.keys(restMap).filter(id => restMap[id] === 1));
  sessionStorage.setItem(cacheKey, JSON.stringify(restMap));
}

      `https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/teams/${teamId}/roster`,
      { signal: AbortSignal.timeout(6000) }
    );
    const d = await r.json();
    const injured = [];
    // Position → estimated minutes per game (NCAAB starters average 28–30 mpg)
    const POS_MPG = { PG: 28, G: 27, SG: 26, SF: 25, F: 24, PF: 22, C: 22 };
    for (const athlete of (d.athletes || [])) {
      const statusName = athlete.status?.type?.name || athlete.status?.name || '';

    injuryMap[teamId] = injured;
    sessionStorage.setItem(cacheKey, JSON.stringify(injured));
  } catch(e) { injuryMap[teamId] = []; }

async function loadInjuries() {

}

      if (r.ok) return r.json();

    const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(anUrl)}`, { signal: AbortSignal.timeout(12000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();

  try {
    const data = await fetchAN();

    for (const game of (data.games || [])) {
      // Team identity: match by home_team_id / away_team_id
      const teams = game.teams || [];

      const aSpread = spreadOutcomes.find(o => o.side === 'away');

      const totalOutcomes = eventMkts.total || [];
      const overTotal  = totalOutcomes.find(o => o.side === 'over');
      const underTotal = totalOutcomes.find(o => o.side === 'under');

      // percent is already 0–100 integer from API
