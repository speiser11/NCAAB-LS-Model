name: Fetch KenPom Referee Stats

# NOTE: KenPom blocks GitHub Actions IP ranges with a 403.
# This workflow is kept for reference but the scraper should be run locally.
# See optimize/scrape_refs.py for local usage instructions.
on:
  workflow_dispatch:   # manual trigger only — no schedule

jobs:
  fetch-refs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4 cloudscraper

      - name: Scrape KenPom refs and push to Gist
        env:
          KENPOM_USER: ${{ secrets.KENPOM_USER }}
          KENPOM_PASS: ${{ secrets.KENPOM_PASS }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: "44dd1f1464e3d7e2689b25ba758d4ea9"
        run: python3 optimize/scrape_refs.py
