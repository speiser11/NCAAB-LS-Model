name: Fetch Odds
on:
  schedule:
    # Every 30 min from noon UTC (7am ET) through midnight UTC (7pm ET) — covers all US game windows
    - cron: '*/30 12-23 * * *'
    - cron: '*/30 0-6 * * *'
  workflow_dispatch:

jobs:
  fetch-odds:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and push to Gist
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.ODDS_GIST_ID }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          NEXT=$(date -u -d '+1 day' +%Y-%m-%d 2>/dev/null || date -u -v+1d +%Y-%m-%d)
          CONTENT=$(curl -sf \
            "https://api.the-odds-api.com/v4/sports/basketball_ncaab/odds/?apiKey=${ODDS_API_KEY}&regions=us&markets=spreads,totals&oddsFormat=american&commenceTimeFrom=${DATE}T12:00:00Z&commenceTimeTo=${NEXT}T12:00:00Z" \
            || echo "[]")
          FILENAME="odds-${DATE}.json"
          ESCAPED=$(python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" <<< "$CONTENT")
          curl -sf -X PATCH \
            -H "Authorization: token ${GIST_PAT}" \
            -H "Content-Type: application/json" \
            -d "{\"files\":{\"${FILENAME}\":{\"content\":${ESCAPED}}}}" \
            "https://api.github.com/gists/${GIST_ID}"

      - name: Lock commenced games
        env:
          GIST_PAT: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.ODDS_GIST_ID }}
        run: |
          export DATE=$(date -u +%Y-%m-%d)
          python3 <<'PYEOF'
          import json, urllib.request, os, sys
          from datetime import datetime, timezone

          gist_id  = os.environ['GIST_ID']
          gist_pat = os.environ['GIST_PAT']
          date_str = os.environ['DATE']

          def gist_fetch(filename):
              url = f'https://gist.githubusercontent.com/loganthein/{gist_id}/raw/{filename}'
              try:
                  req = urllib.request.Request(url, headers={'Cache-Control': 'no-cache'})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f'Note: could not fetch {filename}: {e}')
                  return None

          def gist_patch(filename, data):
              body = json.dumps({'files': {filename: {'content': json.dumps(data)}}}).encode()
              req = urllib.request.Request(
                  f'https://api.github.com/gists/{gist_id}',
                  data=body, method='PATCH',
                  headers={
                      'Authorization': f'token {gist_pat}',
                      'Content-Type': 'application/json',
                      'Accept': 'application/vnd.github.v3+json',
                      'User-Agent': 'lock-odds-workflow',
                  }
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  return r.status

          live        = gist_fetch(f'odds-{date_str}.json') or []
          locked_list = gist_fetch(f'locked-odds-{date_str}.json') or []
          locked_ids  = {g['id'] for g in locked_list if 'id' in g}
          now_ts      = datetime.now(timezone.utc).timestamp()
          added       = 0

          for game in live:
              gid = game.get('id')
              ct  = game.get('commence_time')
              if not gid or not ct:
                  continue
              try:
                  ct_ts = datetime.fromisoformat(ct.replace('Z', '+00:00')).timestamp()
              except Exception:
                  continue
              if ct_ts <= now_ts and gid not in locked_ids:
                  locked_list.append(game)
                  locked_ids.add(gid)
                  added += 1
                  print(f'Locking: {game.get("home_team")} vs {game.get("away_team")} ({ct})')

          if added == 0:
              print('No new games to lock.')
              sys.exit(0)

          out = f'locked-odds-{date_str}.json'
          print(f'Writing {out} with {len(locked_list)} games ({added} new)...')
          status = gist_patch(out, locked_list)
          print(f'Gist PATCH status: {status}')
          PYEOF
