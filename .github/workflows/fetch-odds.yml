name: Fetch Odds
on:
  schedule:
    # Every 30 min from noon UTC (7am ET) through midnight UTC (7pm ET) — covers all US game windows
    - cron: '*/30 12-23 * * *'
    - cron: '*/30 0-6 * * *'
  workflow_dispatch:

jobs:
  fetch-odds:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and push to Gist
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.ODDS_GIST_ID }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          NEXT=$(date -u -d '+1 day' +%Y-%m-%d 2>/dev/null || date -u -v+1d +%Y-%m-%d)
          CONTENT=$(curl -sf \
            "https://api.the-odds-api.com/v4/sports/basketball_ncaab/odds/?apiKey=${ODDS_API_KEY}&regions=us&markets=spreads,totals&oddsFormat=american&commenceTimeFrom=${DATE}T12:00:00Z&commenceTimeTo=${NEXT}T12:00:00Z" \
            || echo "[]")
          FILENAME="odds-${DATE}.json"
          ESCAPED=$(python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" <<< "$CONTENT")
          curl -sf -X PATCH \
            -H "Authorization: token ${GIST_PAT}" \
            -H "Content-Type: application/json" \
            -d "{\"files\":{\"${FILENAME}\":{\"content\":${ESCAPED}}}}" \
            "https://api.github.com/gists/${GIST_ID}"
