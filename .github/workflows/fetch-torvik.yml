name: Fetch Torvik Ratings

on:
  schedule:
    - cron: '0 14 * * *'  # 10am ET daily
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudscraper
        run: pip install cloudscraper

      - name: Fetch Torvik and push to Gist
        run: |
          python3 - <<'EOF'
          import cloudscraper
          import json
          import urllib.request

          YEAR = 2026
          GIST_ID = "44dd1f1464e3d7e2689b25ba758d4ea9"
          TOKEN = "${{ secrets.GIST_TOKEN }}"

          # Fetch from Torvik (bypasses Cloudflare JS challenge)
          scraper = cloudscraper.create_scraper()
          url = f"https://barttorvik.com/trank.php?json=1&year={YEAR}"
          r = scraper.get(url, timeout=30)
          print(f"HTTP status: {r.status_code}")
          data = r.text

          # Verify it's valid JSON
          parsed = json.loads(data)
          print(f"Fetched {len(parsed)} teams from Torvik")

          # Push to Gist
          payload = json.dumps({
              "files": {
                  "torvik-ratings.json": {"content": data}
              }
          }).encode("utf-8")
          gist_req = urllib.request.Request(
              f"https://api.github.com/gists/{GIST_ID}",
              data=payload,
              method="PATCH",
              headers={
                  "Authorization": f"token {TOKEN}",
                  "Accept": "application/vnd.github.v3+json",
                  "Content-Type": "application/json",
              }
          )
          with urllib.request.urlopen(gist_req) as resp:
              print(f"Gist updated: {resp.status}")
          EOF
