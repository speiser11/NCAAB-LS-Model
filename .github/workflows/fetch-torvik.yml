name: Fetch Torvik Ratings

on:
  schedule:
    - cron: '0 14 * * *'  # 10am ET daily
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Torvik and push to Gist
        run: |
          python3 - <<'EOF'
          import requests
          import json
          import urllib.request
          from datetime import date

          YEAR = 2026
          GIST_ID = "44dd1f1464e3d7e2689b25ba758d4ea9"
          TOKEN = "${{ secrets.GIST_TOKEN }}"

          url = f"https://barttorvik.com/trank.php?json=1&year={YEAR}"
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Referer": "https://barttorvik.com/",
          }

          session = requests.Session()
          session.headers.update(headers)

          # Step 1: GET to receive the bot-check page + set cookies
          session.get(url, timeout=30)

          # Step 2: POST simulating the JS form auto-submit
          r2 = session.post(url, data={"js_test_submitted": "1"}, timeout=30)
          data = r2.text

          # Verify it's valid JSON
          parsed = json.loads(data)
          print(f"Fetched {len(parsed)} teams from Torvik")

          today = date.today().isoformat()  # e.g. 2026-03-02

          # Push to Gist: overwrite current + store dated snapshot
          payload = json.dumps({
              "files": {
                  "torvik-ratings.json": {"content": data},
                  f"torvik-{today}.json": {"content": data},
              }
          }).encode("utf-8")
          gist_req = urllib.request.Request(
              f"https://api.github.com/gists/{GIST_ID}",
              data=payload,
              method="PATCH",
              headers={
                  "Authorization": f"token {TOKEN}",
                  "Accept": "application/vnd.github.v3+json",
                  "Content-Type": "application/json",
              }
          )
          with urllib.request.urlopen(gist_req) as resp:
              print(f"Gist updated: {resp.status}")
          EOF
