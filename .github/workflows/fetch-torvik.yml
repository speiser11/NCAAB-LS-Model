name: Fetch Torvik Ratings

on:
  schedule:
    - cron: '0 14 * * *'  # 10am ET daily
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install requests

      - name: Fetch Torvik and push to Gist
        run: |
          python3 - <<'EOF'
          import requests
          import json
          import urllib.request
          from datetime import date, datetime

          # Dynamic season year: Nov 1 starts a new season
          today = date.today()
          YEAR = today.year + 1 if today.month >= 10 else today.year

          GIST_ID = "44dd1f1464e3d7e2689b25ba758d4ea9"
          TOKEN = "${{ secrets.GIST_TOKEN }}"
          today_iso = today.isoformat()  # e.g. 2026-03-06

          # ── Fetch Torvik ──────────────────────────────────────────
          url = f"https://barttorvik.com/trank.php?json=1&year={YEAR}"
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Referer": "https://barttorvik.com/",
          }

          session = requests.Session()
          session.headers.update(headers)

          # Step 1: GET to receive the bot-check page + set cookies
          session.get(url, timeout=30)

          # Step 2: POST simulating the JS form auto-submit
          r2 = session.post(url, data={"js_test_submitted": "1"}, timeout=30)
          r2.raise_for_status()

          # Verify it's valid JSON before proceeding
          parsed = json.loads(r2.text)
          if not isinstance(parsed, list) or len(parsed) < 100:
              raise ValueError(f"Unexpected Torvik response: {r2.text[:200]}")
          print(f"Fetched {len(parsed)} teams from Torvik (season {YEAR})")

          # ── Fetch NCAAB odds ──────────────────────────────────────
          odds_key = "${{ secrets.ODDS_API_KEY }}"
          odds_data = []
          if odds_key:
              try:
                  odds_url = (
                      f"https://api.the-odds-api.com/v4/sports/basketball_ncaab/odds/"
                      f"?apiKey={odds_key}&regions=us&markets=spreads,totals&oddsFormat=american"
                  )
                  odds_resp = requests.get(odds_url, timeout=15)
                  if odds_resp.ok:
                      for game in odds_resp.json():
                          home, away = game.get('home_team',''), game.get('away_team','')
                          spread_pts, total_pts = [], []
                          for bm in game.get('bookmakers', []):
                              for mkt in bm.get('markets', []):
                                  if mkt['key'] == 'spreads':
                                      for o in mkt.get('outcomes', []):
                                          if o['name'] == home:
                                              spread_pts.append(o['point'])
                                  elif mkt['key'] == 'totals':
                                      for o in mkt.get('outcomes', []):
                                          if o['name'] == 'Over':
                                              total_pts.append(o['point'])
                          odds_data.append({
                              'home': home, 'away': away,
                              'spread': round(sum(spread_pts)/len(spread_pts)*2)/2 if spread_pts else None,
                              'total':  round(sum(total_pts) /len(total_pts) *2)/2 if total_pts  else None,
                          })
                      print(f"Fetched odds for {len(odds_data)} games")
              except Exception as e:
                  print(f"Odds fetch failed (non-fatal): {e}")

          # ── Build Gist files ──────────────────────────────────────
          meta = {
              "updated_at": datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "season": YEAR,
              "team_count": len(parsed),
          }

          gist_files = {
              "torvik-ratings.json":      {"content": r2.text},
              f"torvik-{today_iso}.json": {"content": r2.text},
              f"ncaab-odds-{today_iso}.json": {"content": json.dumps(odds_data)},
              "torvik-meta.json":         {"content": json.dumps(meta)},
          }

          # ── Push to Gist ──────────────────────────────────────────
          payload = json.dumps({"files": gist_files}).encode("utf-8")
          gist_req = urllib.request.Request(
              f"https://api.github.com/gists/{GIST_ID}",
              data=payload,
              method="PATCH",
              headers={
                  "Authorization": f"token {TOKEN}",
                  "Accept": "application/vnd.github.v3+json",
                  "Content-Type": "application/json",
              }
          )
          with urllib.request.urlopen(gist_req) as resp:
              print(f"Gist updated: HTTP {resp.status} — {today_iso} season={YEAR}")
          EOF
